function validateEmail(input){
  const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  const hint=document.getElementById('email-hint');
  if(!input.value){input.classList.remove('error','success');if(hint)hint.textContent='';return;}
  if(emailRegex.test(input.value)){
    input.classList.remove('error');input.classList.add('success');
    if(hint){hint.textContent='✓ Düzgün email';hint.style.color='var(--green)';}
  } else {
    input.classList.remove('success');input.classList.add('error');
    if(hint){hint.textContent='Email formatı düzgün deyil (məs: ad@gmail.com)';hint.style.color='var(--red)';}
  }
}

function validateName(input){
  if(input.value.length>=3){input.classList.remove('error');input.classList.add('success');}
  else if(input.value.length>0){input.classList.remove('success');input.classList.add('error');}
  else{input.classList.remove('error','success');}
}

function checkPwStrength(pw){
  const bar=document.getElementById('pw-strength-bar');
  const fill=document.getElementById('pw-strength-fill');
  const txt=document.getElementById('pw-strength-text');
  if(!bar||!fill||!txt)return;
  if(!pw){bar.style.display='none';txt.textContent='';return;}
  bar.style.display='block';
  let score=0;
  if(pw.length>=8)score++;
  if(pw.length>=12)score++;
  if(/[A-Z]/.test(pw))score++;
  if(/[0-9]/.test(pw))score++;
  if(/[^A-Za-z0-9]/.test(pw))score++;
  const levels=[
    {w:'20%',color:'var(--red)',text:'Çox zəif'},
    {w:'40%',color:'#f97316',text:'Zəif'},
    {w:'60%',color:'#eab308',text:'Orta'},
    {w:'80%',color:'#84cc16',text:'Güclü'},
    {w:'100%',color:'var(--green)',text:'Çox güclü 💪'},
  ];
  const l=levels[Math.min(score,4)];
  fill.style.width=l.w;fill.style.background=l.color;
  txt.textContent=l.text;txt.style.color=l.color;
}

function getAdminAttempts(){
  try{return JSON.parse(localStorage.getItem('admin_attempts')||'{"count":0,"lockUntil":0}');}
  catch(e){return {count:0,lockUntil:0};}
}
function setAdminAttempts(obj){localStorage.setItem('admin_attempts',JSON.stringify(obj));}
function tryAdmin(){
  const inp=document.getElementById('admin-pw-inp');
  if(!inp)return;
  const att=getAdminAttempts();
  if(att.lockUntil&&Date.now()<att.lockUntil){
    const remain=att.lockUntil-Date.now();
    const m=Math.floor(remain/60000),s=Math.floor((remain%60000)/1000);
    const e=document.getElementById('admin-error');
    if(e){e.textContent='Çox cəhd etdiniz. '+m+' dəqiqə '+s+' saniyə gözləyin';e.className='f-error show';}
    return;
  }
  if(att.lockUntil&&Date.now()>=att.lockUntil){att.count=0;att.lockUntil=0;setAdminAttempts(att);}
  if(inp.value===ADMIN_PASSWORD){
    setAdminAttempts({count:0,lockUntil:0});
    S.page='admin';S.adminSection='stats';S.adminLogin=false;
    if(S.user)S.user.admin=true;
    S.adminSessionStart=Date.now();
    const token=localStorage.getItem('admin_token')||Math.random().toString(36).slice(2,10);
    localStorage.setItem('admin_token',token);
    logAdminAction('Admin girişi');
    if(window._adminSessionInterval) clearInterval(window._adminSessionInterval);
    window._adminSessionInterval=setInterval(()=>{
      if(S.page==='admin'&&S.adminSessionStart&&Date.now()-S.adminSessionStart>1800000){
        S.user&&(S.user.admin=false);S.adminSessionStart=0;S.page='browse';
        clearInterval(window._adminSessionInterval);window._adminSessionInterval=null;
        showToast('Admin sessiya vaxtı bitdi','error');render();
      }
    },60000);
    render();
  } else {
    att.count++;
    if(att.count>=3){att.lockUntil=Date.now()+300000;}
    setAdminAttempts(att);
    const e=document.getElementById('admin-error');
    if(e){
      if(att.count>=3){
        e.textContent='Çox cəhd etdiniz. 5 dəqiqə 0 saniyə gözləyin';e.className='f-error show';
        if(window._adminLockTimer) clearInterval(window._adminLockTimer);
        window._adminLockTimer=setInterval(()=>{
          const rem=att.lockUntil-Date.now();
          if(rem<=0){clearInterval(window._adminLockTimer);window._adminLockTimer=null;if(e){e.textContent='';e.className='f-error';}return;}
          const m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);
          if(e) e.textContent='Çox cəhd etdiniz. '+m+' dəqiqə '+s+' saniyə gözləyin';
        },1000);
      } else {
        e.textContent='Şifrə səhvdir ('+att.count+'/3)';e.className='f-error show';
      }
    }
  }
}

// ── SESSION GUARD ────────────────────────────────────────
function generateToken(){
  return Math.random().toString(36).slice(2)+Date.now().toString(36)+Math.random().toString(36).slice(2);
}
async function initSessionGuard(){
  if(!sb||!S.user) return;
  if(S.sessionToken && window._sessionCheck) return;
  try{
    const token=generateToken();
    S.sessionToken=token;
    localStorage.setItem('artmonia_session_'+S.user.id, token);
    // Get existing sessions for this user
    const {data:existing}=await sb.from('active_sessions')
      .select('session_tokens,device_infos').eq('user_id',S.user.id).single();
    let tokens=[];let devices=[];
    if(existing&&existing.session_tokens){
      try{tokens=JSON.parse(existing.session_tokens);devices=JSON.parse(existing.device_infos||'[]');}catch(e){tokens=[];devices=[];}
    }
    // Add new token, keep max 3
    tokens.push(token);devices.push(navigator.userAgent.slice(0,100));
    if(tokens.length>3){tokens=tokens.slice(-3);devices=devices.slice(-3);}
    await sb.from('active_sessions').upsert({
      user_id:S.user.id,
      session_tokens:JSON.stringify(tokens),
      device_infos:JSON.stringify(devices),
      session_token:token,
      device_info:navigator.userAgent.slice(0,100),
      last_seen:new Date().toISOString()
    },{onConflict:'user_id'});
    clearInterval(window._sessionCheck);
    window._sessionCheck=setInterval(()=>checkSession(),45000);
  }catch(e){console.warn('Session init:',e);}
}
async function checkSession(){
  if(!sb||!S.user||!S.sessionToken) return;
  if(S.user.admin) return;
  try{
    const {data,error}=await sb.from('active_sessions')
      .select('session_tokens,session_token').eq('user_id',S.user.id).single();
    if(error || !data) return; // Network error — don't kick
    let tokens=[];
    if(data.session_tokens){
      try{tokens=JSON.parse(data.session_tokens);}catch(e){tokens=[data.session_token];}
    } else { tokens=[data.session_token]; }
    // Check if our token is in the array (up to 3 devices allowed)
    if(!tokens.includes(S.sessionToken)){
      clearInterval(window._sessionCheck);
      S.sessionKicked=true;
      S.user=null;
      if(sb) await sb.auth.signOut();
      render();
    } else {
      await sb.from('active_sessions')
        .update({last_seen:new Date().toISOString()})
        .eq('user_id',S.user?.id||'');
    }
  }catch(e){
    // Network error — never kick
    console.warn('Session check error:',e);
  }
}

  const {data,error}=await sb.storage.from('artmonia-uploads').upload(fname,file,{upsert:true});
  if(error) throw error;
  if(prog) prog.textContent='Yüklənir... 100% ✓';
  const {data:pub}=sb.storage.from('artmonia-uploads').getPublicUrl(fname);
  return pub.publicUrl;
}
async function handleWorkUpload(input){
  if(!input.files[0]) return;
  try{
    const url=await uploadToSupabase(input.files[0]);
    S._uploadedWorkUrl=url;
    showToast('Şəkil yükləndi! ✅');
  }catch(e){showToast('Yükləmə xətası: '+e.message,'error');}
}
async function submitWork(){
  if(!S.user){openAuth('login');return;}
  const title=document.getElementById('work-title')?.value?.trim();
  const desc=document.getElementById('work-desc')?.value?.trim();
  const imgUrl=S._uploadMode&&S._uploadedWorkUrl?S._uploadedWorkUrl:(document.getElementById('work-img-url')?.value?.trim());
  if(!title||!imgUrl){showToast('Başlıq və şəkil tələb olunur','error');return;}
  try{
    const {data,error}=await sb.from('student_works').insert({
      user_id:S.user.id, title, description:desc||'', image_url:imgUrl
    }).select().single();
    if(error) throw error;
    data.profiles={full_name:S.user.name};
    S.studentWorks=[data,...S.studentWorks];
    showToast('İşiniz paylaşıldı! 🎨');
    document.getElementById('work-title').value='';
    document.getElementById('work-desc').value='';
    document.getElementById('work-img-url').value='';
    const grid=document.getElementById('works-grid');
    if(grid) grid.innerHTML=worksGridHTML();
  }catch(e){showToast('Xəta: '+e.message,'error');}
}
async function toggleWorkLike(workId){
  if(!S.user){openAuth('login');return;}
  const work=S.studentWorks.find(w=>w.id===workId);
  if(!work) return;
  const liked=work._liked;
  work._liked=!liked;
  work.likes_count=Math.max(0,work.likes_count+(liked?-1:1));
  const grid=document.getElementById('works-grid');
  if(grid) grid.innerHTML=worksGridHTML();
  try{
    if(liked) await sb.from('work_likes').delete().eq('user_id',S.user.id).eq('work_id',workId);
    else await sb.from('work_likes').insert({user_id:S.user.id,work_id:workId});
  }catch(e){work._liked=liked;work.likes_count=Math.max(0,work.likes_count+(liked?1:-1));}
}
function worksGridHTML(){
  if(!S.studentWorks.length) return '<div style="text-align:center;padding:48px;color:var(--text3);font-size:15px;font-weight:700;grid-column:1/-1">🎨 Hələ iş paylaşılmayıb. İlk siz olun!</div>';
  return S.studentWorks.map(w=>`<div class="work-card">
    <div class="work-thumb">
      <img src="${esc(w.image_url)}" alt="${esc(w.title)}" loading="lazy" onerror="this.parentElement.style.background='var(--bg3)'">
    </div>
    <div class="work-body">
      <div class="work-title">${esc(w.title)}</div>
      ${w.description?`<div style="font-size:12px;color:var(--text3);margin-bottom:8px;font-weight:500">${esc(w.description.slice(0,80))}</div>`:''}
      <div class="work-author">
        <div class="work-avatar">${(w.profiles?.full_name||'?')[0].toUpperCase()}</div>
        <span class="work-author-name">${esc(w.profiles?.full_name||'Tələbə')}</span>
      </div>
      <div class="work-actions">
        <button class="like-btn ${w._liked?'liked':''}" onclick="toggleWorkLike('${w.id}')">
          ${w._liked?'❤️':'🤍'} ${w.likes_count||0}
        </button>
        ${S.user&&w.user_id===S.user.id?`<button class="btn btn-danger btn-sm" onclick="deleteWork('${w.id}')">🗑</button>`:''}
      </div>
    </div>
  </div>`).join('');
}
async function deleteWork(workId){
  if(!confirm('İşi silmək istədiyinizdən əminsiniz?')) return;
  S.studentWorks=S.studentWorks.filter(w=>w.id!==workId);
  const grid=document.getElementById('works-grid');
  if(grid) grid.innerHTML=worksGridHTML();
  try{await sb.from('student_works').delete().eq('id',workId);}catch(e){console.error('Artmonia error:',e)}
  showToast('İş silindi');
}

async function loadMyQuestions(){
  if(!sb||!S.user) return;
  try{
    const {data}=await sb.from('student_questions')
      .select('*').eq('user_id',S.user.id)
      .order('created_at',{ascending:false});
    S.myQuestions=data||[];
    S.questionsLoaded=true;
    const el=document.getElementById('questions-list');
    if(el) el.innerHTML=questionsListHTML();
  }catch(e){ S.myQuestions=[]; }

async function submitQuestion(){
  if(!S.user){openAuth('login');return;}
  const text=document.getElementById('q-input')?.value?.trim();
  if(!text||text.length<10){showToast('Sualınız minimum 10 simvol olmalıdır','error');return;}
  try{
    const {data,error}=await sb.from('student_questions').insert({
      user_id:S.user.id, question_text:text, status:'pending'
    }).select().single();
    if(error) throw error;
    S.myQuestions=[data,...S.myQuestions];
    document.getElementById('q-input').value='';
    showToast('Sualınız göndərildi! Tezliklə cavablandırılacaq 📬');
    const el=document.getElementById('questions-list');
    if(el) el.innerHTML=questionsListHTML();
  }catch(e){showToast('Xəta: '+e.message,'error');}
}
async function deleteQuestion(id){
  S.myQuestions=S.myQuestions.filter(q=>q.id!==id);
  const el=document.getElementById('questions-list');
  if(el) el.innerHTML=questionsListHTML();
  try{await sb.from('student_questions').delete().eq('id',id);}catch(e){console.error('Artmonia error:',e)}
  showToast('Sual silindi');
}
function questionsListHTML(){

    <div class="q-status ${q.status}">${q.status==='answered'?'✅ Cavablandı':'⏳ Gözləyir'}</div>

function leaderboardHTML(){
  // Calculate scores from available data
  const userScores=[];
  S.studentWorks.forEach(w=>{
    const name=w.profiles?.full_name||'İstifadəçi';

    <div style="background:var(--card);border:1.5px solid var(--border2);border-radius:14px;padding:20px;margin-bottom:20px">
      <div style="font-size:16px;font-weight:900;margin-bottom:6px">🏆 Həftəlik Müsabiqə</div>
      <div style="font-size:14px;color:var(--text2);font-weight:700;margin-bottom:4px">${esc(contest.title)}</div>
      <div style="font-size:13px;color:var(--orange);font-weight:800">🎁 Mükafat: ${esc(contest.prize)}</div>

    <div style="background:var(--card);border:1.5px solid var(--border2);border-radius:14px;overflow:hidden">
      <div style="padding:16px 20px;border-bottom:1px solid var(--border2);font-size:15px;font-weight:900">🏅 Top 5 Tələbə</div>
      ${top5.length?top5.map((u,i)=>`<div style="display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border2)">
        <div style="width:28px;height:28px;border-radius:50%;background:${i===0?'var(--orange)':i===1?'var(--blue)':i===2?'var(--green)':'var(--border2)'};color:white;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900">${i+1}</div>

        <div style="flex:1"><div style="font-size:14px;font-weight:800">${esc(u.name)}</div><div style="font-size:11px;color:var(--text3)">${u.works} iş paylaşıb</div></div>
        <div style="font-size:16px;font-weight:900;color:var(--orange);font-family:'Cormorant Garamond',serif">${u.score}</div>

async function adminDeleteWork(id){
  if(!confirm('İşi silmək istədiyinizdən əminsiniz?')) return;

}
function setStat(key,mode){
  S.siteStats[key].useReal=(mode==='real');
  if(mode==='real' && !S.realStatsLoaded) loadRealStats();
  adminGo('site-numbers');
}
function saveStatManual(key){
  const inp=document.getElementById('stat-'+key);
  if(!inp) return;
  const val=parseInt(inp.value)||0;
  S.siteStats[key].manual=val;
  showToast(key+' rəqəmi saxlanıldı: '+val);
  adminGo('site-numbers');
}
async function loadRealStats(){
  if(!sb){ showToast('Supabase bağlı deyil','error'); return; }
  showToast('Real saylar yüklənir...');
  try{
    const [{count:uc},{count:cc}]=await Promise.all([
      sb.from('profiles').select('*',{count:'exact',head:true}),
      sb.from('certificates').select('*',{count:'exact',head:true})
    ]);
    S.siteStats.students.real=uc||0;
    S.siteStats.certificates.real=cc||0;
    S.realStatsLoaded=true;
    showToast('Real saylar yükləndi ✅');
    if(S.adminSection==='site-numbers') adminGo('site-numbers');
  }catch(e){ showToast('Xəta: '+e.message,'error'); }
}
function getStatVal(key){
  const s=S.siteStats[key];
  if(!s) return 0;
  return s.useReal ? s.real : s.manual;
}

}
function initWelcomeCanvas(){
  const canvas=document.getElementById('welcome-canvas');
  if(!canvas) return;
  const box=document.getElementById('welcome-box');
  if(!box) return;
  const W=box.offsetWidth||540;
  const H=box.offsetHeight||480;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');

  // Dərin tünd fon
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#090620');
  bg.addColorStop(.5,'#0e0a30');
  bg.addColorStop(1,'#0a0525');
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);

  // Sağ tərəf - rəssam fırça effekti
  const sideGrad=ctx.createLinearGradient(W*.55,0,W,0);
  sideGrad.addColorStop(0,'transparent');
  sideGrad.addColorStop(.4,'rgba(242,142,20,.04)');
  sideGrad.addColorStop(.8,'rgba(242,142,20,.08)');
  sideGrad.addColorStop(1,'rgba(12,2,89,.6)');
  ctx.fillStyle=sideGrad;
  ctx.fillRect(0,0,W,H);

  // Böyük ambient glow - sol üst
  const glow1=ctx.createRadialGradient(W*.1,H*.2,0,W*.1,H*.2,W*.45);
  glow1.addColorStop(0,'rgba(242,142,20,.06)');
  glow1.addColorStop(1,'transparent');
  ctx.fillStyle=glow1;
  ctx.fillRect(0,0,W,H);

  // Kiçik glow - sağ aşağı
  const glow2=ctx.createRadialGradient(W*.85,H*.8,0,W*.85,H*.8,W*.3);
  glow2.addColorStop(0,'rgba(160,100,255,.05)');
  glow2.addColorStop(1,'transparent');
  ctx.fillStyle=glow2;
  ctx.fillRect(0,0,W,H);

  // Dekorativ fırça zolaqları — diaqonal, incə
  const strokes=[
    {x1:W*.6,y1:0,x2:W,y2:H*.4,w:1.5,a:.06},
    {x1:W*.7,y1:0,x2:W,y2:H*.25,w:1,a:.04},
    {x1:0,y1:H*.85,x2:W*.35,y2:H,w:1,a:.05},
    {x1:W*.5,y1:H,x2:W,y2:H*.6,w:1.5,a:.04},
  ];
  strokes.forEach(s=>{
    const lg=ctx.createLinearGradient(s.x1,s.y1,s.x2,s.y2);
    lg.addColorStop(0,'transparent');
    lg.addColorStop(.5,`rgba(242,142,20,${s.a})`);
    lg.addColorStop(1,'transparent');
    ctx.strokeStyle=lg;
    ctx.lineWidth=s.w;
    ctx.beginPath();
    ctx.moveTo(s.x1,s.y1);
    ctx.lineTo(s.x2,s.y2);
    ctx.stroke();
  });

  // Çox incə şəbəkə nöqtələri — arxa planda
  ctx.fillStyle='rgba(255,255,255,.025)';
  for(let x=20;x<W;x+=28){
    for(let y=20;y<H;y+=28){
      ctx.beginPath();
      ctx.arc(x,y,.8,0,Math.PI*2);
      ctx.fill();
    }
  }

  // Alt border xətti — narıncı
  const borderGrad=ctx.createLinearGradient(0,0,W,0);
  borderGrad.addColorStop(0,'transparent');
  borderGrad.addColorStop(.3,'rgba(242,142,20,.5)');
  borderGrad.addColorStop(.7,'rgba(243,113,38,.4)');
  borderGrad.addColorStop(1,'transparent');
  ctx.fillStyle=borderGrad;
  ctx.fillRect(0,H-2,W,2);

  // Üst border — çox incə
  const topBorder=ctx.createLinearGradient(0,0,W,0);
  topBorder.addColorStop(0,'transparent');
  topBorder.addColorStop(.5,'rgba(242,142,20,.2)');
  topBorder.addColorStop(1,'transparent');
  ctx.fillStyle=topBorder;
  ctx.fillRect(0,0,W,1);
}
function showWelcomeScreen(name){
  S.welcomeName=name;
  S.showWelcome=true;
}

function promoHTML(){
  const P=S.promo;
  if(!P.active) return '';
  if(P.showOnce && S.promoSeen) return '';
  if(P.expiresAt && new Date(P.expiresAt)<new Date()) return '';
  
  // Gizli timer hesabı
  let timerHTML='';
  if(P.expiresAt){
    const diff=new Date(P.expiresAt)-new Date();
    if(diff>0){
      const days=Math.floor(diff/86400000);
      const hrs=Math.floor((diff%86400000)/3600000);
      const mins=Math.floor((diff%3600000)/60000);
      const secs=Math.floor((diff%60000)/1000);
      timerHTML=`<div class="promo-timer">
        ${days>0?`<div class="promo-timer-unit"><div class="promo-timer-num" id="pt-d">${days}</div><div class="promo-timer-lbl">Gün</div></div>`:''}
        <div class="promo-timer-unit"><div class="promo-timer-num" id="pt-h">${String(hrs).padStart(2,'0')}</div><div class="promo-timer-lbl">Saat</div></div>
        <div class="promo-timer-unit"><div class="promo-timer-num" id="pt-m">${String(mins).padStart(2,'0')}</div><div class="promo-timer-lbl">Dəq</div></div>
        <div class="promo-timer-unit"><div class="promo-timer-num" id="pt-s">${String(secs).padStart(2,'0')}</div><div class="promo-timer-lbl">San</div></div>
      </div>`;
    }
  }

  // Random particles
  const particles=Array.from({length:12},(_,i)=>{
    const left=Math.random()*100;
    const delay=Math.random()*4;
    const dur=3+Math.random()*4;
    const size=2+Math.random()*4;
    const colors=['var(--orange)','#F37126','#FFD700','#FF6B35','rgba(242,142,20,.5)'];
    const color=colors[Math.floor(Math.random()*colors.length)];
    return `<div class="promo-particle" style="left:${left}%;animation-duration:${dur}s;animation-delay:${delay}s;width:${size}px;height:${size}px;background:${color}"></div>`;
  }).join('');

  return `<div class="promo-overlay" id="promo-overlay" onclick="closePromoIfBg(event)">
    <div class="promo-box" id="promo-box">
      <div class="promo-particles">${particles}</div>
      <div class="promo-glow"></div>
      <div class="promo-inner">
        <button class="promo-close" onclick="closePromo()">✕</button>
        <div class="promo-badge" style="background:${P.badgeColor};color:white">${P.badge}</div>
        <h2 class="promo-title">${P.title}</h2>
        <div class="promo-subtitle">${P.subtitle}</div>
        <div class="promo-decor-line"></div>
        <p class="promo-desc">${P.desc}</p>
        ${P.limitText?`<div class="promo-limit">⚡ ${P.limitText}</div>`:''}
        ${timerHTML}
        <button class="promo-btn" onclick="closePromo();openAuth('${P.btnAction||'register'}')">${P.btnText}</button>
        <button class="promo-skip" onclick="closePromo()">Həşt, keçin →</button>
      </div>
    </div>
  </div>`;
}
function closePromo(){
  S.promoSeen=true;
  const el=document.getElementById('promo-overlay');
  if(el){el.style.animation='promoFadeIn .3s ease reverse';setTimeout(()=>el.remove(),300);}
}
function closePromoIfBg(e){if(e.target===document.getElementById('promo-overlay'))closePromo();}
function startPromoTimer(){
  if(!S.promo.active||!S.promo.expiresAt) return;
  clearInterval(window._promoTimer);
  window._promoTimer=setInterval(()=>{
    const diff=new Date(S.promo.expiresAt)-new Date();
    if(diff<=0){clearInterval(window._promoTimer);return;}
    const days=Math.floor(diff/86400000);
    const hrs=Math.floor((diff%86400000)/3600000);
    const mins=Math.floor((diff%3600000)/60000);
    const secs=Math.floor((diff%60000)/1000);
    const dEl=document.getElementById('pt-d');
    const hEl=document.getElementById('pt-h');
    const mEl=document.getElementById('pt-m');
    const sEl=document.getElementById('pt-s');
    if(dEl)dEl.textContent=days;
    if(hEl)hEl.textContent=String(hrs).padStart(2,'0');
    if(mEl)mEl.textContent=String(mins).padStart(2,'0');
    if(sEl)sEl.textContent=String(secs).padStart(2,'0');
  },1000);
}
function togglePromo(){
  S.promo.active=!S.promo.active;
  if(!S.promo.active) S.promoSeen=false;
  adminGo('promo');
  showToast(S.promo.active?'Promo aktivləşdirildi! ✅':'Promo söndürüldü');
}
function savePromo(){
  const g=id=>document.getElementById(id);
  S.promo.badge=g('promo-badge')?.value||S.promo.badge;
  S.promo.title=g('promo-title')?.value||S.promo.title;
  S.promo.subtitle=g('promo-subtitle')?.value||S.promo.subtitle;
  S.promo.desc=g('promo-desc')?.value||S.promo.desc;
  S.promo.limitText=g('promo-limittext')?.value||'';
  S.promo.btnText=g('promo-btn')?.value||S.promo.btnText;
  S.promo.badgeColor=g('promo-color')?.value||S.promo.badgeColor;
  const exp=g('promo-expires')?.value;
  S.promo.expiresAt=exp?new Date(exp).toISOString():null;
  S.promo.showOnce=g('promo-showonce')?.value==='true';
  showToast('Promo saxlanıldı! ✅');
  adminGo('promo');
  persistSettings();
}
async function persistSettings(){
  if(!sb) return;
  try{
    const settings={siteTexts:S.siteTexts,promo:S.promo,reviews:S.reviews,teachers:S.teachers,heroSlides:HERO_SLIDES.map(s=>({id:s.id,title:s.title,desc:s.desc,cat:s.cat,bg:s.bg,courseId:s.courseId}))};
    await sb.from('site_settings').upsert({id:'main',settings:JSON.stringify(settings),updated_at:new Date().toISOString()},{onConflict:'id'});
  }catch(e){console.error('Persist settings:',e);}
}
async function loadSettings(){
  if(!sb) return;
  try{
    const {data}=await sb.from('site_settings').select('settings').eq('id','main').single();
    if(data&&data.settings){
      const s=JSON.parse(data.settings);
      if(s.siteTexts) Object.assign(S.siteTexts,s.siteTexts);
      if(s.promo) Object.assign(S.promo,s.promo);
      if(s.reviews) S.reviews=s.reviews;
      if(s.teachers) S.teachers=s.teachers;
      if(s.heroSlides) s.heroSlides.forEach((h,i)=>{if(HERO_SLIDES[i])Object.assign(HERO_SLIDES[i],h);});
      render();
    }
  }catch(e){console.error('Load settings:',e);}
}
function saveAllTexts(){
  const g=id=>document.getElementById('txt-'+id);
  const keys=Object.keys(S.siteTexts);
  keys.forEach(k=>{
    const el=g(k);
    if(el) S.siteTexts[k]=el.value;
  });
  // Hero slides-i yenilə
  if(HERO_SLIDES[0]){HERO_SLIDES[0].title=S.siteTexts.heroTitle1;HERO_SLIDES[0].desc=S.siteTexts.heroDesc1;}
  if(HERO_SLIDES[1]){HERO_SLIDES[1].title=S.siteTexts.heroTitle2;HERO_SLIDES[1].desc=S.siteTexts.heroDesc2;}
  if(HERO_SLIDES[2]){HERO_SLIDES[2].title=S.siteTexts.heroTitle3;HERO_SLIDES[2].desc=S.siteTexts.heroDesc3;}
  logAdminAction('Sayt mətnləri dəyişdirildi');showToast('Bütün mətnlər saxlanıldı! ✅');
  adminGo('texts');
  // Supabase-ə saxla
  persistSettings();
}
function saveHeroSlides(){
  HERO_SLIDES.forEach((s,i)=>{
    const bg=document.getElementById(`slide-bg-${i}`)?.value;
    const cat=document.getElementById(`slide-cat-${i}`)?.value;
    const cid=document.getElementById(`slide-cid-${i}`)?.value;
    if(bg) s.bg=bg;
    if(cat) s.cat=cat;
    if(cid) s.courseId=parseInt(cid)||s.courseId;
  });
  showToast('Hero şəkilləri saxlanıldı! ✅');
}
function previewSlideImg(i){
  const url=document.getElementById(`slide-bg-${i}`)?.value;
  if(url){
    const img=document.getElementById(`prev-img-${i}`);
    if(img){img.style.opacity='1';img.src=url;}
    showToast('Şəkil yeniləndi — Saxla düyməsinə basın');
  }
}
function toggleFaq(i){
  const el=document.getElementById('faq-'+i);
  if(!el)return;
  const isOpen=el.classList.contains('open');
  document.querySelectorAll('.faq-item').forEach(f=>f.classList.remove('open'));
  if(!isOpen)el.classList.add('open');
}
function animateCounters(){
  const els=document.querySelectorAll('[data-count]');
  els.forEach(el=>{
    const target=parseInt(el.getAttribute('data-count'));
    let current=0;
    const step=Math.ceil(target/60);
    const timer=setInterval(()=>{
      current=Math.min(current+step,target);
      el.textContent=current+(el.parentElement.querySelector('.stat-lbl')?.textContent.includes('%')?'':'');
      if(current>=target){el.textContent=target;clearInterval(timer);}
    },20);
  });
}
// ── HASH ROUTING ─────────────────────────────────────────────
const PAGE_ROUTES={
  '':'browse','/':'browse',
  '/about':'about','/online-lessons':'online-lessons',
  '/results':'results','/teachers':'teachers',
  '/certificates':'certificates-page','/blog':'blog',
  '/faq':'faq-page','/community':'community',
  '/profile':'profile',
  '/help':'help','/terms':'terms','/privacy':'privacy',
  '/search':'search','/subscribe':'subscribe'
};
const ROUTE_TITLES={
  'browse':'Artmonia — Online Rəssamlıq Akademiyası',
  'about':'Haqqımızda — Artmonia',
  'online-lessons':'Online Dərslər — Artmonia',
  'results':'Tələbə Nəticələri — Artmonia',
  'teachers':'Müəllimlər — Artmonia',
  'certificates-page':'Sertifikat Proqramı — Artmonia',
  'blog':'Bloq — Artmonia',
  'faq-page':'Tez-tez Soruşulan Suallar — Artmonia',
  'community':'Tələbə İcması — Artmonia',
  'profile':'Profilim — Artmonia',
  'help':'Kömək — Artmonia',
  'terms':'İstifadə Şərtləri — Artmonia',
  'privacy':'Məxfilik Siyasəti — Artmonia',
  'video':'Dərs İzlə — Artmonia',
  'search':'Axtarış — Artmonia',
  'admin':'Admin — Artmonia',
  'subscribe':'Abunəlik — Artmonia'
};
function pushRoute(path){
  const hash='#'+path;
  if(window.location.hash!==hash){
    window._routeInternal=true;
    window.location.hash=hash;
  }
  document.title=ROUTE_TITLES[S.page]||ROUTE_TITLES['browse'];
}
function handleRoute(){
  const hash=(window.location.hash||'#/').replace('#','');
  // Admin token check
  const storedToken=localStorage.getItem('admin_token');
  if(storedToken && hash===storedToken){S.adminLogin=true;return;}
  // Course route: /course/123
  const courseMatch=hash.match(/^\/course\/(\d+)$/);
  if(courseMatch){
    const cid=parseInt(courseMatch[1]);
    const c=S.courses.find(x=>x.id===cid);
    if(c){S.selectedCourse=c;S.activePart=null;S.activeEmbedUrl=null;S.page='video';}
    else{S.page='browse';}
    return;
  }
  // Standard page routes
  const page=PAGE_ROUTES[hash];
  if(page){S.page=page;}
  else{S.page='browse';}
  document.title=ROUTE_TITLES[S.page]||ROUTE_TITLES['browse'];
}
window.addEventListener('hashchange',()=>{
  if(window._routeInternal){window._routeInternal=false;return;}
  handleRoute();
  S.mobileMenu=false;
  render();
  window.scrollTo(0,0);
});

function checkUrlAdmin(){
  const params=new URLSearchParams(window.location.search);
  const hash=window.location.hash.replace('#','');
  const storedToken=localStorage.getItem('admin_token');
  // Support legacy ?admin param and token-based hash access
  if(params.has('admin')){
    S.adminLogin=true;
    const url=new URL(window.location.href);url.searchParams.delete('admin');
    window.history.replaceState({},'',url.toString());
  } else if(hash && storedToken && hash===storedToken){
    S.adminLogin=true;
    window.history.replaceState({},'',window.location.pathname+window.location.search);
  }
}

// ── BOOT ─────────────────────────────────────────────────────
function boot(){
  checkUrlAdmin();
  // Hash routing — URL-dən səhifəni oxu
  if(window.location.hash && window.location.hash!=='#/'){
    handleRoute();
  }
  // Dili yüklə
  const savedLang=localStorage.getItem('artmonia_lang');
  if(savedLang) S.lang=savedLang;
  loadLocalStats();
  initSB();
  render();
  // WhatsApp smart — 10 dəqiqə sonra göstər
  if(!sessionStorage.getItem('wa_shown')){
    setTimeout(()=>showWaButton(),600000);
  } else { setTimeout(()=>{const w=document.getElementById('wa-wrap');if(w){w.style.display='block';const b=document.getElementById('wa-bubble');if(b)b.style.display='none';}},2000); }
  // Video download bloku
  document.addEventListener('contextmenu',(e)=>{
    if(e.target.tagName==='IFRAME'||e.target.closest('.v-embed')){
      e.preventDefault();
      showToast('Video yükləmə qadağandır','error');
    }
  });
  // F12 / DevTools shortcut bloku (yüngül)
  document.addEventListener('keydown',(e)=>{
    if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key))){
      const onVideo=document.querySelector('.v-frame');
      if(onVideo){e.preventDefault();showToast('Bu funksiya deaktivdir','error');}
    }
    // Print Screen
    if(e.key==='PrintScreen'&&document.querySelector('.v-frame')){
      showToast('Ekran görüntüsü qadağandır','error');
    }
  });
  // Session token yoxla (tab yenidən açılanda)
  document.addEventListener('visibilitychange',()=>{
    if(!document.hidden&&S.user&&S.sessionToken) checkSession();
  });
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',boot);}else{boot();}
