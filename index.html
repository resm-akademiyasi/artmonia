<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0C0259;--navy2:#08048C;--navy3:#060138;
  --orange:#F28E14;--orange2:#F37126;
  --bg:#070614;--bg2:#0d0b20;--bg3:#12102a;
  --card:#14122a;--card2:#1a1835;
  --text:#ffffff;--text2:#b0acd0;--text3:#6b6790;
  --border:#252240;--border2:#1a1830;
  --green:#4ade80;--blue:#60a5fa;--red:#f87171;--purple:#a78bfa;
  --radius:8px;--radius-lg:12px;
}
html{scroll-behavior:smooth}
body{font-family:"Nunito Sans",sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--orange);border-radius:3px}
/* NAV DROPDOWN */
.nav-links li{position:relative}
.nav-links li:hover .nav-dropdown{display:block}
.nav-dropdown{display:none;position:absolute;top:100%;left:0;background:rgba(10,9,25,0.98);border:1.5px solid var(--border);border-radius:10px;min-width:200px;padding:8px;z-index:999;backdrop-filter:blur(20px);box-shadow:0 16px 48px rgba(0,0,0,.6);margin-top:4px}
.nav-dropdown a{display:block;padding:9px 14px;font-size:12px;font-weight:700;color:var(--text2);border-radius:6px;cursor:pointer;transition:all .2s;white-space:nowrap;letter-spacing:.3px}
.nav-dropdown a:hover{background:rgba(242,142,20,.12);color:var(--orange)}
.nav-dropdown .nd-divider{height:1px;background:var(--border2);margin:6px 4px}
.nav-arrow{font-size:9px;margin-left:4px;opacity:.6}
/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(7,6,20,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);height:64px;padding:0 40px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{display:flex;align-items:center;cursor:pointer}
.nav-logo img{height:44px;width:auto;filter:brightness(0) invert(1)}
.nav-links{display:flex;gap:4px;list-style:none}
.nav-links a{color:var(--text2);font-size:12px;font-weight:800;padding:7px 16px;border-radius:6px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .2s}
.nav-links a:hover{color:var(--text);background:rgba(255,255,255,.06)}
.nav-links a.active{color:var(--orange)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-search{position:relative}
.nav-search input{background:rgba(255,255,255,.06);border:1.5px solid var(--border);border-radius:20px;padding:7px 14px 7px 36px;font-family:"Nunito Sans",sans-serif;font-size:13px;color:var(--text);outline:none;width:200px;transition:all .2s;font-weight:600}
.nav-search input:focus{border-color:var(--orange);width:260px;background:rgba(255,255,255,.09)}
.nav-search .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.burger{display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:5px;padding:4px}
.burger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 22px;border-radius:6px;font-family:"Nunito Sans",sans-serif;font-size:13px;font-weight:800;cursor:pointer;border:none;transition:all .2s;letter-spacing:.3px}
.btn-orange{background:var(--orange);color:white}
.btn-orange:hover{background:var(--orange2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(242,142,20,.35)}
.btn-ghost{background:rgba(255,255,255,.08);color:var(--text2);border:1.5px solid rgba(255,255,255,.12)}
.btn-ghost:hover{background:rgba(255,255,255,.14);color:var(--text)}
.btn-outline{background:transparent;color:var(--text2);border:1.5px solid var(--border)}
.btn-outline:hover{color:var(--text);border-color:rgba(255,255,255,.3)}
.btn-lg{padding:13px 30px;font-size:14px;border-radius:8px}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:6px}
.btn-danger{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.btn-danger:hover{background:rgba(239,68,68,.22)}
.btn-success{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.btn-success:hover{background:rgba(34,197,94,.22)}
.full-btn{width:100%;justify-content:center;margin-top:6px}
/* HERO */
.hero{position:relative;height:100vh;min-height:580px;overflow:hidden;padding-top:64px}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 1s ease;pointer-events:none}
.slide.active{opacity:1;pointer-events:all}
.slide-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.4);transform:scale(1.06);transition:transform 9s ease}
.slide.active .slide-bg{transform:scale(1)}
.slide-grad{position:absolute;inset:0;background:linear-gradient(105deg,rgba(7,6,20,.97) 30%,rgba(7,6,20,.5) 65%,transparent 100%),linear-gradient(to top,rgba(7,6,20,.85) 0%,transparent 45%)}
.slide-content{position:absolute;bottom:14%;left:80px;max-width:580px}
.slide-cat{display:inline-flex;align-items:center;gap:8px;background:rgba(242,142,20,.15);border:1.5px solid rgba(242,142,20,.4);color:var(--orange);font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:6px 16px;border-radius:20px;margin-bottom:20px}
.slide-title{font-family:"Cormorant Garamond",serif;font-size:clamp(38px,5.5vw,68px);font-weight:700;line-height:1.03;margin-bottom:16px}
.slide-desc{font-size:16px;color:rgba(255,255,255,.7);line-height:1.75;margin-bottom:32px;max-width:460px}
.slide-actions{display:flex;gap:14px;align-items:center}
.slider-dots{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.25);cursor:pointer;transition:all .3s;border:none}
.dot.active{background:var(--orange);width:26px;border-radius:4px}
.slider-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);color:white;width:50px;height:50px;border-radius:50%;cursor:pointer;font-size:20px;transition:all .2s;display:flex;align-items:center;justify-content:center}
.slider-arrow:hover{background:rgba(242,142,20,.2);border-color:var(--orange)}
.arrow-l{left:28px}.arrow-r{right:28px}
/* DEMO BANNER */
.promo-top-banner{position:fixed;top:0;left:0;right:0;z-index:250;height:40px;background:linear-gradient(90deg,var(--orange),var(--orange2));display:flex;align-items:center;justify-content:center;gap:12px;font-size:13px;font-weight:800;color:white;letter-spacing:.3px;animation:promoSlideDown .4s ease}
.promo-top-banner .ptb-close{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:16px;position:absolute;right:16px;top:50%;transform:translateY(-50%)}
.promo-top-banner .ptb-close:hover{color:white}
@keyframes promoSlideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
body.has-promo-banner .nav{top:40px}
body.has-promo-banner .hero{padding-top:104px}
body.has-promo-banner .v-page{padding-top:104px}
body.has-promo-banner .admin-page{padding-top:104px}
body.has-promo-banner .static-page{padding-top:140px}
@keyframes subSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes demoPulse{0%,100%{box-shadow:0 4px 16px rgba(242,142,20,.35)}50%{box-shadow:0 4px 24px rgba(242,142,20,.55)}}
/* BROWSE */
.browse{padding:52px 0 0}
.cat-row{margin-bottom:52px;padding:0 44px}
.row-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.row-title{font-size:20px;font-weight:900;color:var(--text);letter-spacing:-.3px}
.view-all{font-size:11px;font-weight:800;color:var(--text3);background:none;border:none;cursor:pointer;letter-spacing:1.5px;text-transform:uppercase;transition:color .2s}
.view-all:hover{color:var(--orange)}
.row-wrap{position:relative}
.row-scroll{display:flex;gap:18px;overflow-x:auto;scroll-behavior:smooth;padding-bottom:6px;scrollbar-width:none}
.row-scroll::-webkit-scrollbar{display:none}
.scroll-btn{position:absolute;top:38%;transform:translateY(-50%);background:rgba(7,6,20,.92);border:1.5px solid var(--border);color:white;width:40px;height:40px;border-radius:50%;cursor:pointer;z-index:10;transition:all .2s;font-size:16px;display:flex;align-items:center;justify-content:center}
.scroll-btn:hover{background:var(--orange);border-color:var(--orange)}
.sb-l{left:-20px}.sb-r{right:-20px}
/* COURSE CARD */
.c-card{flex:0 0 272px;border-radius:var(--radius-lg);overflow:hidden;background:var(--card);border:1.5px solid var(--border2);cursor:pointer;transition:all .3s;position:relative}
.c-card:hover{transform:scale(1.045) translateY(-4px);box-shadow:0 20px 52px rgba(0,0,0,.6);border-color:var(--orange);z-index:5}
.c-thumb{position:relative;aspect-ratio:16/10;overflow:hidden;background:#080618}
.c-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .6s}
.c-card:hover .c-thumb img{transform:scale(1.1)}
.c-free{position:absolute;top:0;right:0;background:var(--orange);color:white;font-size:10px;font-weight:900;letter-spacing:.5px;padding:5px 12px 5px 18px;clip-path:polygon(16px 0,100% 0,100% 100%,0 100%)}
.c-lock{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.65);color:var(--text3);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.c-body{padding:14px 16px}
.c-title{font-size:14px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.c-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);font-weight:700}
.c-dot{width:3px;height:3px;border-radius:50%;background:var(--text3)}
/* PROGRESS BAR ON CARD */
.c-progress{height:3px;background:var(--border2);position:relative}
.c-progress-fill{height:100%;background:var(--orange);transition:width .5s}
/* SEARCH RESULTS */
.search-results{padding:80px 44px 40px}
.search-title{font-size:22px;font-weight:900;margin-bottom:24px;color:var(--text)}
.search-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:20px}
/* VIDEO PAGE */
.v-page{padding-top:64px;min-height:100vh}
.v-hero{background:var(--bg2);border-bottom:1px solid var(--border2)}
.v-player-wrap{max-width:980px;margin:0 auto;padding:28px 40px}
.v-embed{position:relative;width:100%;background:#000;border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 28px 80px rgba(0,0,0,.8)}
.v-placeholder{aspect-ratio:16/9;background:#050412;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--text3)}
.play-btn{width:76px;height:76px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:all .3s;animation:pulse 2.5s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(242,142,20,.5)}70%{box-shadow:0 0 0 18px rgba(242,142,20,0)}100%{box-shadow:0 0 0 0 rgba(242,142,20,0)}}
.v-frame{width:100%;aspect-ratio:16/9;border:none;display:block}
.v-info{max-width:980px;margin:0 auto;padding:24px 40px 20px}
.v-title{font-family:"Cormorant Garamond",serif;font-size:34px;font-weight:700;margin-bottom:14px}
.v-meta-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:20px;border-bottom:1px solid var(--border2);margin-bottom:20px;flex-wrap:wrap;gap:12px}
.v-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(242,142,20,.12);color:var(--orange);border:1px solid rgba(242,142,20,.3);padding:5px 14px;border-radius:20px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px}
.v-desc{font-size:15px;color:var(--text2);line-height:1.8;margin-bottom:24px}
/* COURSE PROGRESS */
.course-progress-wrap{background:var(--card);border:1.5px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:24px}
.cp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cp-title{font-size:14px;font-weight:800;color:var(--text)}
.cp-pct{font-size:22px;font-weight:900;color:var(--orange);font-family:"Cormorant Garamond",serif}
.cp-bar{height:8px;background:var(--border2);border-radius:4px;overflow:hidden}
.cp-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--orange2));border-radius:4px;transition:width .6s}
.cp-stats{display:flex;gap:20px;margin-top:10px}
.cp-stat{font-size:12px;color:var(--text3);font-weight:700}
.cp-stat span{color:var(--text2)}
/* SUBSCRIBE WALL */
.sub-wall{background:linear-gradient(135deg,var(--bg2),var(--navy3));border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:48px 40px;text-align:center;margin:28px 0}
.sub-wall h3{font-family:"Cormorant Garamond",serif;font-size:32px;font-weight:700;margin-bottom:12px}
.sub-wall p{font-size:15px;color:var(--text2);margin-bottom:24px;line-height:1.65}
.price-big{font-family:"Cormorant Garamond",serif;font-size:56px;font-weight:700;color:var(--orange);line-height:1}
.price-sub{font-size:13px;color:var(--text3);margin-bottom:28px;font-weight:700}
/* PARTS */
.parts-section{padding:0 40px 32px;max-width:980px;margin:0 auto}
.parts-title{font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.parts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.part-card{background:var(--card);border:1.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .25s}
.part-card:hover:not(.locked){border-color:var(--orange);transform:translateY(-2px)}
.part-card.playing{border-color:var(--orange);background:var(--card2)}
.part-card.locked{opacity:.5;cursor:default}
.part-card.watched .part-thumb::after{content:"✓";position:absolute;top:6px;left:8px;background:rgba(34,197,94,.9);color:white;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900}
.part-thumb{position:relative;aspect-ratio:16/9;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:var(--text3);letter-spacing:1px}
.lock-ov{position:absolute;inset:0;background:rgba(7,6,20,.55);display:flex;align-items:center;justify-content:center;font-size:20px}
.p-dur{position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,.82);color:white;font-size:10px;font-weight:800;padding:2px 6px;border-radius:3px}
.part-body{padding:10px 12px}
.part-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.35}
.part-free-tag{font-size:10px;color:var(--orange);font-weight:900;margin-top:3px;letter-spacing:.5px}
/* COMMENTS */
.comments-section{padding:0 40px 48px;max-width:980px;margin:0 auto}
.comments-title{font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.comment-form{background:var(--card);border:1.5px solid var(--border2);border-radius:var(--radius-lg);padding:20px;margin-bottom:24px}
.comment-form textarea{width:100%;background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;font-family:"Nunito Sans",sans-serif;font-size:14px;color:var(--text);resize:vertical;min-height:80px;outline:none;transition:border-color .2s;font-weight:600}
.comment-form textarea:focus{border-color:var(--orange)}
.comment-form-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.comment-item{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--border2)}
.comment-item:last-child{border-bottom:none}
.comment-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--navy2));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0;color:white}
.comment-body{flex:1}
.comment-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.comment-author{font-size:13px;font-weight:800;color:var(--text)}
.comment-date{font-size:11px;color:var(--text3);font-weight:700}
.comment-text{font-size:14px;color:var(--text2);line-height:1.65;font-weight:500}
.comment-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;padding:2px 6px;border-radius:4px;transition:all .2s}
.comment-del:hover{color:var(--red);background:rgba(239,68,68,.1)}
.no-comments{text-align:center;padding:32px;color:var(--text3);font-size:14px;font-weight:700}
/* CERTIFICATE */
.cert-section{padding:0 40px 32px;max-width:980px;margin:0 auto}
.cert-card{background:linear-gradient(135deg,var(--navy3),#0a0840);border:2px solid var(--orange);border-radius:var(--radius-lg);padding:28px 32px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
.cert-left h3{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:700;margin-bottom:6px}
.cert-left p{font-size:13px;color:var(--text2);font-weight:600}
/* AUTH MODAL */
.overlay{position:fixed;inset:0;z-index:400;background:rgba(4,2,20,.88);backdrop-filter:blur(18px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border:1.5px solid var(--border);border-top:3px solid var(--orange);border-radius:16px;padding:40px;max-width:440px;width:100%;position:relative;transform:translateY(28px) scale(.97);transition:all .3s;box-shadow:0 32px 80px rgba(0,0,0,.6)}
.overlay.open .modal{transform:translateY(0) scale(1)}
.modal-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.06);border:none;cursor:pointer;width:32px;height:32px;border-radius:8px;color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:rgba(255,255,255,.14);color:white}
.modal-logo{margin-bottom:18px}
.modal-logo img{height:36px;width:auto;filter:brightness(0) invert(1)}
.modal-title{font-size:22px;font-weight:900;margin-bottom:4px;color:var(--text)}
.modal-sub{font-size:13px;color:var(--text3);margin-bottom:20px;font-weight:600}
.f-group{margin-bottom:14px;position:relative}
.f-label{font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:6px}
.f-input{width:100%;padding:11px 14px;background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:8px;font-family:"Nunito Sans",sans-serif;font-size:14px;color:var(--text);outline:none;transition:all .2s;font-weight:600}
.f-input:focus{border-color:var(--orange);background:rgba(255,255,255,.08)}
.f-input.error{border-color:var(--red);background:rgba(239,68,68,.06)}
.f-input.success{border-color:var(--green)}
.f-pw-wrap{position:relative}
.f-pw-wrap .f-input{padding-right:44px}
.f-pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:4px;transition:color .2s}
.f-pw-toggle:hover{color:var(--text)}
.f-hint{font-size:11px;color:var(--text3);margin-top:4px;font-weight:600}
.f-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px;font-weight:700;display:none;align-items:center;gap:8px}
.f-error.show{display:flex}
.f-success-msg{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.25);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--green);margin-bottom:14px;font-weight:700;display:none;align-items:center;gap:8px}
.f-success-msg.show{display:flex}
.auth-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 24px;background:linear-gradient(135deg,var(--orange),var(--orange2));color:white;font-family:"Nunito Sans",sans-serif;font-size:14px;font-weight:900;border:none;border-radius:10px;cursor:pointer;margin-top:4px;transition:all .3s;letter-spacing:.3px}
.auth-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(242,142,20,.35)}
.auth-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.auth-divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--text3);font-size:12px;font-weight:700}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border2)}
.modal-switch{text-align:center;font-size:13px;color:var(--text3);margin-top:16px;font-weight:700}
.modal-switch a{color:var(--orange);cursor:pointer;font-weight:800;transition:opacity .2s}
.modal-switch a:hover{opacity:.8}
.pw-strength{height:4px;border-radius:2px;margin-top:6px;background:var(--border2);overflow:hidden;transition:all .3s}
.pw-strength-bar{height:100%;border-radius:2px;transition:all .4s}
.pw-strength-text{font-size:11px;font-weight:800;margin-top:4px}
.confirm-screen{text-align:center;padding:8px 0}
.confirm-icon{font-size:60px;margin-bottom:16px;animation:bounceIn .5s ease}
@keyframes bounceIn{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.confirm-steps{background:rgba(242,142,20,.06);border:1px solid rgba(242,142,20,.15);border-radius:10px;padding:16px;margin:16px 0;text-align:left}
.confirm-step{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2);font-weight:600;padding:5px 0}
.confirm-step-num{width:22px;height:22px;border-radius:50%;background:var(--orange);color:white;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.reset-success{text-align:center;padding:8px 0}
/* STATS SECTION */
.stats-section{padding:60px 44px;background:linear-gradient(135deg,var(--bg2),var(--navy3));border-top:1px solid var(--border2);border-bottom:1px solid var(--border2)}
.stats-section-title{text-align:center;font-family:"Cormorant Garamond",serif;font-size:clamp(28px,4vw,42px);font-weight:700;margin-bottom:10px}
.stats-section-sub{text-align:center;color:var(--text2);font-size:15px;margin-bottom:44px;font-weight:600}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;max-width:900px;margin:0 auto}
.stat-item{text-align:center;padding:28px 20px;background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:var(--radius-lg);transition:all .3s}
.stat-item:hover{border-color:var(--orange);transform:translateY(-4px)}
.stat-num{font-family:"Cormorant Garamond",serif;font-size:52px;font-weight:700;color:var(--orange);line-height:1}
.stat-lbl{font-size:13px;color:var(--text2);font-weight:800;margin-top:8px;letter-spacing:.3px}
/* TESTIMONIALS */
.testimonials{padding:60px 44px}
.section-head{text-align:center;margin-bottom:44px}
.section-title{font-family:"Cormorant Garamond",serif;font-size:clamp(28px,4vw,42px);font-weight:700;margin-bottom:10px}
.section-sub{color:var(--text2);font-size:15px;font-weight:600}
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:1100px;margin:0 auto}
.testi-card{background:var(--card);border:1.5px solid var(--border2);border-radius:var(--radius-lg);padding:28px;transition:all .3s}
.testi-card:hover{border-color:var(--orange);transform:translateY(-4px)}
.testi-stars{color:var(--orange);font-size:16px;margin-bottom:14px;letter-spacing:2px}
.testi-text{font-size:14px;color:var(--text2);line-height:1.75;font-weight:500;margin-bottom:20px;font-style:italic}
.testi-author{display:flex;align-items:center;gap:12px}
.testi-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--navy2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:white;flex-shrink:0}
.testi-name{font-size:14px;font-weight:800;color:var(--text)}
.testi-role{font-size:12px;color:var(--text3);font-weight:700;margin-top:2px}
/* FAQ */
.faq-section{padding:60px 44px;background:var(--bg2);border-top:1px solid var(--border2)}
.faq-list{max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
.faq-item{background:var(--card);border:1.5px solid var(--border2);border-radius:var(--radius-lg);overflow:hidden;transition:border-color .3s}
.faq-item.open{border-color:var(--orange)}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;cursor:pointer;font-size:15px;font-weight:800;color:var(--text);gap:16px}
.faq-icon{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:rgba(242,142,20,.12);color:var(--orange);display:flex;align-items:center;justify-content:center;font-size:16px;transition:transform .3s}
.faq-item.open .faq-icon{transform:rotate(45deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .3s}
.faq-item.open .faq-a{max-height:600px;padding:0 24px 20px}
.faq-a-text{font-size:14px;color:var(--text2);line-height:1.75;font-weight:500}
/* CERT PROMO */
.cert-promo{padding:60px 44px;background:linear-gradient(135deg,var(--navy3) 0%,#0a0840 50%,var(--bg) 100%);border-top:1px solid var(--border2)}
.cert-promo-inner{max-width:900px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
.cert-promo-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(242,142,20,.15);border:1.5px solid rgba(242,142,20,.4);color:var(--orange);font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:6px 16px;border-radius:20px;margin-bottom:16px}
.cert-promo h2{font-family:"Cormorant Garamond",serif;font-size:clamp(26px,3.5vw,40px);font-weight:700;line-height:1.15;margin-bottom:14px}
.cert-promo p{font-size:15px;color:var(--text2);line-height:1.75;margin-bottom:28px;font-weight:500}
.cert-features{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.cert-feat{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text2);font-weight:600}
.cert-feat-icon{color:var(--green);font-size:16px;flex-shrink:0}
.cert-visual{background:linear-gradient(135deg,var(--navy2),var(--navy3));border:2px solid var(--orange);border-radius:16px;padding:36px 28px;text-align:center}
.cert-visual-icon{font-size:64px;margin-bottom:16px}
.cert-visual h3{font-family:"Cormorant Garamond",serif;font-size:24px;font-weight:700;margin-bottom:8px}
.cert-visual p{font-size:13px;color:var(--text2);font-weight:600}
/* BLOG */
.blog-section{padding:60px 44px;border-top:1px solid var(--border2)}
.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:1100px;margin:0 auto}
.blog-card{background:var(--card);border:1.5px solid var(--border2);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:all .3s}
.blog-card:hover{border-color:var(--orange);transform:translateY(-4px)}
.blog-thumb{aspect-ratio:16/9;overflow:hidden;background:var(--bg3)}
.blog-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.blog-card:hover .blog-thumb img{transform:scale(1.07)}
.blog-body{padding:20px}
.blog-tag{display:inline-block;background:rgba(242,142,20,.12);color:var(--orange);font-size:10px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:10px;margin-bottom:12px}
.blog-title{font-size:15px;font-weight:800;color:var(--text);line-height:1.4;margin-bottom:10px}
.blog-desc{font-size:13px;color:var(--text3);line-height:1.65;font-weight:500}
/* WELCOME SCREEN */
.welcome-overlay{position:fixed;inset:0;z-index:650;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(4,2,18,.92);backdrop-filter:blur(24px);animation:wOverlayIn .5s ease}
@keyframes wOverlayIn{from{opacity:0}to{opacity:1}}
.welcome-box{position:relative;max-width:540px;width:100%;border-radius:20px;overflow:hidden;animation:wBoxIn .7s cubic-bezier(.22,1,.36,1)}
@keyframes wBoxIn{from{transform:translateY(48px);opacity:0}to{transform:translateY(0);opacity:1}}
.welcome-canvas{position:absolute;inset:0;z-index:0;width:100%;height:100%}
.welcome-close{position:absolute;top:18px;right:18px;z-index:10;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);cursor:pointer;width:34px;height:34px;border-radius:50%;color:rgba(255,255,255,.45);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .25s}
.welcome-close:hover{background:rgba(255,255,255,.14);color:white;border-color:rgba(255,255,255,.2)}
.welcome-inner{position:relative;z-index:2;padding:56px 44px 48px}
.welcome-label{font-size:11px;font-weight:800;color:var(--orange);letter-spacing:3px;text-transform:uppercase;margin-bottom:24px;display:flex;align-items:center;gap:10px;animation:wFadeUp .6s ease .2s both}
.welcome-label::before,.welcome-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(242,142,20,.4))}
.welcome-label::after{background:linear-gradient(90deg,rgba(242,142,20,.4),transparent)}
.welcome-title{font-family:"Cormorant Garamond",serif;font-size:clamp(32px,6vw,50px);font-weight:700;color:#fff;line-height:1.1;margin-bottom:6px;animation:wFadeUp .6s ease .35s both}
.welcome-name-line{font-family:"Cormorant Garamond",serif;font-size:clamp(32px,6vw,50px);font-weight:400;font-style:italic;color:var(--orange);line-height:1.1;margin-bottom:28px;animation:wFadeUp .6s ease .45s both}
.welcome-desc{font-size:15px;color:rgba(255,255,255,.55);line-height:1.85;margin-bottom:36px;font-weight:400;animation:wFadeUp .6s ease .55s both;max-width:380px}
.welcome-desc em{color:rgba(255,255,255,.85);font-style:normal;font-weight:600}
.welcome-line{width:48px;height:2px;background:linear-gradient(90deg,var(--orange),transparent);margin-bottom:32px;animation:wLineIn .8s ease .4s both}
@keyframes wLineIn{from{width:0;opacity:0}to{width:48px;opacity:1}}
.welcome-stats{display:flex;gap:32px;margin-bottom:40px;animation:wFadeUp .6s ease .65s both}
.welcome-stat-item{display:flex;flex-direction:column;gap:3px}
.welcome-stat-num{font-family:"Cormorant Garamond",serif;font-size:28px;font-weight:700;color:#fff;line-height:1}
.welcome-stat-lbl{font-size:11px;color:rgba(255,255,255,.4);font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.welcome-stat-div{width:1px;background:rgba(255,255,255,.1);align-self:stretch}
.welcome-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 28px;background:var(--orange);color:white;font-family:"Nunito Sans",sans-serif;font-size:14px;font-weight:800;border:none;border-radius:8px;cursor:pointer;transition:all .3s;letter-spacing:.3px;animation:wFadeUp .6s ease .75s both}
.welcome-btn:hover{background:var(--orange2);transform:translateY(-2px);box-shadow:0 10px 28px rgba(242,142,20,.35)}
.welcome-btn-arrow{font-size:18px;transition:transform .3s}
.welcome-btn:hover .welcome-btn-arrow{transform:translateX(4px)}
.welcome-img-side{position:absolute;right:0;top:0;bottom:0;width:42%;z-index:1;overflow:hidden}
.welcome-img-side::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,#090620 0%,rgba(9,6,32,.4) 40%,transparent 100%);z-index:2}
@keyframes wFadeUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.welcome-skip{background:none;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.45);padding:13px 20px;border-radius:8px;cursor:pointer;font-family:"Nunito Sans",sans-serif;font-size:13px;font-weight:700;transition:all .2s}
.welcome-skip:hover{border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.7)}
.w-guide-steps{display:flex;flex-direction:column;gap:12px}
.w-guide-step{display:flex;align-items:flex-start;gap:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px 16px}
.w-guide-num{width:28px;height:28px;border-radius:50%;background:var(--orange);color:white;font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.w-guide-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:3px}
.w-guide-desc{font-size:12px;color:rgba(255,255,255,.5);font-weight:600;line-height:1.5}
/* PROMO POPUP *//* PROMO POPUP */
.promo-overlay{position:fixed;inset:0;z-index:600;background:rgba(4,2,20,.88);backdrop-filter:blur(18px);display:flex;align-items:center;justify-content:center;padding:20px;animation:promoFadeIn .4s ease}
@keyframes promoFadeIn{from{opacity:0}to{opacity:1}}
.promo-box{position:relative;max-width:480px;width:100%;background:linear-gradient(145deg,#0d0a2e,#1a0f5c,#0a0835);border:2px solid var(--orange);border-radius:20px;overflow:hidden;animation:promoSlideUp .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes promoSlideUp{from{transform:translateY(60px) scale(.92);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.promo-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.promo-particle{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--orange);animation:particleFloat linear infinite;opacity:.7}
@keyframes particleFloat{0%{transform:translateY(100%) rotate(0);opacity:.7}100%{transform:translateY(-100vh) rotate(360deg);opacity:0}}
.promo-glow{position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:200px;height:200px;background:radial-gradient(circle,rgba(242,142,20,.25) 0%,transparent 70%);pointer-events:none}
.promo-inner{position:relative;padding:36px 32px;text-align:center}
.promo-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.08);border:none;cursor:pointer;width:32px;height:32px;border-radius:50%;color:rgba(255,255,255,.5);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.promo-close:hover{background:rgba(255,255,255,.18);color:white}
.promo-badge{display:inline-block;font-size:11px;font-weight:900;padding:5px 18px;border-radius:20px;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;animation:badgePulse 1.5s ease-in-out infinite}
@keyframes badgePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.promo-title{font-family:"Cormorant Garamond",serif;font-size:clamp(24px,5vw,32px);font-weight:700;line-height:1.15;margin-bottom:8px}
.promo-subtitle{font-size:13px;color:rgba(255,255,255,.55);font-weight:700;margin-bottom:14px;letter-spacing:.5px;text-transform:uppercase}
.promo-desc{font-size:15px;color:rgba(255,255,255,.82);line-height:1.7;margin-bottom:20px;font-weight:500}
.promo-limit{font-size:12px;font-weight:900;color:#f87171;margin-bottom:8px;letter-spacing:.5px;animation:limitBlink .8s ease-in-out infinite}
@keyframes limitBlink{0%,100%{opacity:1}50%{opacity:.6}}
.promo-timer{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
.promo-timer-unit{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:10px 14px;min-width:58px;text-align:center}
.promo-timer-num{font-family:"Cormorant Garamond",serif;font-size:28px;font-weight:700;color:var(--orange);line-height:1}
.promo-timer-lbl{font-size:9px;color:rgba(255,255,255,.4);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.promo-btn{display:block;width:100%;padding:14px 24px;background:linear-gradient(135deg,var(--orange),var(--orange2));color:white;font-family:"Nunito Sans",sans-serif;font-size:15px;font-weight:900;border:none;border-radius:10px;cursor:pointer;margin-bottom:12px;transition:all .3s;letter-spacing:.3px}
.promo-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(242,142,20,.45)}
.promo-skip{font-size:12px;color:rgba(255,255,255,.35);cursor:pointer;transition:color .2s;background:none;border:none;font-family:"Nunito Sans",sans-serif;font-weight:700}
.promo-skip:hover{color:rgba(255,255,255,.6)}
.promo-decor-line{height:2px;background:linear-gradient(90deg,transparent,var(--orange),transparent);margin:20px 0;opacity:.4}
/* SECURITY - Video download bloku */
.v-embed iframe{pointer-events:auto}
.v-embed::after{content:'';position:absolute;inset:0;z-index:1;background:transparent}
.video-shield{position:absolute;inset:0;z-index:2;background:transparent;user-select:none}

/* SESSION KICKED MODAL */
.kicked-overlay{position:fixed;inset:0;z-index:700;background:rgba(4,2,20,.96);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;padding:20px}
.kicked-box{background:var(--card);border:2px solid var(--red);border-radius:20px;padding:48px;text-align:center;max-width:440px;width:100%;animation:promoSlideUp .4s ease}
.kicked-icon{font-size:64px;margin-bottom:20px}
.kicked-title{font-size:24px;font-weight:900;color:var(--red);margin-bottom:10px}
.kicked-desc{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:24px;font-weight:500}

/* COMMUNITY PANEL */
.community-page{padding-top:64px;min-height:100vh}
.community-header{background:linear-gradient(135deg,var(--bg2),var(--navy3));border-bottom:1px solid var(--border2);padding:32px 44px}
.community-tabs{display:flex;gap:4px;background:rgba(255,255,255,.04);border-radius:10px;padding:4px;max-width:400px;margin-top:20px}
.comm-tab{flex:1;padding:10px 16px;border:none;border-radius:8px;font-family:"Nunito Sans",sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;color:var(--text3);background:transparent}
.comm-tab.active{background:var(--orange);color:white}
.community-body{padding:28px 44px;max-width:1100px;margin:0 auto}
.works-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.work-card{background:var(--card);border:1.5px solid var(--border2);border-radius:var(--radius-lg);overflow:hidden;transition:all .3s}
.work-card:hover{border-color:var(--orange);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.5)}
.work-thumb{aspect-ratio:4/3;overflow:hidden;background:var(--bg3);position:relative}
.work-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.work-card:hover .work-thumb img{transform:scale(1.06)}
.work-body{padding:16px}
.work-title{font-size:14px;font-weight:800;margin-bottom:6px}
.work-author{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.work-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--navy2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:white;flex-shrink:0}
.work-author-name{font-size:12px;color:var(--text3);font-weight:700}
.work-actions{display:flex;align-items:center;justify-content:space-between}
.like-btn{display:flex;align-items:center;gap:6px;background:none;border:1.5px solid var(--border2);border-radius:20px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:800;color:var(--text3);transition:all .2s;font-family:"Nunito Sans",sans-serif}
.like-btn.liked{border-color:var(--red);color:var(--red);background:rgba(248,113,113,.08)}
.like-btn:hover{border-color:var(--red);color:var(--red)}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:40px;text-align:center;cursor:pointer;transition:all .3s;margin-bottom:20px}
.upload-zone:hover{border-color:var(--orange);background:rgba(242,142,20,.04)}
.upload-zone-icon{font-size:48px;margin-bottom:12px}
.upload-zone-text{font-size:15px;font-weight:800;color:var(--text2);margin-bottom:6px}
.upload-zone-sub{font-size:13px;color:var(--text3);font-weight:600}

/* NOTES PANEL */
.notes-panel{background:var(--card);border:1.5px solid var(--border2);border-radius:var(--radius-lg);padding:20px;margin-top:20px}
.notes-panel-title{font-size:15px;font-weight:900;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.note-item{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:12px 14px;margin-bottom:10px;position:relative}
.note-timestamp{display:inline-block;background:rgba(242,142,20,.15);color:var(--orange);font-size:11px;font-weight:900;padding:2px 8px;border-radius:10px;margin-bottom:6px;cursor:pointer}
.note-text{font-size:13px;color:var(--text2);line-height:1.6;font-weight:500}
.note-del{position:absolute;top:10px;right:10px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;transition:color .2s}
.note-del:hover{color:var(--red)}
.note-add-form{display:flex;gap:8px;margin-top:12px}
.note-add-form input{flex:1;background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-family:"Nunito Sans",sans-serif;font-size:13px;color:var(--text);outline:none;font-weight:600}
.note-add-form input:focus{border-color:var(--orange)}

/* QUESTIONS */
.q-item{background:var(--card);border:1.5px solid var(--border2);border-radius:var(--radius-lg);padding:20px;margin-bottom:14px}
.q-status{display:inline-block;font-size:10px;font-weight:900;padding:3px 10px;border-radius:10px;margin-bottom:10px;letter-spacing:.5px}
.q-status.pending{background:rgba(251,191,36,.12);color:#fbbf24}
.q-status.answered{background:rgba(74,222,128,.12);color:var(--green)}
.q-text{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px}
.q-answer{background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.2);border-radius:8px;padding:12px;margin-top:10px}
.q-answer-label{font-size:11px;font-weight:900;color:var(--green);margin-bottom:6px;letter-spacing:.5px}
.q-answer-text{font-size:13px;color:var(--text2);line-height:1.65;font-weight:500}

/* WHATSAPP */
.wa-btn{position:fixed;bottom:28px;right:28px;z-index:301;background:#25D366;color:white;width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;box-shadow:0 6px 24px rgba(37,211,102,.4);border:none;transition:all .3s;animation:waPulse 2.5s infinite}
@keyframes waPulse{0%{box-shadow:0 0 0 0 rgba(37,211,102,.5)}70%{box-shadow:0 0 0 16px rgba(37,211,102,0)}100%{box-shadow:0 0 0 0 rgba(37,211,102,0)}}
.wa-btn:hover{transform:scale(1.1)}
@keyframes waSlideIn{from{transform:translateY(80px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes waBubbleIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
/* STATIC PAGES */
.static-page{padding:100px 44px 60px;max-width:820px;margin:0 auto}
.static-page h1{font-family:"Cormorant Garamond",serif;font-size:clamp(32px,5vw,52px);font-weight:700;margin-bottom:12px}
.static-page .static-sub{font-size:15px;color:var(--text3);margin-bottom:40px;font-weight:600}
.static-page h2{font-size:20px;font-weight:900;color:var(--text);margin:32px 0 12px}
.static-page p{font-size:15px;color:var(--text2);line-height:1.85;margin-bottom:14px;font-weight:500}
.static-page ul{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.static-page ul li{font-size:15px;color:var(--text2);font-weight:500;padding-left:20px;position:relative;line-height:1.7}
.static-page ul li::before{content:"→";position:absolute;left:0;color:var(--orange)}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:500;background:var(--card2);border:1.5px solid var(--border);border-left:3px solid var(--orange);color:var(--text);padding:14px 22px;border-radius:10px;font-size:14px;font-weight:700;box-shadow:0 8px 32px rgba(0,0,0,.45);transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{border-left-color:var(--red)}
/* ADMIN */
.admin-page{padding-top:64px;min-height:100vh}
.admin-header{background:var(--bg2);border-bottom:1px solid var(--border2);padding:22px 40px;display:flex;align-items:center;justify-content:space-between}
.admin-body{padding:28px 40px;display:grid;grid-template-columns:210px 1fr;gap:24px}
.admin-nav{display:flex;flex-direction:column;gap:4px}
.admin-nav-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;color:var(--text2);background:none;border:none;text-align:left;transition:all .2s}
.admin-nav-item:hover{background:rgba(255,255,255,.05);color:var(--text)}
.admin-nav-item.active{background:rgba(242,142,20,.12);color:var(--orange)}
.a-card{background:var(--card);border:1.5px solid var(--border2);border-radius:var(--radius-lg);padding:26px;margin-bottom:20px}
.a-card-title{font-size:16px;font-weight:900;margin-bottom:20px;color:var(--text)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-box{background:var(--card);border:1.5px solid var(--border2);border-radius:var(--radius-lg);padding:20px 22px}
.stat-box.hl{border-color:var(--orange);background:rgba(242,142,20,.06)}
.stat-val{font-family:"Cormorant Garamond",serif;font-size:38px;font-weight:700;color:var(--text);line-height:1}
.stat-box.hl .stat-val{color:var(--orange)}
.stat-label{font-size:11px;color:var(--text3);margin-top:6px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.a-table{width:100%;border-collapse:collapse}
.a-table th{text-align:left;padding:10px 14px;font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;border-bottom:1.5px solid var(--border2)}
.a-table td{padding:12px 14px;font-size:13px;color:var(--text2);border-bottom:1px solid var(--border2);font-weight:600;vertical-align:middle}
.a-table tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.5px}
.badge-free{background:rgba(105,41,242,.18);color:var(--purple)}
.badge-paid{background:rgba(242,142,20,.14);color:var(--orange)}
.badge-b{background:rgba(34,197,94,.14);color:var(--green)}
.badge-m{background:rgba(59,130,246,.14);color:var(--blue)}
.badge-a{background:rgba(239,68,68,.14);color:var(--red)}
.a-form .f-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.a-select{width:100%;padding:11px 14px;background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:7px;font-family:"Nunito Sans",sans-serif;font-size:14px;color:var(--text);outline:none;font-weight:600;appearance:none;cursor:pointer}
.a-select:focus{border-color:var(--orange)}
.a-textarea{width:100%;padding:11px 14px;min-height:90px;resize:vertical;background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:7px;font-family:"Nunito Sans",sans-serif;font-size:14px;color:var(--text);outline:none;font-weight:600}
.a-textarea:focus{border-color:var(--orange)}
.divider{height:1px;background:var(--border2);margin:20px 0}
.bar-wrap{margin-bottom:14px}
.bar-label{display:flex;justify-content:space-between;margin-bottom:6px}
.bar-track{height:6px;background:var(--border2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:var(--orange);border-radius:3px;transition:width .6s}
.checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;cursor:pointer}
.checkbox-row input{width:16px;height:16px;accent-color:var(--orange);cursor:pointer}
.checkbox-row label{font-size:14px;font-weight:700;color:var(--text2);cursor:pointer}
/* PROFILE */
.profile-page{padding-top:64px;min-height:100vh}
.profile-header{background:var(--bg2);border-bottom:1px solid var(--border2);padding:32px 44px;display:flex;align-items:center;gap:24px}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--navy2));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:white;flex-shrink:0}
.profile-name{font-size:24px;font-weight:900}
.profile-email{font-size:14px;color:var(--text3);font-weight:700;margin-top:4px}
.profile-body{padding:28px 44px;display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1000px}
.profile-card{background:var(--card);border:1.5px solid var(--border2);border-radius:var(--radius-lg);padding:24px}
.profile-card-title{font-size:15px;font-weight:900;margin-bottom:16px;color:var(--text)}
/* MOBILE */
.mobile-menu{display:none;position:fixed;top:64px;left:0;right:0;bottom:0;background:var(--bg2);z-index:150;padding:24px;flex-direction:column;overflow-y:auto;border-top:1px solid var(--border2)}
.mobile-menu.open{display:flex}
.mobile-menu a{font-size:16px;font-weight:700;color:var(--text2);padding:16px 0;border-bottom:1px solid var(--border2);cursor:pointer;display:block}
/* FOOTER */
footer{background:var(--bg2);border-top:1px solid var(--border2);padding:36px 44px;margin-top:48px}
.footer-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.footer-links{display:flex;gap:20px;list-style:none}
.footer-links a{font-size:11px;color:var(--text3);cursor:pointer;font-weight:800;text-transform:uppercase;letter-spacing:.8px;transition:color .2s}
.footer-links a:hover{color:var(--orange)}
.footer-copy{font-size:12px;color:var(--text3);font-weight:700}
/* LOADING */
.spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px;color:var(--text3);font-size:14px;font-weight:700}
/* RESPONSIVE */
@media(max-width:1024px){.stats-grid{grid-template-columns:repeat(2,1fr)}.admin-body{grid-template-columns:1fr;padding:16px}.admin-nav{flex-direction:row;flex-wrap:wrap}.profile-body{grid-template-columns:1fr}}
/* MOBILE BOTTOM NAVBAR */
.mobile-navbar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:300;background:rgba(7,6,20,.97);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.08);padding:8px 0 max(8px,env(safe-area-inset-bottom));grid-template-columns:repeat(4,1fr)}
.mnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;cursor:pointer;transition:all .2s;border:none;background:none;color:rgba(255,255,255,.45);font-family:"Nunito Sans",sans-serif}
.mnav-item.active{color:var(--orange)}
.mnav-item:hover{color:rgba(255,255,255,.8)}
.mnav-icon{font-size:20px;line-height:1}
.mnav-label{font-size:10px;font-weight:800;letter-spacing:.3px}
/* CONTINUE CARD */
.continue-card{background:linear-gradient(135deg,rgba(242,142,20,.12),rgba(243,113,38,.08));border:1.5px solid rgba(242,142,20,.3);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .3s;margin:0 44px 28px}
.continue-card:hover{border-color:var(--orange);transform:translateY(-2px);box-shadow:0 8px 24px rgba(242,142,20,.15)}
.continue-icon{font-size:32px;flex-shrink:0}
.continue-body{flex:1;min-width:0}
.continue-label{font-size:11px;font-weight:800;color:var(--orange);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.continue-title{font-size:15px;font-weight:900;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.continue-sub{font-size:12px;color:var(--text3);font-weight:600;margin-top:2px}
.continue-arrow{font-size:20px;color:var(--orange);flex-shrink:0}
/* STREAK WIDGET */
.streak-widget{background:var(--card);border:1.5px solid var(--border2);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;margin:0 44px 20px}
.streak-fire{font-size:28px}
.streak-body{flex:1}
.streak-num{font-family:"Cormorant Garamond",serif;font-size:26px;font-weight:700;color:var(--orange);line-height:1}
.streak-lbl{font-size:12px;color:var(--text3);font-weight:700}
.week-mins{text-align:right}
.week-mins-num{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:700;color:var(--text)}
.week-mins-lbl{font-size:11px;color:var(--text3);font-weight:700}
/* FOMO BADGE */
.fomo-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:20px;padding:4px 10px;font-size:11px;color:#f87171;font-weight:800}
/* COURSE DURATION */
.course-duration{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.05);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--text3);font-weight:700}
/* COURSE PURPOSE */
.course-purpose{background:rgba(242,142,20,.06);border-left:3px solid var(--orange);border-radius:0 8px 8px 0;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--text2);line-height:1.65;font-weight:600}
/* MONEY BACK */
.money-back-badge{display:flex;align-items:center;gap:10px;background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.2);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--green);font-weight:700;margin-bottom:16px}
/* BADGE CHIPS */
.badge-chip{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(242,142,20,.15),rgba(243,113,38,.1));border:1px solid rgba(242,142,20,.3);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:800;color:var(--orange)}
/* LEVEL TEST */
.level-test-overlay{position:fixed;inset:0;z-index:500;background:rgba(4,2,18,.95);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;padding:20px;animation:wOverlayIn .4s ease}
.level-test-box{background:var(--card);border:1.5px solid var(--border2);border-top:3px solid var(--orange);border-radius:20px;padding:40px;max-width:480px;width:100%;animation:wBoxIn .5s cubic-bezier(.22,1,.36,1)}
.lt-progress{display:flex;gap:6px;margin-bottom:28px}
.lt-dot{height:4px;border-radius:2px;flex:1;background:var(--border2);transition:background .3s}
.lt-dot.done{background:var(--orange)}
.lt-question{font-size:18px;font-weight:900;color:var(--text);margin-bottom:20px;line-height:1.4}
.lt-option{display:block;width:100%;padding:13px 18px;background:rgba(255,255,255,.04);border:1.5px solid var(--border2);border-radius:10px;color:var(--text);font-family:"Nunito Sans",sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px;text-align:left;transition:all .2s}
.lt-option:hover{border-color:var(--orange);background:rgba(242,142,20,.08);color:white}
.lt-option.selected{border-color:var(--orange);background:rgba(242,142,20,.12);color:white}
.lt-result{text-align:center;padding:8px 0}
.lt-result-icon{font-size:56px;margin-bottom:12px}
.lt-result-title{font-size:22px;font-weight:900;margin-bottom:8px}
.lt-result-sub{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.65;font-weight:600}
/* WELCOME QUIZ */
.quiz-overlay{position:fixed;inset:0;z-index:500;background:rgba(4,2,18,.95);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;padding:20px;animation:wOverlayIn .4s ease}
.quiz-box{background:var(--card);border:1.5px solid var(--border2);border-top:3px solid var(--orange);border-radius:20px;padding:40px;max-width:480px;width:100%;animation:wBoxIn .5s cubic-bezier(.22,1,.36,1)}
.quiz-progress{display:flex;gap:6px;margin-bottom:28px}
.quiz-dot{height:4px;border-radius:2px;flex:1;background:var(--border2);transition:background .3s}
.quiz-dot.done{background:var(--orange)}
.quiz-question{font-size:18px;font-weight:900;color:var(--text);margin-bottom:20px;line-height:1.4}
.quiz-option{display:block;width:100%;padding:13px 18px;background:rgba(255,255,255,.04);border:1.5px solid var(--border2);border-radius:10px;color:var(--text);font-family:"Nunito Sans",sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px;text-align:left;transition:all .2s}
.quiz-option:hover{border-color:var(--orange);background:rgba(242,142,20,.08);color:white}
.quiz-skip{background:none;border:none;color:var(--text3);font-size:12px;font-weight:700;cursor:pointer;margin-top:12px;padding:4px 8px}
@media(max-width:768px){
  .slide-bg{transform:none!important;transition:none!important}
  .nav{padding:0 12px;height:56px}
  .nav-links,.nav-right .btn-outline,.nav-search{display:none}
  .burger{display:flex}
  
  /* Hero - tam genişlik */
  .hero{height:85vw;min-height:360px;max-height:520px}
  .slide-content{left:16px;right:16px;bottom:70px;max-width:100%}
  .slide-title{font-size:22px!important;line-height:1.25}
  .slide-desc{display:none}
  .slide-actions{gap:8px}
  .slider-arrow{width:36px;height:36px;font-size:18px}
  
  /* Kurs kartları - tam genişlik */
  .cat-row{padding:0 12px;margin-bottom:36px}
  .row-scroll{padding-bottom:12px}
  .c-card{flex:0 0 calc(50vw - 20px);min-width:140px;max-width:200px}
  .c-thumb{height:110px}
  .c-title{font-size:12px}
  .c-meta{font-size:10px}
  
  /* Browse section */
  .browse{padding-top:8px}
  
  /* Video səhifəsi */
  .v-player-wrap,.v-info{padding:12px 14px}
  .v-embed{height:52vw;min-height:200px}
  .parts-section,.comments-section,.cert-section{padding:0 12px 20px}
  .parts-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .part-card{min-height:90px}
  
  /* Admin */
  .admin-header{padding:12px 16px}
  .a-form .f-row{grid-template-columns:1fr}
  
  /* Footer */
  footer{padding:20px 14px}
  .footer-inner{flex-direction:column;align-items:flex-start;gap:12px}
  
  /* Profile */
  .profile-header{padding:20px 16px;flex-direction:column;align-items:flex-start}
  .profile-body{padding:12px 16px;grid-template-columns:1fr}
  
  /* Digər */
  .search-results{padding:70px 12px 24px}
  .modal{padding:24px 16px;margin:8px}
  .sub-wall{padding:24px 16px}
  .cert-card{flex-direction:column}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  
  /* Stats */
  .stats-row{grid-template-columns:repeat(2,1fr);gap:16px}
  
  /* Testimonials */
  .testi-grid{grid-template-columns:1fr}
  
  /* Blog */
  .blog-grid{grid-template-columns:1fr}
  
  /* Welcome modal */
  .welcome-box{border-radius:16px}
  .welcome-inner{padding:36px 24px 32px}
  .welcome-stats{gap:16px}
  .welcome-stat-num{font-size:22px}
  
  /* Auth modal */
  .overlay{padding:12px}
  
  /* Community */
  .works-grid{grid-template-columns:repeat(2,1fr)!important}
  
  /* FAQ */
  .faq-list{padding:0}
  /* Mobile navbar */
  .mobile-navbar{display:grid}
  /* Continue card */
  .continue-card{margin:0 12px 20px}
  /* Streak */
  .streak-widget{margin:0 12px 16px}
  /* Body padding for navbar */
  body{padding-bottom:70px}
  /* WhatsApp button above mobile navbar */
  .wa-btn{bottom:84px}

// ── SUPABASE ────────────────────────────────────────────────
function initSB(){
  try{
    sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

    // Email təsdiq linkindən gələn token-i tut
    // Supabase emaildəki link: https://online.artmoniya.com#access_token=...&type=signup
    const hash = window.location.hash;
    if(hash && hash.includes('access_token')){
      // URL-i təmizlə — token görünməsin
      window.history.replaceState({}, document.title, window.location.pathname);
      // onAuthStateChange avtomatik sessiya yaradacaq
      sb.auth.getSession().then(({data:{session}})=>{
        if(session?.user){
          S._isNewUser = hash.includes('type=signup');
          setUser(session.user).then(()=>{
            if(S._isNewUser){
              showToast('Email təsdiqləndi! Xoş gəldiniz 🎨');
            } else {
              showToast('Uğurla daxil oldunuz! 👋');
            }
          });
        }
      });
      return;
    }

    // Şifrə sıfırlama linkindən gələn token
    if(hash && hash.includes('type=recovery')){
      window.history.replaceState({}, document.title, window.location.pathname);
      sb.auth.getSession().then(({data:{session}})=>{
        if(session?.user){
          // Yeni şifrə təyin etmə modalı aç
          S.authMode = 'new-password';
          render();
        }
      });
      return;
    }

    // Load admin settings from Supabase
    loadSettings();
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user) setUser(session.user);
    });
    sb.auth.onAuthStateChange((_,session)=>{
      if(session?.user){
        if(!S.user || S.user.id !== session.user.id){
          setUser(session.user);
        }
      } else {
        S.user=null; S.progress={}; S.comments={}; S.certificates=[]; S.subscription=null;
        S.sessionToken=null;
        clearInterval(window._sessionCheck);
        render();
      }
    });
  }catch(e){console.warn('Supabase init failed',e);}
}
async function setUser(u){
  S.user={
    name:u.user_metadata?.full_name||u.email.split('@')[0],
    email:u.email,
    phone:u.user_metadata?.phone||u.phone||'',
    id:u.id,
    subscribed:false,
    admin: u.email==='artmoniaacademy@gmail.com'
  };
  await Promise.all([loadSubscription(), loadProgress(), loadCertificates()]);
  // Session guard başlat
  await initSessionGuard();
  render();
  // Pending free part varsa - hesab yaradıldıqdan sonra video aç
  if(S._pendingFreePart){
    const {courseId,partId}=S._pendingFreePart;
    S._pendingFreePart=null;
    setTimeout(()=>selectPart(courseId,partId),500);
  }
  // Yeni qeydiyyat üçün xoş gəldin ekranı göstər
  if(S._isNewUser){
    S._isNewUser=false;
    setTimeout(()=>{
      showWelcomeScreen(S.user.name);
      render();
      setTimeout(()=>initWelcomeCanvas(),100);
    },400);
    // Welcome bağlandıqdan sonra level test aç (yalnız bir dəfə)
    if(!S.levelTestDone){
      setTimeout(()=>{
        S.showWelcome=false;
        S.showLevelTest=true;
        render();
      },6000);
    }
  }
}
async function loadSubscription(){
  if(!sb||!S.user) return;
  try{
    const {data}=await sb.from('subscriptions').select('*').eq('user_id',S.user.id).eq('status','active').single();
    if(data){
      // Bitmə tarixini yoxla
      if(data.expires_at){
        const exp=new Date(data.expires_at);
        const now=new Date();
        const daysLeft=Math.ceil((exp-now)/(1000*60*60*24));
        if(exp<now){
          // Abunəlik bitib — Supabase-də yenilə
          await sb.from('subscriptions').update({status:'expired'}).eq('id',data.id).catch(()=>{});
          S.user.subscribed=false;
          return;
        }
        S.subscription=data;
        S.user.subscribed=true;
        S.user.daysLeft=daysLeft;
        // 3 gündən az qalıbsa xəbərdar et
        if(daysLeft<=3 && daysLeft>0){
          setTimeout(()=>showToast('⚠️ Abunəliyiniz '+daysLeft+' gün sonra bitir!','error'),2000);
        }
      } else {
        S.subscription=data;
        S.user.subscribed=true;
      }
    }
  }catch(e){console.error('Artmonia error:',e)}
}
async function loadProgress(){
  if(!sb||!S.user) return;

    const {data}=await sb.from('progress').select('*').eq('user_id',S.user.id);

    (data||[]).forEach(p=>{ if(!S.progress[p.course_id]) S.progress[p.course_id]={}; S.progress[p.course_id][p.part_id]=true; });

function updateStreak(){
  const today=new Date().toDateString();
  const last=S.streakLastDate;
  if(last===today) return;
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(last===yesterday){
    S.streakDays++;
  } else if(!last){
    S.streakDays=1;
  } else {
    S.streakDays=1; // Streak qırıldı, yenidən başla
  }
  S.streakLastDate=today;
  localStorage.setItem('artmonia_streak',JSON.stringify({days:S.streakDays,last:today}));
  if(S.streakDays>1) showToast('🔥 '+S.streakDays+' gün ardıcıl streak!');
}

function updateWeeklyMinutes(mins){
  S.weeklyMinutes=(S.weeklyMinutes||0)+mins;
  localStorage.setItem('artmonia_weekly_mins', JSON.stringify({mins:S.weeklyMinutes,week:getWeekKey()}));
}

function getWeekKey(){
  const d=new Date();
  const oneJan=new Date(d.getFullYear(),0,1);
  const weekNum=Math.ceil(((d-oneJan)/86400000+oneJan.getDay()+1)/7);
  return d.getFullYear()+'-W'+weekNum;
}

function checkBadges(){
  const newBadges=[];
  // Hər 3 kursu bitirdikdə badge
  const completedCourses=S.certificates.length;
  if(completedCourses>=1 && !S.badges.includes('🥉 İlk Sertifikat')) newBadges.push('🥉 İlk Sertifikat');
  if(completedCourses>=3 && !S.badges.includes('🥈 3 Kurs')) newBadges.push('🥈 3 Kurs');
  if(completedCourses>=5 && !S.badges.includes('🥇 5 Kurs')) newBadges.push('🥇 5 Kurs');
  if(S.streakDays>=7 && !S.badges.includes('🔥 7 Gün Streak')) newBadges.push('🔥 7 Gün Streak');
  if(S.streakDays>=30 && !S.badges.includes('⭐ 30 Gün Streak')) newBadges.push('⭐ 30 Gün Streak');
  if(newBadges.length){
    S.badges=[...S.badges,...newBadges];
    newBadges.forEach(b=>setTimeout(()=>showToast('🏆 Yeni badge: '+b),500));
    localStorage.setItem('artmonia_badges',JSON.stringify(S.badges));
  }
}

function loadLocalStats(){
  try{
    const streak=JSON.parse(localStorage.getItem('artmonia_streak')||'null');
    if(streak){S.streakDays=streak.days||0;S.streakLastDate=streak.last||null;}
    const weekly=JSON.parse(localStorage.getItem('artmonia_weekly_mins')||'null');

    const badges=JSON.parse(localStorage.getItem('artmonia_badges')||'null');
    if(badges) S.badges=badges;
  }catch(e){console.error('Artmonia error:',e)}
}

// ── VIDEO TOKEN SYSTEM ────────────────────────────────────
const EDGE_URL = 'https://rugigxxhwbykcmbwcisk.supabase.co/functions/v1/video-token';
let videoTokenCache = {}; // cache: partId -> {embed_url, expires_at}

function getVimeoId(url){
  if(!url) return null;
  const vm = url.match(/vimeo\.com\/(\d+)/);
  return vm ? vm[1] : null;
}

function getYoutubeId(url){
  if(!url) return null;
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
  return yt ? yt[1] : null;
}

// Sadə embed URL (ödənişsiz və ya YouTube)
function getEmbedUrl(url){
  if(!url) return null;
  const vm = getVimeoId(url);
  if(vm) return `https://player.vimeo.com/video/${vm}?autoplay=1&color=F28E14&title=0&byline=0&portrait=0&dnt=1`;
  const yt = getYoutubeId(url);
  if(yt) return `https://www.youtube.com/embed/${yt}?autoplay=1`;
  return null;
}

// Token ilə qorunan video URL al
async function getSecureEmbedUrl(part, courseId){
  if(!part.vimeo) return null;
  const ytId = getYoutubeId(part.vimeo);
  if(ytId) return `https://www.youtube.com/embed/${ytId}?autoplay=1`; // YouTube token yoxdur

  const vimeoId = getVimeoId(part.vimeo);
  if(!vimeoId) return null;

  // Cache yoxla
  const cacheKey = `${part.id}`;
  const cached = videoTokenCache[cacheKey];
  if(cached && new Date(cached.expires_at) > new Date()) return cached.embed_url;

  // Ödənişsiz hissə
  if(part.free){
    const url = getEmbedUrl(part.vimeo);
    videoTokenCache[cacheKey] = {embed_url: url, expires_at: new Date(Date.now()+3600000).toISOString()};
    return url;
  }

  // Auth yoxla
  if(!sb || !S.user) return null;
  const {data:{session}} = await sb.auth.getSession();
  if(!session) return null;

  try{
    const resp = await fetch(EDGE_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`
      },
      body: JSON.stringify({
        vimeo_id: vimeoId,
        course_id: courseId,
        part_id: part.id,
        is_free: part.free
      })
    });
    const data = await resp.json();
    if(data.error){
      if(data.code === 'SUBSCRIPTION_REQUIRED') openAuth('register');
      return null;
    }
    videoTokenCache[cacheKey] = {embed_url: data.embed_url, expires_at: data.expires_at};
    return data.embed_url;
  } catch(e){
    console.warn('Token fetch failed, fallback:', e);
    return getEmbedUrl(part.vimeo); // fallback
  }
}
function getCourseProgress(courseId){const c=S.courses.find(x=>x.id===courseId);if(!c||!c.parts.length)return 0;const watched=Object.keys(S.progress[courseId]||{}).length;return Math.round(watched/c.parts.length*100);}
function isWatched(courseId,partId){return !!(S.progress[courseId]&&S.progress[courseId][partId]);}
function timeAgo(dateStr){const d=new Date(dateStr),now=new Date(),diff=Math.floor((now-d)/1000);if(diff<60)return 'indi';if(diff<3600)return Math.floor(diff/60)+' dəq əvvəl';if(diff<86400)return Math.floor(diff/3600)+' saat əvvəl';return Math.floor(diff/86400)+' gün əvvəl';}

// ── CERTIFICATE GENERATOR ──────────────────────────────────
function downloadCertificate(courseId){
  const course=S.courses.find(c=>c.id===courseId);
  if(!course||!S.user){return;}
  const canvas=document.createElement('canvas');
  canvas.width=1200;canvas.height=800;
  const ctx=canvas.getContext('2d');
  // Background
  const bg=ctx.createLinearGradient(0,0,1200,800);
  bg.addColorStop(0,'#070614');bg.addColorStop(1,'#0C0259');
  ctx.fillStyle=bg;ctx.fillRect(0,0,1200,800);
  // Border
  ctx.strokeStyle='#F28E14';ctx.lineWidth=8;ctx.strokeRect(20,20,1160,760);
  ctx.strokeStyle='rgba(242,142,20,0.3)';ctx.lineWidth=2;ctx.strokeRect(36,36,1128,728);
  // Title
  ctx.fillStyle='#F28E14';ctx.font='bold 28px serif';ctx.textAlign='center';
  ctx.fillText('ARTMONIA ONLINE AKADEMİYA',600,100);
  // Main text
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='22px sans-serif';
  ctx.fillText('Bu sertifikat təsdiq edir ki,',600,200);
  ctx.fillStyle='#ffffff';ctx.font='bold 56px serif';
  ctx.fillText(S.user.name,600,290);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='22px sans-serif';
  ctx.fillText('aşağıdakı kursu uğurla tamamlamışdır:',600,360);
  ctx.fillStyle='#F28E14';ctx.font='bold 36px serif';
  // Word wrap course title
  const words=course.title.split(' ');let line='',y=430;
  words.forEach(w=>{const test=line+w+' ';if(ctx.measureText(test).width>900&&line){ctx.fillText(line,600,y);line=w+' ';y+=50;}else{line=test;}});
  ctx.fillText(line,600,y);
  // Date
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='18px sans-serif';
  ctx.fillText(new Date().toLocaleDateString('az-AZ',{year:'numeric',month:'long',day:'numeric'}),600,y+80);
  // Bottom line
  ctx.strokeStyle='rgba(242,142,20,0.4)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(100,y+130);ctx.lineTo(1100,y+130);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='14px sans-serif';
  ctx.fillText('artmoniya.com — Online Rəssamlıq Akademiyası',600,y+160);
  // Download
  const a=document.createElement('a');
  a.download=`Artmonia_Sertifikat_${course.title.replace(/[^a-zA-Z0-9]/g,'_')}.png`;
  a.href=canvas.toDataURL('image/png');a.click();
  showToast('Sertifikat yükləndi! 🎓');
}

}

function renderHero(){const h=document.getElementById('hero');if(!h)return;h.querySelectorAll('.slide').forEach((s,i)=>s.className='slide'+(i===slideIdx?' active':''));h.querySelectorAll('.dot').forEach((d,i)=>d.className='dot'+(i===slideIdx?' active':''));}

function progressBarHTML(courseId){
  const c=S.courses.find(x=>x.id===courseId);
  if(!c||!S.user)return '';
  const watched=Object.keys(S.progress[courseId]||{}).length;
  const total=c.parts.length;
  const pct=total?Math.round(watched/total*100):0;
  return `<div class="course-progress-wrap">
    <div class="cp-header"><div class="cp-title">📈 Sizin Proqresiniz</div><div class="cp-pct">${pct}%</div></div>
    <div class="cp-bar"><div class="cp-fill" style="width:${pct}%"></div></div>
    <div class="cp-stats">
      <div class="cp-stat">İzləndi: <span>${watched}</span></div>
      <div class="cp-stat">Qalıb: <span>${total-watched}</span></div>
      <div class="cp-stat">Cəmi: <span>${total} hissə</span></div>
    </div>
  </div>`;
}

function renderComments(courseId){
  const el=document.getElementById(`comments-list-${courseId}`);
  const countEl=document.getElementById(`comment-count-${courseId}`);
  if(!el)return;
  const list=S.comments[courseId]||[];
  if(countEl)countEl.textContent=`(${list.length})`;
  if(!list.length){el.innerHTML='<div class="no-comments">Hələ şərh yoxdur. İlk şərhi siz yazın!</div>';return;}
  el.innerHTML=list.map(cm=>{
    const initial=(cm.profiles?.full_name||cm.user_id||'?')[0].toUpperCase();
    const isOwn=S.user&&cm.user_id===S.user.id;
    return `<div class="comment-item">
      <div class="comment-avatar">${initial}</div>
      <div class="comment-body">
        <div class="comment-header">
          <span class="comment-author">${esc(cm.profiles?.full_name||'İstifadəçi')}</span>
          <span class="comment-date">${timeAgo(cm.created_at)}</span>
          ${isOwn?`<button class="comment-del" onclick="deleteComment(${courseId},'${cm.id}')">🗑</button>`:''}
        </div>
        <div class="comment-text">${esc(cm.content)}</div>
      </div>
    </div>`;
  }).join('');
}
function updateProgressUI(courseId){
  const bar=document.querySelector(`[data-progress="${courseId}"]`);
  if(bar){const pct=getCourseProgress(courseId);bar.style.width=pct+'%';}
  // update cp-fill
  const cpFill=document.querySelector('.cp-fill');
  if(cpFill){const pct=getCourseProgress(courseId);cpFill.style.width=pct+'%';cpFill.closest('.course-progress-wrap').querySelector('.cp-pct').textContent=pct+'%';}
}
function renderCertSection(courseId){
  const el=document.getElementById(`cert-${courseId}`);
  if(el){el.outerHTML=certSectionHTML(courseId);}else{
    const ps=document.querySelector('.parts-section');
    if(ps)ps.insertAdjacentHTML('afterend',certSectionHTML(courseId));
  }
}

function continueCardHTML(){
  if(!S.user) return '';
  // Ən son izlənən kursu tap
  let lastCourse=null, lastPart=null;
  let maxProgress=0;
  S.courses.forEach(c=>{
    const prog=S.progress[c.id]||{};
    const watched=Object.keys(prog).length;
    if(watched>0 && watched<c.parts.length){
      const pct=watched/c.parts.length;
      if(pct>maxProgress){
        maxProgress=pct;
        lastCourse=c;
        // Növbəti izlənməmiş hissəni tap
        lastPart=c.parts.find(p=>!prog[p.id])||c.parts[c.parts.length-1];
      }
    }
  });
  if(!lastCourse||!lastPart) return '';
  const pct=getCourseProgress(lastCourse.id);
  return `<div class="continue-card" onclick="openCourse(${lastCourse.id})">
    <div class="continue-icon">▶️</div>
    <div class="continue-body">
      <div class="continue-label">${t('continue_label')}</div>
      <div class="continue-title">${esc(lastCourse.title)}</div>
      <div class="continue-sub">${esc(lastPart.name)} · ${pct}% tamamlandı</div>
    </div>
    <div class="continue-arrow">→</div>
  </div>`;
}

        ${[0,1,2].map(i=>`<div class="lt-dot ${i<step?'done':i===step?'done':''}" style="${i===step?'background:var(--orange)':i<step?'background:var(--orange);opacity:.5':''}"></div>`).join('')}
      </div>
      <div class="lt-question">${q.q}</div>
      ${q.opts.map((opt,i)=>`<button class="lt-option ${S.levelTestAnswers[step]===i?'selected':''}" onclick="selectLevelAnswer(${step},${i})">${opt}</button>`).join('')}
    </div>
  </div>`;
}

function selectLevelAnswer(step,answerIdx){
  S.levelTestAnswers[step]=answerIdx;
  if(step<2){
    S.levelTestStep=step+1;
    render();
  } else {
    S.levelTestResult=getLevelTestResult();
    render();
  }
}

function getLevelTestResult(){
  const ans=S.levelTestAnswers;
  const exp=ans[0]||0; // 0=yeni, 1=hobbi, 2=orta, 3=professional
  const tech=ans[1]||0; // 0=yağlı, 1=akril, 2=suluboya, 3=bilmir
  // Nəticəni müəyyən et
  if(exp<=1){
    return {title:'Başlanğıc Rəssam 🌱',icon:'🌱',desc:'Sıfırdan başlamaq üçün doğru kurs seçdik. Ödənişsiz dərsimizdən başlayın!',courseId:1};
  } else if(exp===2){
    if(tech===1) return {title:'Akril Sevdalısı 🎨',icon:'🎨',desc:'Akril texnikasını dərinləşdirmək üçün bu kurs sizin üçündür.',courseId:2};
    if(tech===2) return {title:'Suluboya Ustası 💧',icon:'💧',desc:'Suluboya texnikasını öyrənmək üçün mükəmməl başlanğıc.',courseId:3};
    return {title:'Orta Səviyyə 📈',icon:'📈',desc:'Artıq bilik var — daha mürəkkəb texnikalara keçmək vaxtıdır.',courseId:4};
  } else {
    return {title:'İrəli Səviyyə 🚀',icon:'🚀',desc:'Professional yolda ciddi addım atmağa hazırsınız.',courseId:6};
  }
}

async function selectPart(courseId,partId){
  const c=S.courses.find(x=>x.id==courseId);if(!c)return;
  const p=c.parts.find(x=>x.id===partId);if(!p)return;
  if(!p.free){
    if(!S.user){ openAuth('register'); return; } // login deyilsə → qeydiyyat
    if(!S.user.subscribed && !S.user.admin){
      S.showSubModal=true;render();

  // Əgər pending free part varsa sil
  if(S._pendingFreePart) S._pendingFreePart=null;

async function submitAuth(){
  if(!sb){showToast('Supabase bağlı deyil','error');return;}
  const btn=document.getElementById('auth-btn');
  const mode=S.authMode;
  const name=(document.getElementById('f-name')?.value||'').trim();
  const phone=(document.getElementById('f-phone')?.value||'').trim();
  const email=(document.getElementById('f-email')?.value||'').trim().toLowerCase();
  const pw=document.getElementById('f-pw')?.value||'';

  // Validation
  const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if(!email){showAuthError('Email ünvanı daxil edin');return;}
  if(!emailRegex.test(email)){showAuthError('Düzgün email ünvanı daxil edin (məs: ad@gmail.com)');return;}
  if(!pw){showAuthError('Şifrə daxil edin');return;}
  if(mode==='register'){
    if(!name){showAuthError('Ad Soyad daxil edin');return;}
    if(name.length<3){showAuthError('Ad Soyad minimum 3 simvol olmalıdır');return;}
    if(pw.length<8){showAuthError('Şifrə minimum 8 simvol olmalıdır');return;}
    if(!/[A-Za-z]/.test(pw)||!/[0-9]/.test(pw)){showAuthError('Şifrədə həm hərf həm rəqəm olmalıdır');return;}
  } else {
    if(pw.length<6){showAuthError('Şifrə minimum 6 simvol olmalıdır');return;}
  }

  if(btn){btn.innerHTML='<div class="spinner" style="width:18px;height:18px;border-width:2px;display:inline-block"></div> Gözləyin...';btn.disabled=true;}
  const _btnResetTimer=setTimeout(()=>{if(btn&&btn.disabled){btn.innerHTML=mode==='login'?'Daxil ol →':'Hesab Yarat →';btn.disabled=false;}},5000);
  document.getElementById('auth-error')?.classList.remove('show');

  try{
    if(mode==='register'){
      const {data,error}=await sb.auth.signUp({
        email,
        password:pw,
        options:{data:{full_name:name,phone:phone}}
      });
      if(error)throw error;
      if(data?.user&&data.user.confirmed_at){
        S._isNewUser=true;
        await setUser(data.user);
        closeAuth();
      } else if(data?.user){
        S.authMode='confirm';
        S.pendingEmail=email;
        S.pendingPassword=pw;
        render();
      } else {
        S.authMode='confirm';
        S.pendingEmail=email;
        S.pendingPassword=pw;
        render();
      }
      return;
    } else {
      const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
      if(error)throw error;
      await setUser(data.user);
      closeAuth();
      showToast('Xoş gəldiniz, '+(S.user?.name||'')+'! 👋');
      if(!S.subscription && !localStorage.getItem('artmonia_sub_offer_shown')){
        S.showSubOffer=true;
        localStorage.setItem('artmonia_sub_offer_shown','1');
        render();
      }
      return;
    }
  }catch(e){
    const msgs={
      'Invalid login credentials':'Email və ya şifrə yanlışdır. Yenidən cəhd edin.',
      'Email not confirmed':'Email təsdiq edilməyib. Emailinizi yoxlayın.',
      'User already registered':'Bu email artıq qeydiyyatdadır. Daxil olmağa cəhd edin.',
      'Password should be at least 6 characters':'Şifrə minimum 6 simvol olmalıdır.',
      'signup_disabled':'Qeydiyyat müvəqqəti bağlıdır.',
      'over_email_send_rate_limit':'Çox tez-tez cəhd edildi. Bir az gözləyin.',
      'Email rate limit exceeded':'Email limiti aşıldı. Bir az gözləyin.',
      'Invalid email':'Email ünvanı düzgün deyil.',
    };
    const msg=msgs[e.message]||msgs[e.error_description]||('Xəta: '+e.message);
    showAuthError(msg);
  }
  clearTimeout(_btnResetTimer);
  if(btn){btn.innerHTML=mode==='login'?'Daxil ol →':'Hesab Yarat →';btn.disabled=false;}
}
