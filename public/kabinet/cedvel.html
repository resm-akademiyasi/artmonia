  <script>
    requireAuth();

    const DAY_NAMES = ['Bazar', 'Bazar ert…ôsi', '√á…ôr≈ü…ônb…ô ax≈üamƒ±', '√á…ôr≈ü…ônb…ô', 'C√ºm…ô ax≈üamƒ±', 'C√ºm…ô', '≈û…ônb…ô'];
    const DAY_ORDER = ['Bazar ert…ôsi', '√á…ôr≈ü…ônb…ô ax≈üamƒ±', '√á…ôr≈ü…ônb…ô', 'C√ºm…ô ax≈üamƒ±', 'C√ºm…ô', '≈û…ônb…ô', 'Bazar'];

    async function loadSchedule() {
      const student = await getStudent();
      const container = document.getElementById('content');

      if (!student || !student.groups) {
        container.innerHTML = '<div class="empty-state">H…ôl…ô qrupa t…ôyin edilm…ômisiniz</div>';
        return;
      }

      const schedule = student.groups.schedule;
      if (!schedule || !schedule.length) {
        container.innerHTML = '<div class="empty-state">C…ôdv…ôl h…ôl…ô t…ôyin edilm…ôyib</div>';
        return;
      }

      const todayName = DAY_NAMES[new Date().getDay()];

      // Group by day
      const byDay = {};
      schedule.forEach(item => {
        if (!byDay[item.day]) byDay[item.day] = [];
        byDay[item.day].push(item);
      });

      let html = '';
      DAY_ORDER.forEach(day => {
        if (!byDay[day]) return;
        const isToday = day === todayName;
        html += `<div class="day-section">
          <div class="day-title">${day}${isToday ? '<span class="today-label">Bu g√ºn</span>' : ''}</div>`;
        byDay[day].sort((a, b) => (a.time || '').localeCompare(b.time || '')).forEach(item => {
          html += `<div class="schedule-card${isToday ? ' today' : ''}">
            <div class="sc-time">${item.time || '--:--'}</div>
            <div class="sc-info">
              <div class="sc-teacher">${item.teacher || 'M√º…ôllim t…ôyin edilm…ôyib'}</div>
              <div class="sc-room">${item.room ? 'Otaq: ' + item.room : ''}</div>
            </div>
          </div>`;
        });
        html += '</div>';
      });

      container.innerHTML = html || '<div class="empty-state">C…ôdv…ôl h…ôl…ô t…ôyin edilm…ôyib</div>';
    }

    loadSchedule();
  </script>
