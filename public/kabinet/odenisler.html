<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odenishler — Artmonia Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0b0b1a;
      --bg2: #0f0e24;
      --card: #14122a;
      --card2: #1a1835;
      --border: #252240;
      --accent: #f97316;
      --accent-hover: #fb923c;
      --text: #ffffff;
      --text2: #b0acd0;
      --text3: #6b6790;
      --green: #4ade80;
      --blue: #60a5fa;
      --red: #f87171;
      --sidebar-w: 260px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      transition: transform .3s ease;
    }

    .sidebar-logo {
      padding: 28px 24px 20px;
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .5px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      color: var(--text2);
      text-decoration: none;
      font-size: .935rem;
      font-weight: 500;
      border-left: 3px solid transparent;
      transition: all .2s ease;
    }

    .sidebar-nav a:hover {
      color: var(--text);
      background: rgba(249, 115, 22, .06);
    }

    .sidebar-nav a.active {
      color: var(--text);
      border-left-color: var(--accent);
      background: rgba(249, 115, 22, .1);
    }

    .sidebar-nav a .nav-icon {
      font-size: 1.15rem;
      width: 24px;
      text-align: center;
    }

    .sidebar-bottom {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
    }

    .btn-logout {
      width: 100%;
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--text2);
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s ease;
    }

    .btn-logout:hover {
      border-color: #ef4444;
      color: #ef4444;
    }

    /* ── Main ── */
    .main {
      flex: 1;
      margin-left: var(--sidebar-w);
      padding: 32px 36px 48px;
      min-height: 100vh;
    }

    /* ── Hamburger ── */
    .hamburger {
      display: none;
      position: fixed;
      top: 16px; left: 16px;
      z-index: 200;
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      cursor: pointer;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .hamburger span {
      display: block;
      width: 20px; height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: all .3s;
    }

    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 90;
    }

    .sidebar-overlay.show { display: block; }

    /* ── Page Title ── */
    .page-title {
      font-size: 1.65rem;
      font-weight: 700;
      margin-bottom: 28px;
    }

    /* ── Summary Cards ── */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .summary-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
      text-align: center;
      transition: border-color .2s, transform .2s;
    }

    .summary-card:hover {
      border-color: rgba(249,115,22,.35);
      transform: translateY(-2px);
    }

    .summary-card .s-label {
      font-size: .8rem;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 8px;
    }

    .summary-card .s-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }

    .summary-card .s-value.accent { color: var(--accent); }

    /* ── Table ── */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      padding: 14px 18px;
      font-size: .8rem;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .5px;
      border-bottom: 1px solid var(--border);
      background: var(--card2);
    }

    tbody td {
      padding: 14px 18px;
      font-size: .9rem;
      color: var(--text2);
      border-bottom: 1px solid var(--border);
    }

    tbody tr:last-child td { border-bottom: none; }

    tbody tr:hover { background: rgba(249,115,22,.04); }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge-green { background: rgba(74,222,128,.15); color: var(--green); }
    .badge-blue { background: rgba(96,165,250,.15); color: var(--blue); }
    .badge-purple { background: rgba(168,85,247,.15); color: #a855f7; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
      font-size: 1.05rem;
    }

    .empty-state .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    /* ── Loading ── */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, rgba(255,255,255,.06) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; padding: 80px 18px 36px; }
      .summary-row { grid-template-columns: 1fr; }
      .table-wrap { overflow-x: auto; }
      table { min-width: 600px; }
    }
  </style>
</head>
<body>

  <button class="hamburger" id="hamburger" aria-label="Menyu">
    <span></span><span></span><span></span>
  </button>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">Artmonia</div>
    <nav class="sidebar-nav">
      <a href="/kabinet/dashboard.html">
        <span class="nav-icon">&#127968;</span> &#399;sas
      </a>
      <a href="/kabinet/cedvel.html">
        <span class="nav-icon">&#128197;</span> C&#601;dv&#601;l
      </a>
      <a href="/kabinet/odenisler.html" class="active">
        <span class="nav-icon">&#128179;</span> &#214;d&#601;ni&#351;l&#601;r
      </a>
      <a href="/kabinet/materiallar.html">
        <span class="nav-icon">&#128218;</span> Materiallar
      </a>
      <a href="/kabinet/reyler.html">
        <span class="nav-icon">&#11088;</span> R&#601;yl&#601;r
      </a>
      <a href="/kabinet/neticelerim.html">
        <span class="nav-icon">&#128444;&#65039;</span> N&#601;tic&#601;l&#601;rim
      </a>
      <a href="/kabinet/gamification.html">
        <span class="nav-icon">&#127918;</span> Gamification
      </a>
    </nav>
    <div class="sidebar-bottom">
      <button class="btn-logout" onclick="logoutStudent()">&#128682; &#199;&#305;x&#305;&#351;</button>
    </div>
  </aside>

  <main class="main">
    <h1 class="page-title">&#128179; &#214;d&#601;ni&#351;l&#601;r</h1>

    <div class="summary-row" id="summaryRow">
      <div class="summary-card"><div class="s-label">&#220;mumi &#246;d&#601;ni&#351;</div><div class="s-value" id="totalPaid">&#8212;</div></div>
      <div class="summary-card"><div class="s-label">Son &#246;d&#601;ni&#351; tarixi</div><div class="s-value" id="lastDate">&#8212;</div></div>
      <div class="summary-card"><div class="s-label">Cari balans</div><div class="s-value accent" id="balance">&#8212;</div></div>
    </div>

    <div id="paymentsContent">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Tarix</th><th>M&#601;bl&#601;&#287;</th><th>&#220;sul</th><th>Ay</th><th>Qeyd</th></tr></thead>
          <tbody>
            <tr><td colspan="5"><div class="skeleton" style="height:20px;width:100%"></div></td></tr>
            <tr><td colspan="5"><div class="skeleton" style="height:20px;width:80%"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase-kabinet.js"></script>
  <script src="/js/auth-kabinet.js"></script>
  <script src="/js/gamification.js"></script>

  <script>
    requireAuth(['student'], '/kabinet/index.html');

    const hamburger = document.getElementById('hamburger');
    const sidebar   = document.getElementById('sidebar');
    const overlay   = document.getElementById('sidebarOverlay');

    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      sidebar.classList.toggle('open');
      overlay.classList.toggle('show');
    });

    overlay.addEventListener('click', () => {
      hamburger.classList.remove('open');
      sidebar.classList.remove('open');
      overlay.classList.remove('show');
    });

    function formatDate(iso) {
      if (!iso) return '&#8212;';
      return new Date(iso).toLocaleDateString('az-AZ', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function methodBadge(method) {
      const m = (method || '').toLowerCase();
      if (m === 'naghd' || m === 'nagd' || m === 'cash') return '<span class="badge badge-green">Na&#287;d</span>';
      if (m === 'kart' || m === 'card') return '<span class="badge badge-blue">Kart</span>';
      if (m === 'kochurme' || m === 'k&#246;&#231;&#252;rm&#601;' || m === 'transfer') return '<span class="badge badge-purple">K&#246;&#231;&#252;rm&#601;</span>';
      return '<span class="badge badge-blue">' + (method || '&#8212;') + '</span>';
    }

    async function loadPayments() {
      const student = await getStudent();
      if (!student) return;

      const { data: payments } = await sb
        .from('payments')
        .select('*')
        .eq('student_id', student.id)
        .order('paid_at', { ascending: false });

      if (!payments || payments.length === 0) {
        document.getElementById('paymentsContent').innerHTML =
          '<div class="empty-state"><div class="empty-icon">&#128179;</div><p>H&#601;l&#601; &#246;d&#601;ni&#351; qeydiyyat&#305; yoxdur</p></div>';
        return;
      }

      // Summary
      const total = payments.reduce(function(s, p) { return s + (p.amount || 0); }, 0);
      document.getElementById('totalPaid').textContent = total.toFixed(2) + ' \u20BC';
      document.getElementById('lastDate').textContent = formatDate(payments[0].paid_at || payments[0].created_at);
      const balance = student.balance != null ? student.balance : 0;
      document.getElementById('balance').textContent = balance.toFixed(2) + ' \u20BC';

      // Table
      let rows = '';
      payments.forEach(function(p) {
        rows += '<tr>' +
          '<td>' + formatDate(p.paid_at || p.created_at) + '</td>' +
          '<td style="font-weight:600;color:var(--text)">' + (p.amount || 0).toFixed(2) + ' \u20BC</td>' +
          '<td>' + methodBadge(p.method) + '</td>' +
          '<td>' + (p.month || '&#8212;') + '</td>' +
          '<td>' + (p.note || '&#8212;') + '</td>' +
        '</tr>';
      });

      document.getElementById('paymentsContent').innerHTML =
        '<div class="table-wrap"><table>' +
          '<thead><tr><th>Tarix</th><th>M&#601;bl&#601;&#287;</th><th>&#220;sul</th><th>Ay</th><th>Qeyd</th></tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table></div>';
    }

    loadPayments();
  </script>
</body>
</html>
