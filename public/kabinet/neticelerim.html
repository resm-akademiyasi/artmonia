<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neticelerim — Artmonia Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0b0b1a;
      --bg2: #0f0e24;
      --card: #14122a;
      --card2: #1a1835;
      --border: #252240;
      --accent: #f97316;
      --accent-hover: #fb923c;
      --text: #ffffff;
      --text2: #b0acd0;
      --text3: #6b6790;
      --green: #4ade80;
      --blue: #60a5fa;
      --red: #f87171;
      --yellow: #facc15;
      --sidebar-w: 260px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      transition: transform .3s ease;
    }

    .sidebar-logo {
      padding: 28px 24px 20px;
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .5px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      color: var(--text2);
      text-decoration: none;
      font-size: .935rem;
      font-weight: 500;
      border-left: 3px solid transparent;
      transition: all .2s ease;
    }

    .sidebar-nav a:hover {
      color: var(--text);
      background: rgba(249, 115, 22, .06);
    }

    .sidebar-nav a.active {
      color: var(--text);
      border-left-color: var(--accent);
      background: rgba(249, 115, 22, .1);
    }

    .sidebar-nav a .nav-icon {
      font-size: 1.15rem;
      width: 24px;
      text-align: center;
    }

    .sidebar-bottom {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
    }

    .btn-logout {
      width: 100%;
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--text2);
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s ease;
    }

    .btn-logout:hover { border-color: #ef4444; color: #ef4444; }

    /* ── Main ── */
    .main {
      flex: 1;
      margin-left: var(--sidebar-w);
      padding: 32px 36px 48px;
      min-height: 100vh;
    }

    /* ── Hamburger ── */
    .hamburger {
      display: none;
      position: fixed;
      top: 16px; left: 16px;
      z-index: 200;
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      cursor: pointer;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .hamburger span {
      display: block;
      width: 20px; height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: all .3s;
    }

    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 90;
    }

    .sidebar-overlay.show { display: block; }

    .page-title {
      font-size: 1.65rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    /* ── Buttons ── */
    .btn-primary {
      padding: 10px 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h2 {
      font-size: 1.3rem;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: .85rem;
      color: var(--text2);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-group input[type="text"],
    .form-group input[type="file"] {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: .9rem;
      font-family: 'Inter', sans-serif;
    }

    .form-group input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-group .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .form-group .checkbox-wrap input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .btn-cancel {
      padding: 10px 24px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text2);
      font-size: .9rem;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-cancel:hover { border-color: var(--text2); color: var(--text); }

    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Artwork Grid ── */
    .artworks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .art-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color .2s, transform .2s;
    }

    .art-card:hover {
      border-color: rgba(249,115,22,.4);
      transform: translateY(-2px);
    }

    .art-card .art-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .art-card .art-pair {
      display: flex;
    }

    .art-card .art-pair img {
      width: 50%;
      aspect-ratio: 1;
      object-fit: cover;
    }

    .art-card .art-info {
      padding: 14px 16px;
    }

    .art-card .art-title {
      font-weight: 600;
      font-size: .95rem;
      margin-bottom: 4px;
    }

    .art-card .art-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: .8rem;
      color: var(--text3);
    }

    .art-card .art-likes {
      color: var(--red);
    }

    .art-card .art-status {
      font-size: .75rem;
      font-weight: 600;
    }

    .art-card .art-status.approved { color: var(--green); }
    .art-card .art-status.pending { color: var(--yellow); }

    /* ── Empty ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
      font-size: 1.05rem;
    }

    .empty-state .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, rgba(255,255,255,.06) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; padding: 80px 18px 36px; }
      .artworks-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 480px) {
      .artworks-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <button class="hamburger" id="hamburger" aria-label="Menyu">
    <span></span><span></span><span></span>
  </button>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">Artmonia</div>
    <nav class="sidebar-nav">
      <a href="/kabinet/dashboard.html">
        <span class="nav-icon">&#127968;</span> &#399;sas
      </a>
      <a href="/kabinet/cedvel.html">
        <span class="nav-icon">&#128197;</span> C&#601;dv&#601;l
      </a>
      <a href="/kabinet/odenisler.html">
        <span class="nav-icon">&#128179;</span> &#214;d&#601;ni&#351;l&#601;r
      </a>
      <a href="/kabinet/materiallar.html">
        <span class="nav-icon">&#128218;</span> Materiallar
      </a>
      <a href="/kabinet/reyler.html">
        <span class="nav-icon">&#11088;</span> R&#601;yl&#601;r
      </a>
      <a href="/kabinet/neticelerim.html" class="active">
        <span class="nav-icon">&#128444;&#65039;</span> N&#601;tic&#601;l&#601;rim
      </a>
      <a href="/kabinet/gamification.html">
        <span class="nav-icon">&#127918;</span> Gamification
      </a>
    </nav>
    <div class="sidebar-bottom">
      <button class="btn-logout" onclick="logout()">&#128682; &#199;&#305;x&#305;&#351;</button>
    </div>
  </aside>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="uploadModal">
    <div class="modal">
      <h2>Yeni &#399;s&#601;r Y&#252;kl&#601;</h2>
      <div class="form-group">
        <label>Ba&#351;l&#305;q</label>
        <input type="text" id="artTitle" placeholder="&#399;s&#601;rin ad&#305;...">
      </div>
      <div class="form-group">
        <label>&#350;&#601;kil</label>
        <input type="file" id="artFile" accept="image/*">
      </div>
      <div class="form-group">
        <label class="checkbox-wrap">
          <input type="checkbox" id="isBeforeAfter">
          Before/After &#601;s&#601;rdir
        </label>
      </div>
      <div class="form-group" id="beforeGroup" style="display:none">
        <label>&#399;vv&#601;lki &#351;&#601;kil (Before)</label>
        <input type="file" id="artBefore" accept="image/*">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">L&#601;&#287;v et</button>
        <button class="btn-primary" id="btnUpload" onclick="uploadArtwork()">Y&#252;kl&#601;</button>
      </div>
    </div>
  </div>

  <main class="main">
    <div class="page-header">
      <h1 class="page-title">&#128444;&#65039; &#399;s&#601;rl&#601;rim</h1>
      <button class="btn-primary" onclick="openModal()">+ Yeni &#399;s&#601;r Y&#252;kl&#601;</button>
    </div>

    <div id="artworksContent">
      <div class="artworks-grid">
        <div class="art-card skeleton" style="height:280px"></div>
        <div class="art-card skeleton" style="height:280px"></div>
        <div class="art-card skeleton" style="height:280px"></div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase-kabinet.js"></script>
  <script src="/js/auth-kabinet.js"></script>
  <script src="/js/gamification.js"></script>

  <script>
    requireRole('student');

    var hamburger = document.getElementById('hamburger');
    var sidebar   = document.getElementById('sidebar');
    var sOverlay  = document.getElementById('sidebarOverlay');

    hamburger.addEventListener('click', function() {
      hamburger.classList.toggle('open');
      sidebar.classList.toggle('open');
      sOverlay.classList.toggle('show');
    });

    sOverlay.addEventListener('click', function() {
      hamburger.classList.remove('open');
      sidebar.classList.remove('open');
      sOverlay.classList.remove('show');
    });

    // Before/After toggle
    document.getElementById('isBeforeAfter').addEventListener('change', function() {
      document.getElementById('beforeGroup').style.display = this.checked ? 'block' : 'none';
    });

    var currentStudent = null;

    function openModal() {
      document.getElementById('uploadModal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('uploadModal').classList.remove('show');
      document.getElementById('artTitle').value = '';
      document.getElementById('artFile').value = '';
      document.getElementById('artBefore').value = '';
      document.getElementById('isBeforeAfter').checked = false;
      document.getElementById('beforeGroup').style.display = 'none';
      document.getElementById('btnUpload').disabled = false;
      document.getElementById('btnUpload').textContent = 'Y\u00fckl\u0259';
    }

    function formatDate(iso) {
      if (!iso) return '\u2014';
      return new Date(iso).toLocaleDateString('az-AZ', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    async function uploadFile(file, folder) {
      var ext = file.name.split('.').pop();
      var path = folder + '/' + currentStudent.id + '/' + Date.now() + '_' + Math.random().toString(36).slice(2, 8) + '.' + ext;
      var { error } = await sb.storage.from('artworks').upload(path, file);
      if (error) throw error;
      var { data } = sb.storage.from('artworks').getPublicUrl(path);
      return data.publicUrl;
    }

    async function uploadArtwork() {
      if (!currentStudent) return;
      var title = document.getElementById('artTitle').value.trim();
      var fileInput = document.getElementById('artFile');
      var beforeInput = document.getElementById('artBefore');
      var isBA = document.getElementById('isBeforeAfter').checked;

      if (!title) { alert('Ba\u015fl\u0131q daxil edin'); return; }
      if (!fileInput.files[0]) { alert('\u015e\u0259kil se\u00e7in'); return; }
      if (isBA && !beforeInput.files[0]) { alert('\u0259vv\u0259lki \u015f\u0259kili se\u00e7in'); return; }

      var btn = document.getElementById('btnUpload');
      btn.disabled = true;
      btn.textContent = 'Y\u00fckl\u0259nir...';

      try {
        var imageUrl = await uploadFile(fileInput.files[0], 'after');
        var beforeUrl = null;
        if (isBA) {
          beforeUrl = await uploadFile(beforeInput.files[0], 'before');
        }

        var insertData = {
          student_id: currentStudent.id,
          title: title,
          image_url: imageUrl,
          is_before_after: isBA
        };
        if (beforeUrl) insertData.before_image_url = beforeUrl;

        var { error } = await sb.from('artworks').insert(insertData);
        if (error) throw error;

        // Award points
        if (typeof addPoints === 'function') {
          addPoints(currentStudent.id, 'eser_yuklendi', POINT_RULES.eser_yuklendi || 2);
        }

        closeModal();
        loadArtworks();
      } catch (e) {
        alert('X\u0259ta: ' + e.message);
        btn.disabled = false;
        btn.textContent = 'Y\u00fckl\u0259';
      }
    }

    async function loadArtworks() {
      if (!currentStudent) return;

      var { data: artworks } = await sb
        .from('artworks')
        .select('*')
        .eq('student_id', currentStudent.id)
        .order('created_at', { ascending: false });

      var container = document.getElementById('artworksContent');

      if (!artworks || artworks.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">\uD83C\uDFA8</div><p>H\u0259l\u0259 \u0259s\u0259r y\u00fckl\u0259m\u0259misiniz. \u0130lk \u0259s\u0259rinizi payla\u015f\u0131n! \uD83C\uDFA8</p></div>';
        return;
      }

      var html = '<div class="artworks-grid">';
      artworks.forEach(function(a) {
        html += '<div class="art-card">';
        if (a.is_before_after && a.before_image_url) {
          html += '<div class="art-pair">' +
            '<img src="' + a.before_image_url + '" alt="Before" loading="lazy">' +
            '<img src="' + a.image_url + '" alt="After" loading="lazy">' +
          '</div>';
        } else {
          html += '<img class="art-img" src="' + a.image_url + '" alt="' + (a.title || '') + '" loading="lazy">';
        }
        html += '<div class="art-info">' +
          '<div class="art-title">' + (a.title || '\u018fs\u0259r') + '</div>' +
          '<div class="art-meta">' +
            '<span>' + formatDate(a.created_at) + '</span>' +
            '<span class="art-likes">\u2764 ' + (a.likes || 0) + '</span>' +
          '</div>' +
          '<div class="art-status ' + (a.teacher_approved ? 'approved' : 'pending') + '">' +
            (a.teacher_approved ? '\u2705 T\u0259sdiql\u0259nib' : '\u23F3 G\u00f6zl\u0259yir') +
          '</div>' +
        '</div></div>';
      });
      html += '</div>';
      container.innerHTML = html;
    }

    async function init() {
      currentStudent = await getStudent();
      if (!currentStudent) return;
      loadArtworks();
    }

    init();
  </script>
</body>
</html>
