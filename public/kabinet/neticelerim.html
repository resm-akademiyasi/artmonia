<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Əsərlərim — Artmonia Kabinet</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0b0b1a; color: #fff; min-height: 100vh; display: flex; }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }

    .sidebar { width: 260px; background: #14122a; border-right: 1px solid #252240; min-height: 100vh; padding: 24px 16px; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; }
    .sidebar-logo { font-family: 'Playfair Display', serif; font-size: 22px; color: #f97316; margin-bottom: 32px; text-align: center; text-decoration: none; display: block; }
    .sidebar-nav { list-style: none; flex: 1; }
    .sidebar-nav li { margin-bottom: 4px; }
    .sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 8px; color: #b0acd0; text-decoration: none; font-size: 14px; transition: all .2s; }
    .sidebar-nav a:hover, .sidebar-nav a.active { background: rgba(249,115,22,.12); color: #f97316; }
    .sidebar-nav a .icon { font-size: 18px; width: 24px; text-align: center; }
    .sidebar-bottom { border-top: 1px solid #252240; padding-top: 16px; margin-top: 16px; }
    .sidebar-bottom button { background: none; border: 1px solid #252240; color: #b0acd0; padding: 10px 14px; border-radius: 8px; width: 100%; cursor: pointer; font-size: 14px; transition: all .2s; }
    .sidebar-bottom button:hover { border-color: #f97316; color: #f97316; }

    .main { margin-left: 260px; flex: 1; padding: 32px; width: calc(100% - 260px); }
    .page-title { font-size: 28px; margin-bottom: 8px; }
    .empty-state { text-align: center; padding: 60px 20px; color: #6b6790; font-size: 16px; }
    .loading { text-align: center; padding: 40px; color: #6b6790; }

    /* Header Row */
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .btn-upload { background: #f97316; color: #fff; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: opacity .2s; }
    .btn-upload:hover { opacity: .85; }

    /* Artwork Grid */
    .art-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .art-card { background: #14122a; border: 1px solid #252240; border-radius: 12px; overflow: hidden; transition: border-color .2s; }
    .art-card:hover { border-color: #f97316; }
    .art-img { width: 100%; height: 200px; object-fit: cover; background: #0b0b1a; }
    .art-body { padding: 16px; }
    .art-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .art-date { font-size: 12px; color: #6b6790; }
    .art-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .art-likes { font-size: 13px; color: #b0acd0; }
    .art-approved { display: inline-block; background: rgba(34,197,94,.15); color: #22c55e; font-size: 11px; padding: 2px 8px; border-radius: 4px; }
    .art-pending { display: inline-block; background: rgba(234,179,8,.15); color: #eab308; font-size: 11px; padding: 2px 8px; border-radius: 4px; }
    .ba-toggle { margin-top: 8px; }
    .ba-toggle button { background: none; border: 1px solid #252240; color: #b0acd0; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-right: 4px; transition: all .2s; }
    .ba-toggle button.active { border-color: #f97316; color: #f97316; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #14122a; border: 1px solid #252240; border-radius: 16px; padding: 28px; width: 90%; max-width: 440px; }
    .modal h2 { font-size: 20px; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: #b0acd0; margin-bottom: 6px; }
    .form-group input[type="text"] { width: 100%; background: #0b0b1a; border: 1px solid #252240; border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 14px; outline: none; }
    .form-group input[type="text"]:focus { border-color: #f97316; }
    .form-group input[type="file"] { font-size: 13px; color: #b0acd0; }
    .form-group input[type="file"]::file-selector-button { background: #f97316; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel { background: none; border: 1px solid #252240; color: #b0acd0; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-cancel:hover { border-color: #f97316; color: #f97316; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; width: 100%; padding: 20px 16px; }
      .art-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <a href="/kabinet/dashboard.html" class="sidebar-logo">Artmonia</a>
    <ul class="sidebar-nav">
      <li><a href="/kabinet/dashboard.html"><span class="icon">🏠</span> Ana Səhifə</a></li>
      <li><a href="/kabinet/cedvel.html"><span class="icon">📅</span> Dərs Cədvəli</a></li>
      <li><a href="/kabinet/odenisler.html"><span class="icon">💳</span> Ödənişlər</a></li>
      <li><a href="/kabinet/materiallar.html"><span class="icon">📂</span> Materiallar</a></li>
      <li><a href="/kabinet/reyler.html"><span class="icon">💬</span> Müəllim Rəyləri</a></li>
      <li><a href="/kabinet/neticelerim.html" class="active"><span class="icon">🖼️</span> Əsərlərim</a></li>
      <li><a href="/kabinet/gamification.html"><span class="icon">🏆</span> Gamification</a></li>
    </ul>
    <div class="sidebar-bottom">
      <button onclick="logout()">Çıxış</button>
    </div>
  </aside>

  <main class="main">
    <div class="header-row">
      <h1 class="page-title">Əsərlərim</h1>
      <button class="btn-upload" onclick="openModal()">+ Yeni əsər yüklə</button>
    </div>
    <div id="content"><div class="loading">Yüklənir...</div></div>
  </main>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="uploadModal">
    <div class="modal">
      <h2>Yeni əsər yüklə</h2>
      <div class="form-group">
        <label>Başlıq</label>
        <input type="text" id="artTitle" placeholder="Əsərin adı">
      </div>
      <div class="form-group">
        <label>Şəkil</label>
        <input type="file" id="artFile" accept="image/*">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Ləğv et</button>
        <button class="btn-upload" id="btnSubmitArt" onclick="submitArtwork()">Yüklə</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-kabinet.js"></script>
  <script src="/js/auth-kabinet.js"></script>
  <script src="/js/gamification.js"></script>
  <script>
    requireAuth();

    function openModal() { document.getElementById('uploadModal').classList.add('open'); }
    function closeModal() {
      document.getElementById('uploadModal').classList.remove('open');
      document.getElementById('artTitle').value = '';
      document.getElementById('artFile').value = '';
    }

    function getPublicUrl(path) {
      const { data } = sb.storage.from('artworks').getPublicUrl(path);
      return data.publicUrl;
    }

    async function loadArtworks() {
      const student = await getStudent();
      const container = document.getElementById('content');

      if (!student) {
        container.innerHTML = '<div class="empty-state">Tələbə tapılmadı</div>';
        return;
      }

      const { data: artworks, error } = await sb
        .from('artworks')
        .select('*')
        .eq('student_id', student.id)
        .order('created_at', { ascending: false });

      if (error || !artworks || artworks.length === 0) {
        container.innerHTML = '<div class="empty-state">Hələ əsər yüklənməyib. İlk əsərini paylaş!</div>';
        return;
      }

      let html = '<div class="art-grid">';
      artworks.forEach(a => {
        const imgUrl = a.image_url ? getPublicUrl(a.image_url) : '';
        const date = a.created_at ? new Date(a.created_at).toLocaleDateString('az-AZ') : '';
        const isBA = a.is_before_after;

        html += `<div class="art-card">
          <img class="art-img" src="${imgUrl}" alt="${a.title || ''}" id="img-${a.id}" onerror="this.style.display='none'">
          <div class="art-body">
            <div class="art-title">${a.title || 'İsimsiz'}</div>
            <div class="art-date">${date}</div>
            <div class="art-meta">
              <span class="art-likes">${a.likes || 0} bəyənmə</span>
              ${a.approved ? '<span class="art-approved">Təsdiqlənib</span>' : '<span class="art-pending">Gözləyir</span>'}
            </div>`;

        if (isBA) {
          html += `<div class="ba-toggle">
            <button class="active" onclick="toggleBA('${a.id}', 'before', this)">Əvvəl</button>
            <button onclick="toggleBA('${a.id}', 'after', this)">Sonra</button>
          </div>`;
        }

        html += '</div></div>';
      });
      html += '</div>';
      container.innerHTML = html;
    }

    function toggleBA(id, mode, btn) {
      const card = btn.closest('.art-card');
      const img = card.querySelector('.art-img');
      const buttons = card.querySelectorAll('.ba-toggle button');
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // Swap image URL suffix
      const currentSrc = img.src;
      if (mode === 'after' && !currentSrc.includes('_after')) {
        img.src = currentSrc.replace(/(\.[^.]+)$/, '_after$1');
      } else if (mode === 'before') {
        img.src = currentSrc.replace(/_after(\.[^.]+)$/, '$1');
      }
    }

    async function submitArtwork() {
      const title = document.getElementById('artTitle').value.trim();
      const fileInput = document.getElementById('artFile');
      if (!title || !fileInput.files.length) {
        alert('Başlıq və şəkil tələb olunur');
        return;
      }

      const btn = document.getElementById('btnSubmitArt');
      btn.disabled = true;
      btn.textContent = 'Yüklənir...';

      const student = await getStudent();
      const file = fileInput.files[0];
      const ext = file.name.split('.').pop();
      const filePath = `${student.id}/${Date.now()}.${ext}`;

      const { error: uploadError } = await sb.storage
        .from('artworks')
        .upload(filePath, file);

      if (uploadError) {
        alert('Yükləmə xətası: ' + uploadError.message);
        btn.disabled = false;
        btn.textContent = 'Yüklə';
        return;
      }

      const { error: insertError } = await sb
        .from('artworks')
        .insert({
          student_id: student.id,
          title: title,
          image_url: filePath,
          approved: false,
          likes: 0,
          created_at: new Date().toISOString()
        });

      if (insertError) {
        alert('Xəta: ' + insertError.message);
        btn.disabled = false;
        btn.textContent = 'Yüklə';
        return;
      }

      // Award points for new artwork
      await addPoints(student.id, 'eser_yuklendi', POINT_RULES.eser_yuklendi);

      closeModal();
      btn.disabled = false;
      btn.textContent = 'Yüklə';
      loadArtworks();
    }

    loadArtworks();
  </script>
</body>
</html>
