<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Müəllim Rəyləri — Artmonia Kabinet</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0b0b1a; color: #fff; min-height: 100vh; display: flex; }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }

    .sidebar { width: 260px; background: #14122a; border-right: 1px solid #252240; min-height: 100vh; padding: 24px 16px; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; }
    .sidebar-logo { font-family: 'Playfair Display', serif; font-size: 22px; color: #f97316; margin-bottom: 32px; text-align: center; text-decoration: none; display: block; }
    .sidebar-nav { list-style: none; flex: 1; }
    .sidebar-nav li { margin-bottom: 4px; }
    .sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 8px; color: #b0acd0; text-decoration: none; font-size: 14px; transition: all .2s; }
    .sidebar-nav a:hover, .sidebar-nav a.active { background: rgba(249,115,22,.12); color: #f97316; }
    .sidebar-nav a .icon { font-size: 18px; width: 24px; text-align: center; }
    .sidebar-bottom { border-top: 1px solid #252240; padding-top: 16px; margin-top: 16px; }
    .sidebar-bottom button { background: none; border: 1px solid #252240; color: #b0acd0; padding: 10px 14px; border-radius: 8px; width: 100%; cursor: pointer; font-size: 14px; transition: all .2s; }
    .sidebar-bottom button:hover { border-color: #f97316; color: #f97316; }

    .main { margin-left: 260px; flex: 1; padding: 32px; width: calc(100% - 260px); }
    .page-title { font-size: 28px; margin-bottom: 24px; }
    .empty-state { text-align: center; padding: 60px 20px; color: #6b6790; font-size: 16px; }
    .loading { text-align: center; padding: 40px; color: #6b6790; }

    /* Average Rating */
    .avg-card { background: #14122a; border: 1px solid #252240; border-radius: 12px; padding: 24px; margin-bottom: 24px; display: flex; align-items: center; gap: 20px; }
    .avg-number { font-size: 48px; font-weight: 700; color: #f97316; line-height: 1; }
    .avg-stars { font-size: 24px; margin-bottom: 4px; }
    .avg-label { font-size: 13px; color: #6b6790; }

    /* Feedback Cards */
    .fb-card { background: #14122a; border: 1px solid #252240; border-radius: 12px; padding: 20px; margin-bottom: 12px; transition: border-color .2s; }
    .fb-card:hover { border-color: #f97316; }
    .fb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .fb-date { font-size: 13px; color: #6b6790; }
    .fb-stars { color: #f97316; font-size: 16px; }
    .fb-category { display: inline-block; background: rgba(249,115,22,.12); color: #f97316; font-size: 11px; padding: 2px 10px; border-radius: 20px; margin-bottom: 10px; }
    .fb-comment { font-size: 14px; color: #b0acd0; line-height: 1.6; }
    .fb-points { color: #f97316; font-weight: 600; font-size: 13px; margin-top: 8px; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; width: 100%; padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <a href="/kabinet/dashboard.html" class="sidebar-logo">Artmonia</a>
    <ul class="sidebar-nav">
      <li><a href="/kabinet/dashboard.html"><span class="icon">🏠</span> Ana Səhifə</a></li>
      <li><a href="/kabinet/cedvel.html"><span class="icon">📅</span> Dərs Cədvəli</a></li>
      <li><a href="/kabinet/odenisler.html"><span class="icon">💳</span> Ödənişlər</a></li>
      <li><a href="/kabinet/materiallar.html"><span class="icon">📂</span> Materiallar</a></li>
      <li><a href="/kabinet/reyler.html" class="active"><span class="icon">💬</span> Müəllim Rəyləri</a></li>
      <li><a href="/kabinet/neticelerim.html"><span class="icon">🖼️</span> Əsərlərim</a></li>
      <li><a href="/kabinet/gamification.html"><span class="icon">🏆</span> Gamification</a></li>
    </ul>
    <div class="sidebar-bottom">
      <button onclick="logout()">Çıxış</button>
    </div>
  </aside>

  <main class="main">
    <h1 class="page-title">Müəllim Rəyləri</h1>
    <div id="content"><div class="loading">Yüklənir...</div></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-kabinet.js"></script>
  <script src="/js/auth-kabinet.js"></script>
  <script src="/js/gamification.js"></script>
  <script>
    requireAuth();

    function renderStars(rating) {
      const full = Math.floor(rating);
      const empty = 5 - full;
      return '<span style="color:#f97316">' + '★'.repeat(full) + '</span>' + '<span style="color:#252240">' + '★'.repeat(empty) + '</span>';
    }

    async function loadFeedback() {
      const student = await getStudent();
      const container = document.getElementById('content');

      if (!student) {
        container.innerHTML = '<div class="empty-state">Tələbə tapılmadı</div>';
        return;
      }

      const { data: feedback, error } = await sb
        .from('teacher_feedback')
        .select('*')
        .eq('student_id', student.id)
        .order('lesson_date', { ascending: false });

      if (error || !feedback || feedback.length === 0) {
        container.innerHTML = '<div class="empty-state">Hələ rəy yazılmayıb</div>';
        return;
      }

      // Calculate average
      const avgRating = feedback.reduce((s, f) => s + (f.rating || 0), 0) / feedback.length;

      let html = `
        <div class="avg-card">
          <div class="avg-number">${avgRating.toFixed(1)}</div>
          <div>
            <div class="avg-stars">${renderStars(Math.round(avgRating))}</div>
            <div class="avg-label">${feedback.length} rəy əsasında orta qiymət</div>
          </div>
        </div>`;

      feedback.forEach(f => {
        const date = f.lesson_date ? new Date(f.lesson_date).toLocaleDateString('az-AZ') : '-';
        html += `<div class="fb-card">
          <div class="fb-header">
            <div class="fb-date">${date}</div>
            <div class="fb-stars">${renderStars(f.rating || 0)}</div>
          </div>
          ${f.category ? `<span class="fb-category">${f.category}</span>` : ''}
          <div class="fb-comment">${f.comment || ''}</div>
          ${f.points_awarded ? `<div class="fb-points">+${f.points_awarded} XP</div>` : ''}
        </div>`;
      });

      container.innerHTML = html;
    }

    loadFeedback();
  </script>
</body>
</html>
