<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kabinet — Artmonia Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0b0b1a;
      --card: #14122a;
      --border: #252240;
      --accent: #f97316;
      --accent-hover: #fb923c;
      --text: #ffffff;
      --secondary: #b0acd0;
      --muted: #6b6790;
      --sidebar-w: 260px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      transition: transform .3s ease;
    }

    .sidebar-logo {
      padding: 28px 24px 20px;
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .5px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      color: var(--secondary);
      text-decoration: none;
      font-size: .935rem;
      font-weight: 500;
      border-left: 3px solid transparent;
      transition: all .2s ease;
    }

    .sidebar-nav a:hover {
      color: var(--text);
      background: rgba(249, 115, 22, .06);
    }

    .sidebar-nav a.active {
      color: var(--text);
      border-left-color: var(--accent);
      background: rgba(249, 115, 22, .1);
    }

    .sidebar-nav a .nav-icon {
      font-size: 1.15rem;
      width: 24px;
      text-align: center;
    }

    .sidebar-bottom {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
    }

    .btn-logout {
      width: 100%;
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--secondary);
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s ease;
    }

    .btn-logout:hover {
      border-color: #ef4444;
      color: #ef4444;
    }

    /* ── Main ── */
    .main {
      flex: 1;
      margin-left: var(--sidebar-w);
      padding: 32px 36px 48px;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .header-left { display: flex; align-items: center; gap: 16px; }

    .avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #c2410c);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1.15rem;
      color: #fff;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 1.65rem;
      font-weight: 700;
    }

    .header h1 span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--secondary);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }

    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Widget Grid ── */
    .widgets {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 36px;
    }

    .widget {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      transition: border-color .2s, transform .2s;
    }

    .widget:hover {
      border-color: rgba(249, 115, 22, .35);
      transform: translateY(-2px);
    }

    .widget-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .widget-header .w-icon {
      font-size: 1.35rem;
    }

    .widget-header h3 {
      font-size: 1.05rem;
      font-weight: 600;
    }

    .widget-body p {
      color: var(--secondary);
      font-size: .9rem;
      line-height: 1.55;
    }

    .widget-body .value {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
    }

    .widget-body .label {
      font-size: .8rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* XP progress bar */
    .xp-bar-wrap {
      width: 100%;
      height: 10px;
      background: var(--border);
      border-radius: 999px;
      margin-top: 12px;
      overflow: hidden;
    }

    .xp-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #fb923c);
      border-radius: 999px;
      transition: width .6s ease;
    }

    .xp-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: .8rem;
      color: var(--muted);
    }

    /* Stars */
    .stars { color: #fbbf24; font-size: 1.1rem; letter-spacing: 2px; }

    .feedback-text {
      margin-top: 8px;
      font-style: italic;
      color: var(--secondary);
      font-size: .875rem;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Artworks Section ── */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .section-header h2 {
      font-size: 1.3rem;
      font-weight: 700;
    }

    .section-header a {
      color: var(--accent);
      text-decoration: none;
      font-size: .9rem;
      font-weight: 500;
      transition: color .2s;
    }

    .section-header a:hover { color: var(--accent-hover); }

    .artworks-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .artwork-card {
      aspect-ratio: 1;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--card);
      position: relative;
      transition: border-color .2s, transform .2s;
    }

    .artwork-card:hover {
      border-color: rgba(249, 115, 22, .4);
      transform: translateY(-2px);
    }

    .artwork-card img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .artwork-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      font-size: 2.5rem;
    }

    /* ── Hamburger ── */
    .hamburger {
      display: none;
      position: fixed;
      top: 16px; left: 16px;
      z-index: 200;
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      cursor: pointer;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .hamburger span {
      display: block;
      width: 20px; height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: all .3s;
    }

    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 90;
    }

    /* ── Loading skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, rgba(255,255,255,.06) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }

    @keyframes shimmer { to { background-position: -200% 0; } }

    .skeleton-line { height: 16px; margin-bottom: 8px; }
    .skeleton-line.short { width: 60%; }
    .skeleton-line.xs { width: 40%; height: 12px; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .hamburger { display: flex; }

      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-overlay.show {
        display: block;
      }

      .main {
        margin-left: 0;
        padding: 80px 18px 36px;
      }

      .widgets {
        grid-template-columns: 1fr;
      }

      .artworks-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .header h1 { font-size: 1.25rem; }
    }

    @media (max-width: 480px) {
      .artworks-grid {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .widget { padding: 18px; }
    }
  </style>
</head>
<body>

  <!-- Hamburger (mobile) -->
  <button class="hamburger" id="hamburger" aria-label="Menyu">
    <span></span><span></span><span></span>
  </button>

  <!-- Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">Artmonia</div>
    <nav class="sidebar-nav">
      <a href="/kabinet/dashboard.html" class="active">
        <span class="nav-icon">&#127968;</span> &#399;sas
      </a>
      <a href="/kabinet/cedvel.html">
        <span class="nav-icon">&#128197;</span> C&#601;dv&#601;l
      </a>
      <a href="/kabinet/odenisler.html">
        <span class="nav-icon">&#128179;</span> &#214;d&#601;ni&#351;l&#601;r
      </a>
      <a href="/kabinet/materiallar.html">
        <span class="nav-icon">&#128218;</span> Materiallar
      </a>
      <a href="/kabinet/reyler.html">
        <span class="nav-icon">&#11088;</span> R&#601;yl&#601;r
      </a>
      <a href="/kabinet/neticelerim.html">
        <span class="nav-icon">&#128444;&#65039;</span> N&#601;tic&#601;l&#601;rim
      </a>
      <a href="/kabinet/gamification.html">
        <span class="nav-icon">&#127918;</span> Gamification
      </a>
    </nav>
    <div class="sidebar-bottom">
      <button class="btn-logout" onclick="logout()">&#128682; &#199;&#305;x&#305;&#351;</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="avatar" id="avatarCircle">...</div>
        <h1 id="greeting">Salam!</h1>
      </div>
      <div class="header-right">
        <button class="btn-icon" onclick="logout()" title="&#199;&#305;x&#305;&#351;">&#128682;</button>
      </div>
    </header>

    <!-- Widgets 2x2 -->
    <div class="widgets">
      <!-- 1. Next Lesson -->
      <div class="widget" id="wLesson">
        <div class="widget-header">
          <span class="w-icon">&#128197;</span>
          <h3>N&#246;vb&#601;ti d&#601;rs</h3>
        </div>
        <div class="widget-body">
          <div class="skeleton skeleton-line"></div>
          <div class="skeleton skeleton-line short"></div>
        </div>
      </div>

      <!-- 2. Balance -->
      <div class="widget" id="wBalance">
        <div class="widget-header">
          <span class="w-icon">&#128179;</span>
          <h3>Balans</h3>
        </div>
        <div class="widget-body">
          <div class="skeleton skeleton-line short"></div>
          <div class="skeleton skeleton-line xs"></div>
        </div>
      </div>

      <!-- 3. XP / Gamification -->
      <div class="widget" id="wXP">
        <div class="widget-header">
          <span class="w-icon">&#127918;</span>
          <h3>XP</h3>
        </div>
        <div class="widget-body">
          <div class="skeleton skeleton-line"></div>
          <div class="skeleton skeleton-line short"></div>
        </div>
      </div>

      <!-- 4. Last Feedback -->
      <div class="widget" id="wFeedback">
        <div class="widget-header">
          <span class="w-icon">&#11088;</span>
          <h3>Son r&#601;y</h3>
        </div>
        <div class="widget-body">
          <div class="skeleton skeleton-line short"></div>
          <div class="skeleton skeleton-line"></div>
        </div>
      </div>
    </div>

    <!-- Artworks -->
    <section>
      <div class="section-header">
        <h2>Son &#399;s&#601;rl&#601;rim</h2>
        <a href="/kabinet/neticelerim.html">Ham&#305;s&#305;na bax &#8594;</a>
      </div>
      <div class="artworks-grid" id="artworksGrid">
        <div class="artwork-card"><div class="artwork-placeholder skeleton" style="height:100%"></div></div>
        <div class="artwork-card"><div class="artwork-placeholder skeleton" style="height:100%"></div></div>
        <div class="artwork-card"><div class="artwork-placeholder skeleton" style="height:100%"></div></div>
      </div>
    </section>
  </main>

  <!-- CDN: Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- Local scripts -->
  <script src="/js/supabase-kabinet.js"></script>
  <script src="/js/auth-kabinet.js"></script>
  <script src="/js/gamification.js"></script>

  <script>
    /* ── Auth guard ── */
    requireAuth();

    /* ── Mobile sidebar toggle ── */
    const hamburger = document.getElementById('hamburger');
    const sidebar   = document.getElementById('sidebar');
    const overlay   = document.getElementById('sidebarOverlay');

    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      sidebar.classList.toggle('open');
      overlay.classList.toggle('show');
    });

    overlay.addEventListener('click', () => {
      hamburger.classList.remove('open');
      sidebar.classList.remove('open');
      overlay.classList.remove('show');
    });

    /* ── Helpers ── */
    function starsHTML(rating) {
      const full = Math.round(rating || 0);
      return '★'.repeat(full) + '☆'.repeat(5 - full);
    }

    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('az-AZ', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    /* ── XP level definitions ── */
    const XP_LEVELS = [
      { min: 0,    emoji: '🌱', name: 'Yeni başlayan' },
      { min: 100,  emoji: '🎨', name: 'Rəssam şagirdi' },
      { min: 300,  emoji: '🖌️', name: 'Rəngkar' },
      { min: 600,  emoji: '🏆', name: 'Usta rəssam' },
      { min: 1000, emoji: '👑', name: 'Akademiya ulduzu' }
    ];

    function getLevel(xp) {
      let lvl = XP_LEVELS[0];
      for (const l of XP_LEVELS) {
        if (xp >= l.min) lvl = l;
      }
      const idx = XP_LEVELS.indexOf(lvl);
      const next = XP_LEVELS[idx + 1];
      const progress = next
        ? ((xp - lvl.min) / (next.min - lvl.min)) * 100
        : 100;
      return { ...lvl, progress: Math.min(progress, 100), nextMin: next ? next.min : lvl.min };
    }

    /* ── Load Dashboard Data ── */
    async function loadDashboard() {
      const student = await getStudent();
      if (!student) return;

      // Greeting + Avatar
      const name = student.full_name || student.name || 'Tələbə';
      const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      document.getElementById('avatarCircle').textContent = initials;
      document.getElementById('greeting').innerHTML = 'Salam, <span>' + name.split(' ')[0] + '</span>!';

      // ── Widget 1: Next Lesson ──
      const groupData = student.groups;
      const wLesson = document.querySelector('#wLesson .widget-body');
      if (groupData) {
        const schedule = groupData.schedule || 'Cədvəl yoxdur';
        const teacher  = groupData.teacher_name || '';
        wLesson.innerHTML =
          '<p><strong>' + groupData.name + '</strong></p>' +
          '<p>' + schedule + '</p>' +
          (teacher ? '<p class="label">Müəllim: ' + teacher + '</p>' : '');
      } else {
        wLesson.innerHTML = '<p style="color:var(--muted)">Qrupa yazılmayıb</p>';
      }

      // ── Widget 2: Balance / Last Payment ──
      const wBalance = document.querySelector('#wBalance .widget-body');
      const { data: payments } = await sb
        .from('payments')
        .select('amount, paid_at, created_at')
        .eq('student_id', student.id)
        .order('created_at', { ascending: false })
        .limit(1);

      if (payments && payments.length) {
        const p = payments[0];
        wBalance.innerHTML =
          '<div class="value">' + p.amount + ' AZN</div>' +
          '<p class="label">Son ödəniş: ' + formatDate(p.paid_at || p.created_at) + '</p>';
      } else {
        wBalance.innerHTML = '<p style="color:var(--muted)">Ödəniş tapılmadı</p>';
      }

      // ── Widget 3: XP / Gamification ──
      const wXP = document.querySelector('#wXP .widget-body');
      const { data: badges } = await sb
        .from('badges')
        .select('xp')
        .eq('student_id', student.id);

      const totalXP = (badges || []).reduce((sum, b) => sum + (b.xp || 0), 0);
      const lvl = getLevel(totalXP);

      wXP.innerHTML =
        '<div class="value">' + lvl.emoji + ' ' + lvl.name + '</div>' +
        '<div class="xp-bar-wrap"><div class="xp-bar" style="width:' + lvl.progress + '%"></div></div>' +
        '<div class="xp-meta"><span>' + totalXP + ' XP</span><span>' + lvl.nextMin + ' XP</span></div>';

      // ── Widget 4: Last Feedback ──
      const wFeedback = document.querySelector('#wFeedback .widget-body');
      const { data: feedbacks } = await sb
        .from('feedback')
        .select('rating, comment, created_at')
        .eq('student_id', student.id)
        .order('created_at', { ascending: false })
        .limit(1);

      if (feedbacks && feedbacks.length) {
        const fb = feedbacks[0];
        wFeedback.innerHTML =
          '<div class="stars">' + starsHTML(fb.rating) + '</div>' +
          '<p class="feedback-text">' + (fb.comment || 'Şərh yoxdur') + '</p>' +
          '<p class="label">' + formatDate(fb.created_at) + '</p>';
      } else {
        wFeedback.innerHTML = '<p style="color:var(--muted)">Hələ rəy yoxdur</p>';
      }

      // ── Artworks (last 3) ──
      const { data: artworks } = await sb
        .from('artworks')
        .select('id, image_url, title')
        .eq('student_id', student.id)
        .order('created_at', { ascending: false })
        .limit(3);

      const grid = document.getElementById('artworksGrid');
      if (artworks && artworks.length) {
        grid.innerHTML = artworks.map(a =>
          '<div class="artwork-card">' +
            (a.image_url
              ? '<img src="' + a.image_url + '" alt="' + (a.title || 'Əsər') + '" loading="lazy">'
              : '<div class="artwork-placeholder">🖼️</div>') +
          '</div>'
        ).join('');
        // Fill remaining slots if < 3
        for (let i = artworks.length; i < 3; i++) {
          grid.innerHTML += '<div class="artwork-card"><div class="artwork-placeholder">🖼️</div></div>';
        }
      } else {
        grid.innerHTML =
          '<div class="artwork-card"><div class="artwork-placeholder">🖼️</div></div>'.repeat(3);
      }
    }

    loadDashboard();
  </script>
</body>
</html>
