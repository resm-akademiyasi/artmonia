<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artmonia - Tələbə Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0b1a;--bg2:#0f0e24;--card:#14122a;--card2:#1a1835;--border:#252240;--accent:#f97316;--accent2:#ea580c;--text:#fff;--text2:#b0acd0;--text3:#6b6790;--green:#4ade80;--blue:#60a5fa;--red:#f87171;--sidebar:260px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ---- Sidebar ---- */
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar);height:100vh;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform .3s ease}
.sidebar-logo{padding:28px 24px 20px;border-bottom:1px solid var(--border)}
.sidebar-logo h2{font-family:'Playfair Display',serif;color:var(--accent);font-size:1.5rem}
.sidebar-nav{flex:1;padding:16px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 24px;color:var(--text2);font-size:.92rem;font-weight:500;text-decoration:none;transition:all .2s;border-left:3px solid transparent}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{border-left-color:var(--accent);color:var(--accent);background:rgba(249,115,22,.06)}
.nav-item .nav-emoji{font-size:1.15rem;width:24px;text-align:center}
.sidebar-bottom{padding:16px 24px;border-top:1px solid var(--border)}
.logout-btn{display:flex;align-items:center;gap:10px;background:none;border:none;color:var(--text3);font-family:'Inter',sans-serif;font-size:.9rem;cursor:pointer;padding:8px 0;transition:color .2s;width:100%}
.logout-btn:hover{color:var(--red)}

/* ---- Hamburger ---- */
.hamburger{display:none;position:fixed;top:16px;left:16px;z-index:200;background:var(--card);border:1px solid var(--border);border-radius:10px;width:42px;height:42px;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:1.3rem}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}
.overlay.show{display:block}

/* ---- Main Content ---- */
.main{margin-left:var(--sidebar);padding:32px;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.header-left{display:flex;align-items:center;gap:16px}
.avatar{width:48px;height:48px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;color:#fff;flex-shrink:0}
.header-left h1{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:600}
.header-right .logout-icon{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text3);transition:color .2s}
.header-right .logout-icon:hover{color:var(--red)}

/* ---- Widget Grid ---- */
.widgets{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:36px}
.widget{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px}
.widget-title{display:flex;align-items:center;gap:8px;font-size:.85rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:14px}
.widget-body{font-size:.95rem;color:var(--text2);line-height:1.6}
.widget-body .big{font-size:1.6rem;font-weight:700;color:var(--text);display:block;margin-bottom:4px}
.widget-body .sub{font-size:.82rem;color:var(--text3)}
.widget-body .stars{color:var(--accent);font-size:1.1rem;letter-spacing:2px}
.widget-body .empty{color:var(--text3);font-style:italic}

/* ---- XP Bar (from gamification.js) ---- */
.xp-bar-container{width:100%}
.xp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.xp-level{font-size:.95rem;font-weight:600;color:var(--text)}
.xp-count{font-size:.85rem;color:var(--accent);font-weight:700}
.xp-track{height:10px;background:var(--bg2);border-radius:50px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:50px;transition:width .6s ease}
.xp-next{font-size:.8rem;color:var(--text3);margin-top:8px}

/* ---- Son Eserler ---- */
.section-title{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.section-title a{font-family:'Inter',sans-serif;font-size:.85rem;color:var(--accent);text-decoration:none;font-weight:600}
.section-title a:hover{text-decoration:underline}
.artworks-row{display:flex;gap:16px;overflow-x:auto;padding-bottom:8px}
.artwork-thumb{width:160px;height:160px;border-radius:14px;overflow:hidden;background:var(--card2);border:1px solid var(--border);flex-shrink:0;position:relative}
.artwork-thumb img{width:100%;height:100%;object-fit:cover}
.artworks-empty{color:var(--text3);font-style:italic;font-size:.9rem}

/* ---- Skeleton ---- */
.skeleton{background:linear-gradient(90deg,var(--card2) 25%,var(--border) 50%,var(--card2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
.skeleton-line{height:16px;margin-bottom:10px;border-radius:6px}
.skeleton-line.short{width:60%}
.skeleton-line.wide{width:90%}
.skeleton-box{height:100px;border-radius:10px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ---- Responsive ---- */
@media(max-width:900px){
  .widgets{grid-template-columns:1fr}
}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .hamburger{display:flex}
  .main{margin-left:0;padding:24px 16px;padding-top:70px}
  .header-left h1{font-size:1.2rem}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- Hamburger -->
<button class="hamburger" onclick="toggleSidebar()">☰</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><h2>Artmonia</h2></div>
  <nav class="sidebar-nav">
    <a href="/kabinet/dashboard.html" class="nav-item active"><span class="nav-emoji">🏠</span> Əsas</a>
    <a href="/kabinet/cedvel.html" class="nav-item"><span class="nav-emoji">📅</span> Cədvəl</a>
    <a href="/kabinet/odenisler.html" class="nav-item"><span class="nav-emoji">💳</span> Ödənişlər</a>
    <a href="/kabinet/materiallar.html" class="nav-item"><span class="nav-emoji">📚</span> Materiallar</a>
    <a href="/kabinet/reyler.html" class="nav-item"><span class="nav-emoji">⭐</span> Rəylər</a>
    <a href="/kabinet/neticelerim.html" class="nav-item"><span class="nav-emoji">🖼️</span> Nəticələrim</a>
    <a href="/kabinet/gamification.html" class="nav-item"><span class="nav-emoji">🎮</span> Gamification</a>
  </nav>
  <div class="sidebar-bottom">
    <button class="logout-btn" onclick="logoutStudent()"><span>🚪</span> Çıxış</button>
  </div>
</aside>

<!-- Main -->
<main class="main">
  <div class="header">
    <div class="header-left">
      <div class="avatar" id="avatar">--</div>
      <h1 id="greeting">Salam!</h1>
    </div>
    <div class="header-right">
      <button class="logout-icon" onclick="logoutStudent()" title="Çıxış">🚪</button>
    </div>
  </div>

  <!-- Widgets -->
  <div class="widgets">
    <!-- 1. Növbəti Dərs -->
    <div class="widget">
      <div class="widget-title">📅 Növbəti Dərs</div>
      <div class="widget-body" id="wLesson">
        <div class="skeleton skeleton-line wide"></div>
        <div class="skeleton skeleton-line short"></div>
      </div>
    </div>
    <!-- 2. Balans -->
    <div class="widget">
      <div class="widget-title">💳 Balans</div>
      <div class="widget-body" id="wPayment">
        <div class="skeleton skeleton-line wide"></div>
        <div class="skeleton skeleton-line short"></div>
      </div>
    </div>
    <!-- 3. XP -->
    <div class="widget">
      <div class="widget-title">🎮 XP</div>
      <div class="widget-body" id="wXP">
        <div class="skeleton skeleton-box"></div>
      </div>
    </div>
    <!-- 4. Son Rəy -->
    <div class="widget">
      <div class="widget-title">⭐ Son Rəy</div>
      <div class="widget-body" id="wFeedback">
        <div class="skeleton skeleton-line wide"></div>
        <div class="skeleton skeleton-line short"></div>
      </div>
    </div>
  </div>

  <!-- Son Əsərlərim -->
  <div class="section-title">
    Son Əsərlərim
    <a href="/kabinet/neticelerim.html">Hamısına bax →</a>
  </div>
  <div id="artworksRow" class="artworks-row">
    <div class="artwork-thumb skeleton"></div>
    <div class="artwork-thumb skeleton"></div>
    <div class="artwork-thumb skeleton"></div>
  </div>
</main>

<script src="/js/supabase-kabinet.js"></script>
<script src="/js/auth-kabinet.js"></script>
<script src="/js/gamification.js"></script>
<script>
/* ---- Sidebar toggle ---- */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

/* ---- Helpers ---- */
function initials(name) {
  if (!name) return '?';
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function starsHTML(rating) {
  const full = Math.round(rating || 0);
  return '<span class="stars">' + '★'.repeat(full) + '☆'.repeat(Math.max(0, 5 - full)) + '</span>';
}

const DAY_NAMES = ['Bazar', 'Bazar ertəsi', 'Çərşənbə axşamı', 'Çərşənbə', 'Cümə axşamı', 'Cümə', 'Şənbə'];

/* ---- Load dashboard ---- */
(async () => {
  const ok = await requireAuth(['student'], '/kabinet/index.html');
  if (!ok) return;

  const student = await getStudent();
  if (!student) {
    document.getElementById('greeting').textContent = 'Salam!';
    return;
  }

  /* Header */
  const name = student.full_name || 'Tələbə';
  document.getElementById('greeting').textContent = 'Salam, ' + name + '!';
  document.getElementById('avatar').textContent = initials(name);

  /* Fetch all data in parallel */
  const user = await getUser();
  const userId = user ? user.id : null;

  const [scheduleRes, paymentRes, feedbackRes, artworksRes] = await Promise.all([
    student.group_id
      ? sb.from('group_schedule').select('*, groups(name), teachers:teacher_id(full_name)').eq('group_id', student.group_id).order('day_of_week', { ascending: true })
      : Promise.resolve({ data: null }),
    sb.from('payments').select('*').eq('student_id', student.id).order('created_at', { ascending: false }).limit(1),
    sb.from('teacher_feedback').select('*').eq('student_id', student.id).order('created_at', { ascending: false }).limit(1),
    sb.from('artworks').select('*').eq('student_id', student.id).order('created_at', { ascending: false }).limit(3)
  ]);

  /* 1. Növbəti Dərs */
  const wLesson = document.getElementById('wLesson');
  if (!student.group_id) {
    wLesson.innerHTML = '<span class="empty">Qrupa təyin edilməmisiniz</span>';
  } else if (!scheduleRes.data || scheduleRes.data.length === 0) {
    wLesson.innerHTML = '<span class="empty">Cədvəl tapılmadı</span>';
  } else {
    const today = new Date().getDay();
    const lessons = scheduleRes.data;
    let next = lessons.find(l => l.day_of_week >= today) || lessons[0];
    const dayName = DAY_NAMES[next.day_of_week] || '?';
    const teacher = next.teachers ? next.teachers.full_name : '';
    wLesson.innerHTML = `
      <span class="big">${dayName}</span>
      <span>${next.start_time || ''} - ${next.end_time || ''}</span><br>
      ${next.room ? '<span class="sub">Otaq: ' + next.room + '</span>' : ''}
      ${teacher ? '<br><span class="sub">Müəllim: ' + teacher + '</span>' : ''}
    `;
  }

  /* 2. Balans */
  const wPayment = document.getElementById('wPayment');
  if (!paymentRes.data || paymentRes.data.length === 0) {
    wPayment.innerHTML = '<span class="empty">Ödəniş yoxdur</span>';
  } else {
    const p = paymentRes.data[0];
    const date = p.created_at ? new Date(p.created_at).toLocaleDateString('az-AZ') : '';
    wPayment.innerHTML = `
      <span class="big">${p.amount || 0} AZN</span>
      <span class="sub">${date}${p.method ? ' &middot; ' + p.method : ''}</span>
    `;
  }

  /* 3. XP */
  const wXP = document.getElementById('wXP');
  const points = student.total_points || 0;
  wXP.innerHTML = renderXPBar(points);

  /* 4. Son Rəy */
  const wFeedback = document.getElementById('wFeedback');
  if (!feedbackRes.data || feedbackRes.data.length === 0) {
    wFeedback.innerHTML = '<span class="empty">Hələ rəy yoxdur</span>';
  } else {
    const fb = feedbackRes.data[0];
    const comment = fb.comment ? (fb.comment.length > 80 ? fb.comment.slice(0, 80) + '...' : fb.comment) : '';
    wFeedback.innerHTML = `
      ${starsHTML(fb.rating)}
      <p style="margin-top:8px">${comment}</p>
    `;
  }

  /* Son Əsərlərim */
  const artworksRow = document.getElementById('artworksRow');
  if (!artworksRes.data || artworksRes.data.length === 0) {
    artworksRow.innerHTML = '<span class="artworks-empty">Hələ əsər yoxdur</span>';
  } else {
    artworksRow.innerHTML = artworksRes.data.map(a => {
      const src = a.image_url || a.thumbnail_url || '';
      return `<div class="artwork-thumb"><img src="${src}" alt="${a.title || 'Əsər'}" onerror="this.style.display='none'"></div>`;
    }).join('');
  }
})();
</script>
</body>
</html>
