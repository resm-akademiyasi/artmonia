<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artmonia - Daxil ol</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0b1a;--bg2:#0f0e24;--card:#14122a;--card2:#1a1835;--border:#252240;--accent:#f97316;--accent2:#ea580c;--text:#fff;--text2:#b0acd0;--text3:#6b6790;--green:#4ade80;--blue:#60a5fa;--red:#f87171}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-wrapper{width:100%;max-width:420px}
.logo{text-align:center;margin-bottom:32px}
.logo h1{font-family:'Playfair Display',serif;color:var(--accent);font-size:2.4rem;letter-spacing:1px}
.logo p{color:var(--text2);font-size:.95rem;margin-top:6px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 28px}
.tabs{display:flex;gap:6px;margin-bottom:24px;background:var(--bg2);border-radius:50px;padding:4px}
.tab-btn{flex:1;padding:10px 16px;border:none;border-radius:50px;background:transparent;color:var(--text3);font-family:'Inter',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--accent);color:#fff}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:6px;font-weight:500}
.form-group input{width:100%;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:.95rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:var(--accent)}
.form-group input::placeholder{color:var(--text3)}
.btn-pill{width:100%;border:none;border-radius:50px;background:var(--accent);color:#fff;font-weight:700;padding:13px 28px;font-size:1rem;font-family:'Inter',sans-serif;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-pill:hover{background:var(--accent2)}
.btn-pill:disabled{opacity:.6;cursor:not-allowed}
.btn-pill .spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.btn-pill.loading .spinner{display:inline-block}
.btn-pill.loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.forgot-link{display:block;text-align:center;margin-top:16px;color:var(--text3);font-size:.85rem;cursor:pointer;text-decoration:none;transition:color .2s}
.forgot-link:hover{color:var(--accent)}
.msg-box{padding:12px 16px;border-radius:10px;font-size:.88rem;margin-bottom:16px;display:none;line-height:1.4}
.msg-box.error{display:block;background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:var(--red)}
.msg-box.success{display:block;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);color:var(--green)}
.otp-group{display:none}
.otp-group.show{display:block}
.otp-input{text-align:center;letter-spacing:8px;font-size:1.3rem;font-weight:700}
.panel{display:none}
.panel.active{display:block}
.forgot-panel{display:none;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.forgot-panel.show{display:block}
.back-link{display:block;text-align:center;margin-top:14px;color:var(--text3);font-size:.85rem;cursor:pointer;transition:color .2s}
.back-link:hover{color:var(--accent)}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="login-wrapper">
  <div class="logo">
    <h1>Artmonia</h1>
    <p>Tələbə Kabineti</p>
  </div>

  <div class="login-card">
    <div id="msgBox" class="msg-box"></div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="email" onclick="switchTab('email')">📧 Email ilə</button>
      <button class="tab-btn" data-tab="phone" onclick="switchTab('phone')">📱 Telefon ilə</button>
    </div>

    <!-- Email Panel -->
    <div id="panel-email" class="panel active">
      <form id="emailForm" onsubmit="handleEmailLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="emailInput" placeholder="nümunə@mail.com" required>
        </div>
        <div class="form-group">
          <label>Şifrə</label>
          <input type="password" id="passwordInput" placeholder="Şifrənizi daxil edin" required>
        </div>
        <button type="submit" class="btn-pill" id="emailBtn">
          <span class="btn-text">Daxil ol</span>
          <span class="spinner"></span>
        </button>
      </form>
    </div>

    <!-- Phone Panel -->
    <div id="panel-phone" class="panel">
      <form id="phoneForm" onsubmit="handlePhoneSend(event)">
        <div class="form-group">
          <label>Telefon nömrəsi</label>
          <input type="tel" id="phoneInput" placeholder="+994 50 000 00 00" required>
        </div>
        <button type="submit" class="btn-pill" id="phoneBtn">
          <span class="btn-text">OTP Göndər</span>
          <span class="spinner"></span>
        </button>
      </form>
      <div id="otpGroup" class="otp-group">
        <form onsubmit="handleOtpVerify(event)">
          <div class="form-group" style="margin-top:18px">
            <label>OTP Kod (6 rəqəm)</label>
            <input type="text" id="otpInput" class="otp-input" maxlength="6" placeholder="------" required>
          </div>
          <button type="submit" class="btn-pill" id="otpBtn">
            <span class="btn-text">Təsdiqlə</span>
            <span class="spinner"></span>
          </button>
        </form>
      </div>
    </div>

    <!-- Forgot password link -->
    <a class="forgot-link" onclick="toggleForgot()">Şifrəni unutdum?</a>

    <!-- Forgot panel -->
    <div id="forgotPanel" class="forgot-panel">
      <form onsubmit="handleForgotPassword(event)">
        <div class="form-group">
          <label>Email ünvanınız</label>
          <input type="email" id="forgotEmail" placeholder="nümunə@mail.com" required>
        </div>
        <button type="submit" class="btn-pill" id="forgotBtn">
          <span class="btn-text">Şifrəni sıfırla</span>
          <span class="spinner"></span>
        </button>
      </form>
      <a class="back-link" onclick="toggleForgot()">Geri qayıt</a>
    </div>
  </div>
</div>

<script src="/js/supabase-kabinet.js"></script>
<script src="/js/auth-kabinet.js"></script>
<script src="/js/gamification.js"></script>
<script>
/* ---- State ---- */
let currentPhone = '';

/* ---- Tabs ---- */
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  clearMsg();
}

/* ---- Messages ---- */
function showMsg(text, type) {
  const box = document.getElementById('msgBox');
  box.textContent = text;
  box.className = 'msg-box ' + type;
}
function clearMsg() {
  const box = document.getElementById('msgBox');
  box.className = 'msg-box';
  box.textContent = '';
}

/* ---- Button loading ---- */
function setLoading(btn, loading) {
  if (loading) { btn.classList.add('loading'); btn.disabled = true; }
  else { btn.classList.remove('loading'); btn.disabled = false; }
}

/* ---- Email Login ---- */
async function handleEmailLogin(e) {
  e.preventDefault();
  clearMsg();
  const btn = document.getElementById('emailBtn');
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;

  if (!email || !password) { showMsg('Email və şifrəni daxil edin', 'error'); return; }

  setLoading(btn, true);
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw error;
    showMsg('Daxil oldunuz! Yönləndirilir...', 'success');
    const role = await getRole();
    if (role === 'student') go('/kabinet/dashboard.html');
    else if (role === 'super_admin' || role === 'manager' || role === 'teacher') go('/admin/dashboard.html');
    else go('/kabinet/dashboard.html');
  } catch (err) {
    showMsg(err.message || 'Giriş uğursuz oldu', 'error');
    setLoading(btn, false);
  }
}

/* ---- Phone OTP Send ---- */
async function handlePhoneSend(e) {
  e.preventDefault();
  clearMsg();
  const btn = document.getElementById('phoneBtn');
  const phone = document.getElementById('phoneInput').value.trim().replace(/\s+/g, '');

  if (!phone) { showMsg('Telefon nömrəsini daxil edin', 'error'); return; }

  setLoading(btn, true);
  try {
    const { error } = await sb.auth.signInWithOtp({ phone });
    if (error) throw error;
    currentPhone = phone;
    document.getElementById('otpGroup').classList.add('show');
    showMsg('OTP kod göndərildi!', 'success');
  } catch (err) {
    showMsg(err.message || 'OTP göndərmə uğursuz oldu', 'error');
  }
  setLoading(btn, false);
}

/* ---- OTP Verify ---- */
async function handleOtpVerify(e) {
  e.preventDefault();
  clearMsg();
  const btn = document.getElementById('otpBtn');
  const token = document.getElementById('otpInput').value.trim();

  if (!token || token.length !== 6) { showMsg('6 rəqəmli OTP kodu daxil edin', 'error'); return; }

  setLoading(btn, true);
  try {
    const { data, error } = await sb.auth.verifyOtp({ phone: currentPhone, token, type: 'sms' });
    if (error) throw error;
    showMsg('Təsdiqləndi! Yönləndirilir...', 'success');
    const role = await getRole();
    if (role === 'student') go('/kabinet/dashboard.html');
    else if (role) go('/admin/dashboard.html');
    else go('/kabinet/dashboard.html');
  } catch (err) {
    showMsg(err.message || 'OTP təsdiqi uğursuz oldu', 'error');
    setLoading(btn, false);
  }
}

/* ---- Forgot Password ---- */
function toggleForgot() {
  document.getElementById('forgotPanel').classList.toggle('show');
}

async function handleForgotPassword(e) {
  e.preventDefault();
  clearMsg();
  const btn = document.getElementById('forgotBtn');
  const email = document.getElementById('forgotEmail').value.trim();

  if (!email) { showMsg('Email ünvanını daxil edin', 'error'); return; }

  setLoading(btn, true);
  try {
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/kabinet/'
    });
    if (error) throw error;
    showMsg('Şifrə sıfırlama linki email ünvanınıza göndərildi!', 'success');
  } catch (err) {
    showMsg(err.message || 'Xəta baş verdi', 'error');
  }
  setLoading(btn, false);
}

/* ---- Auto-redirect if logged in ---- */
(async () => {
  try {
    const session = await getSession();
    if (session) {
      const role = await getRole();
      if (role === 'student') go('/kabinet/dashboard.html');
      else if (role) go('/admin/dashboard.html');
    }
  } catch (e) {
    console.error('Session check error:', e);
  }
})();
</script>
</body>
</html>
