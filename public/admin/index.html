<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artmonia Admin - Daxil ol</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0b1a;--bg2:#0f0e24;--card:#14122a;--border:#252240;--accent:#f97316;--accent2:#ea580c;--text:#fff;--text2:#b0acd0;--text3:#6b6790;--green:#4ade80;--red:#f87171}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px 32px;width:100%;max-width:420px}
.logo{text-align:center;margin-bottom:32px}
.logo h1{font-family:'Playfair Display',serif;color:var(--accent);font-size:2.2rem;font-weight:700;letter-spacing:1px}
.logo p{color:var(--text2);font-size:.95rem;margin-top:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;color:var(--text2);font-size:.85rem;font-weight:500;margin-bottom:6px}
.form-group input{width:100%;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:.95rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.form-group input::placeholder{color:var(--text3)}
.form-group input:focus{border-color:var(--accent)}
.pill-btn{width:100%;border-radius:50px;background:var(--accent);color:#fff;font-weight:700;padding:14px 28px;font-size:1rem;border:none;cursor:pointer;transition:background .2s;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
.pill-btn:hover{background:var(--accent2)}
.pill-btn:disabled{opacity:.6;cursor:not-allowed}
.pill-btn .spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.pill-btn.loading .spinner{display:inline-block}
.pill-btn.loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{padding:12px 16px;border-radius:10px;font-size:.9rem;margin-bottom:16px;display:none;line-height:1.4}
.msg.error{display:block;background:rgba(248,113,113,.12);border:1px solid var(--red);color:var(--red)}
.msg.success{display:block;background:rgba(74,222,128,.12);border:1px solid var(--green);color:var(--green)}
.tabs{display:flex;gap:0;margin-bottom:24px;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.tab-btn{flex:1;padding:12px;border:none;font-family:'Inter',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s;background:var(--bg2);color:var(--text3)}
.tab-btn.active{background:var(--accent);color:#fff}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <h1>Artmonia</h1>
    <p>Admin Panel</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Daxil ol</button>
    <button class="tab-btn" id="tabReg" onclick="switchTab('register')">Qeydiyyat</button>
  </div>

  <div id="msg" class="msg"></div>

  <!-- Login Form -->
  <form id="loginForm" onsubmit="event.preventDefault();handleLogin()">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@artmonia.com" required>
    </div>
    <div class="form-group">
      <label>Şifrə</label>
      <input type="password" id="password" placeholder="Şifrənizi daxil edin" required>
    </div>
    <button type="submit" class="pill-btn" id="loginBtn">
      <span class="btn-text">Daxil ol</span>
      <span class="spinner"></span>
    </button>
  </form>

  <!-- Register Form (müvəqqəti) -->
  <form id="registerForm" onsubmit="event.preventDefault();handleRegister()" style="display:none">
    <div class="form-group">
      <label>Ad Soyad</label>
      <input type="text" id="regName" placeholder="Ad Soyad" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="email@example.com" required>
    </div>
    <div class="form-group">
      <label>Şifrə (minimum 6 simvol)</label>
      <input type="password" id="regPassword" placeholder="Şifrə təyin edin" required minlength="6">
    </div>
    <button type="submit" class="pill-btn" id="regBtn">
      <span class="btn-text">Qeydiyyatdan keç</span>
      <span class="spinner"></span>
    </button>
  </form>
</div>

<script src="/js/supabase-kabinet.js"></script>
<script src="/js/auth-kabinet.js"></script>
<script>
/* ── Fallback: go() əgər auth-kabinet.js yüklənməyibsə ── */
if (typeof go === 'undefined') { function go(p) { window.location.replace(window.location.origin + p); } }

/* ── Helpers ── */
function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}
function clearMsg() {
  const el = document.getElementById('msg');
  el.className = 'msg';
  el.textContent = '';
}
function setLoading(btn, on) {
  btn.disabled = on;
  btn.classList.toggle('loading', on);
}
function switchTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
  });
  clearMsg();
}

/* ── Login ── */
async function handleLogin() {
  clearMsg();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showMsg('Email və şifrəni daxil edin', 'error'); return; }

  const btn = document.getElementById('loginBtn');
  setLoading(btn, true);
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { showMsg('Xəta: ' + error.message, 'error'); return; }

    // Rol yoxla
    const { data: rd, error: re } = await sb
      .from('user_roles').select('role')
      .eq('user_id', data.user.id).single();

    if (re || !rd) {
      showMsg('Rol tapılmadı. Admin ilə əlaqə saxlayın.', 'error');
      await sb.auth.signOut();
      return;
    }

    const r = rd.role;
    if (r === 'student') {
      showMsg('Bu panel tələbələr üçün deyil. artmoniya.com/kabinet/ ünvanına keçin.', 'error');
      await sb.auth.signOut();
      return;
    }
    showMsg('Uğurlu! Yönləndirilir...', 'success');
    if (r === 'super_admin')    go('/admin/dashboard.html');
    else if (r === 'manager')   go('/admin/telebeler.html');
    else if (r === 'teacher')   go('/admin/muellim-qrup.html');
    else { showMsg('Naməlum rol: ' + r, 'error'); await sb.auth.signOut(); }

  } catch (err) {
    showMsg('Gözlənilməz xəta: ' + err.message, 'error');
  } finally {
    setLoading(btn, false);
  }
}

/* ── Register (müvəqqəti) ── */
async function handleRegister() {
  clearMsg();
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pw = document.getElementById('regPassword').value;
  if (!name || !email || !pw) { showMsg('Bütün sahələri doldurun', 'error'); return; }
  if (pw.length < 6) { showMsg('Şifrə minimum 6 simvol', 'error'); return; }

  const btn = document.getElementById('regBtn');
  setLoading(btn, true);
  try {
    const { error } = await sb.auth.signUp({ email, password: pw, options: { data: { full_name: name } } });
    if (error) throw error;
    showMsg('Qeydiyyat uğurlu! "Daxil ol" tab-ından daxil olun.', 'success');
    document.getElementById('tabReg').style.display = 'none';
    setTimeout(() => switchTab('login'), 1500);
  } catch (err) {
    showMsg(err.message?.includes('already registered') ? 'Bu email artıq qeydiyyatdadır' : (err.message || 'Qeydiyyat uğursuz'), 'error');
  } finally {
    setLoading(btn, false);
  }
}

/* ── NO auto session check on login page ── */
</script>
</body>
</html>
