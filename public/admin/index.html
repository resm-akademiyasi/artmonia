<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artmonia Admin - Daxil ol</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0b1a;--bg2:#0f0e24;--card:#14122a;--card2:#1a1835;--border:#252240;--accent:#f97316;--accent2:#ea580c;--text:#fff;--text2:#b0acd0;--text3:#6b6790;--green:#4ade80;--blue:#60a5fa;--red:#f87171}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px 32px;width:100%;max-width:420px}
.logo{text-align:center;margin-bottom:32px}
.logo h1{font-family:'Playfair Display',serif;color:var(--accent);font-size:2.2rem;font-weight:700;letter-spacing:1px}
.logo p{color:var(--text2);font-size:.95rem;margin-top:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;color:var(--text2);font-size:.85rem;font-weight:500;margin-bottom:6px}
.form-group input{width:100%;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:.95rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.form-group input::placeholder{color:var(--text3)}
.form-group input:focus{border-color:var(--accent)}
.pill-btn{width:100%;border-radius:50px;background:var(--accent);color:#fff;font-weight:700;padding:14px 28px;font-size:1rem;border:none;cursor:pointer;transition:background .2s;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
.pill-btn:hover{background:var(--accent2)}
.pill-btn:disabled{opacity:.6;cursor:not-allowed}
.pill-btn .spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.pill-btn.loading .spinner{display:inline-block}
.pill-btn.loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.msg-box{padding:12px 16px;border-radius:10px;font-size:.9rem;margin-bottom:16px;display:none;line-height:1.4}
.msg-box.error{display:block;background:rgba(248,113,113,.12);border:1px solid var(--red);color:var(--red)}
.msg-box.success{display:block;background:rgba(74,222,128,.12);border:1px solid var(--green);color:var(--green)}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <h1>Artmonia</h1>
    <p>Admin Panel</p>
  </div>

  <!-- Tabs -->
  <div class="tabs" style="display:flex;gap:0;margin-bottom:24px;border-radius:10px;overflow:hidden;border:1px solid var(--border)">
    <button class="tab-btn active" onclick="switchTab('login')" id="tabLogin" style="flex:1;padding:12px;background:var(--accent);color:#fff;border:none;font-family:'Inter',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s">Daxil ol</button>
    <button class="tab-btn" onclick="switchTab('register')" id="tabRegister" style="flex:1;padding:12px;background:var(--bg2);color:var(--text3);border:none;font-family:'Inter',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s">Qeydiyyat</button>
  </div>

  <div id="msg" class="msg-box"></div>
  <div id="error-message" style="display:none;color:#ff4444;background:#2a1a1a;padding:10px;border-radius:8px;margin-bottom:12px;font-size:.9rem"></div>

  <!-- Login Form -->
  <form id="loginForm" onsubmit="event.preventDefault();handleLogin()">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@artmonia.com" required>
    </div>
    <div class="form-group">
      <label>Şifrə</label>
      <input type="password" id="password" placeholder="Şifrənizi daxil edin" required>
    </div>
    <button type="submit" class="pill-btn" id="loginBtn">
      <span class="btn-text">Daxil ol</span>
      <span class="spinner"></span>
    </button>
  </form>

  <!-- Register Form (müvəqqəti) -->
  <form id="registerForm" onsubmit="handleRegister(event)" style="display:none">
    <div class="form-group">
      <label>Ad Soyad</label>
      <input type="text" id="regName" placeholder="Ad Soyad" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="email@example.com" required>
    </div>
    <div class="form-group">
      <label>Şifrə (minimum 6 simvol)</label>
      <input type="password" id="regPassword" placeholder="Şifrə təyin edin" required minlength="6">
    </div>
    <button type="submit" class="pill-btn" id="regBtn">
      <span class="btn-text">Qeydiyyatdan keç</span>
      <span class="spinner"></span>
    </button>
  </form>
</div>

<script src="/js/supabase-kabinet.js"></script>
<script src="/js/auth-kabinet.js"></script>
<script>
const msgBox = document.getElementById('msg');

function switchTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('tabLogin').style.background = tab === 'login' ? 'var(--accent)' : 'var(--bg2)';
  document.getElementById('tabLogin').style.color = tab === 'login' ? '#fff' : 'var(--text3)';
  document.getElementById('tabRegister').style.background = tab === 'register' ? 'var(--accent)' : 'var(--bg2)';
  document.getElementById('tabRegister').style.color = tab === 'register' ? '#fff' : 'var(--text3)';
  clearMsg();
}

async function handleRegister(e) {
  e.preventDefault();
  clearMsg();
  const btn = document.getElementById('regBtn');
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  if (!name || !email || !password) return showMsg('Bütün sahələri doldurun', 'error');
  if (password.length < 6) return showMsg('Şifrə minimum 6 simvol olmalıdır', 'error');

  setLoading(btn, true);
  try {
    const { data, error } = await sb.auth.signUp({
      email,
      password,
      options: { data: { full_name: name } }
    });
    if (error) throw error;
    showMsg('Qeydiyyat uğurlu! İndi "Daxil ol" tab-ından daxil ola bilərsiniz.', 'success');
    // Qeydiyyat uğurlu — tab-ı gizlət
    document.getElementById('tabRegister').style.display = 'none';
    setTimeout(() => switchTab('login'), 1500);
  } catch (err) {
    const msg = err.message?.includes('already registered')
      ? 'Bu email artıq qeydiyyatdadır'
      : (err.message || 'Qeydiyyat uğursuz oldu');
    showMsg(msg, 'error');
  } finally {
    setLoading(btn, false);
  }
}

function showMsg(text, type) {
  msgBox.textContent = text;
  msgBox.className = 'msg-box ' + type;
}
function clearMsg() {
  msgBox.className = 'msg-box';
  msgBox.textContent = '';
}

function setLoading(btn, loading) {
  btn.disabled = loading;
  btn.classList.toggle('loading', loading);
}

async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorBox = document.getElementById('error-message');

  errorBox.style.display = 'none';
  clearMsg();

  if (!email || !password) {
    errorBox.textContent = 'Email və şifrəni daxil edin';
    errorBox.style.display = 'block';
    return;
  }

  const btn = document.getElementById('loginBtn');
  setLoading(btn, true);

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      errorBox.textContent = 'Xəta: ' + error.message;
      errorBox.style.display = 'block';
      return;
    }

    // Rol yoxla
    const { data: roleData, error: roleError } = await sb
      .from('user_roles')
      .select('role')
      .eq('user_id', data.user.id)
      .single();

    if (roleError || !roleData) {
      errorBox.textContent = 'Rolunuz tapılmadı. Admin ilə əlaqə saxlayın.';
      errorBox.style.display = 'block';
      await sb.auth.signOut();
      return;
    }

    const role = roleData.role;

    if (role === 'super_admin') {
      window.location.href = '/admin/dashboard.html';
    } else if (role === 'manager') {
      window.location.href = '/admin/telebeler.html';
    } else if (role === 'teacher') {
      window.location.href = '/admin/muellim-qrup.html';
    } else if (role === 'student') {
      window.location.href = '/kabinet/dashboard.html';
    } else {
      errorBox.textContent = 'Naməlum rol: ' + role;
      errorBox.style.display = 'block';
    }

  } catch (err) {
    errorBox.textContent = 'Gözlənilməz xəta: ' + err.message;
    errorBox.style.display = 'block';
  } finally {
    setLoading(btn, false);
  }
}

// Check if already logged in with admin role
(async () => {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      const role = await getRole();
      if (role && ['super_admin', 'manager', 'teacher'].includes(role)) {
        redirectByRole(role);
      }
    }
  } catch (e) {
    console.error('Session check error:', e);
  }
})();
</script>
</body>
</html>
