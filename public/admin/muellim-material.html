<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materiallar - Artmonia Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0b1a;--bg2:#0f0e24;--card:#14122a;--card2:#1a1835;--border:#252240;--accent:#f97316;--accent2:#ea580c;--text:#fff;--text2:#b0acd0;--text3:#6b6790;--green:#4ade80;--blue:#60a5fa;--red:#f87171;--sidebar-w:250px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--card);border-right:1px solid var(--border);padding:24px 16px;display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sidebar .logo{font-family:'Playfair Display',serif;color:var(--accent);font-size:1.5rem;font-weight:700;margin-bottom:32px;padding:0 8px}
.sidebar nav{flex:1;display:flex;flex-direction:column;gap:2px}
.sidebar nav a{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;color:var(--text2);text-decoration:none;font-size:.9rem;font-weight:500;transition:all .15s}
.sidebar nav a:hover,.sidebar nav a.active{background:var(--bg2);color:var(--text)}
.sidebar nav a.active{border-left:3px solid var(--accent);color:var(--accent)}
.sidebar .divider{height:1px;background:var(--border);margin:8px 0}
.sidebar .divider-label{color:var(--text3);font-size:.75rem;padding:4px 12px;text-transform:uppercase;letter-spacing:1px}
.sidebar .logout-btn{margin-top:auto;display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;color:var(--red);background:none;border:none;font-size:.9rem;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;width:100%;transition:background .15s}
.sidebar .logout-btn:hover{background:rgba(248,113,113,.1)}
.main{margin-left:var(--sidebar-w);padding:32px}
.page-title{font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:24px}
.section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:24px}
.section h2{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:16px;color:var(--accent)}
.form-group{margin-bottom:14px}
.form-group label{display:block;color:var(--text2);font-size:.85rem;font-weight:500;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;font-family:'Inter',sans-serif;outline:none;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-row{display:flex;gap:12px;flex-wrap:wrap}
.form-row .form-group{flex:1;min-width:200px}
.btn{padding:10px 20px;border-radius:50px;font-size:.9rem;font-weight:600;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:var(--accent2)}
.btn-sm{padding:6px 14px;font-size:.8rem;border-radius:50px}
.btn-red{background:rgba(248,113,113,.15);color:var(--red);border:1px solid transparent}.btn-red:hover{border-color:var(--red)}
/* Materials list */
.materials-list{display:flex;flex-direction:column;gap:12px}
.material-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:16px;transition:border-color .2s}
.material-item:hover{border-color:var(--accent)}
.material-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.icon-pdf{background:rgba(248,113,113,.15);color:var(--red)}
.icon-video{background:rgba(96,165,250,.15);color:var(--blue)}
.icon-image{background:rgba(74,222,128,.15);color:var(--green)}
.icon-link{background:rgba(249,115,22,.15);color:var(--accent)}
.icon-doc{background:rgba(176,172,208,.15);color:var(--text2)}
.material-info{flex:1;min-width:0}
.material-info .title{font-weight:600;font-size:.95rem;margin-bottom:2px}
.material-info .desc{color:var(--text2);font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.material-info .date{color:var(--text3);font-size:.78rem;margin-top:2px}
.material-actions{display:flex;gap:8px;flex-shrink:0}
.material-actions a{color:var(--blue);font-size:.85rem;text-decoration:none;font-weight:500}
.material-actions a:hover{text-decoration:underline}
/* File upload */
.file-upload{position:relative}
.file-upload input[type=file]{width:100%;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;font-family:'Inter',sans-serif;cursor:pointer}
.file-upload input[type=file]::file-selector-button{background:var(--accent);color:#fff;border:none;padding:6px 14px;border-radius:8px;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;margin-right:10px}
.or-divider{text-align:center;color:var(--text3);font-size:.85rem;margin:8px 0}
.msg-box{padding:12px 16px;border-radius:10px;font-size:.9rem;margin-bottom:16px;display:none;line-height:1.4}
.msg-box.error{display:block;background:rgba(248,113,113,.12);border:1px solid var(--red);color:var(--red)}
.msg-box.success{display:block;background:rgba(74,222,128,.12);border:1px solid var(--green);color:var(--green)}
.hamburger{display:none;position:fixed;top:16px;left:16px;z-index:200;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;color:var(--text);font-size:1.2rem}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.overlay.open{display:block}.hamburger{display:block}
  .main{margin-left:0;padding:24px 16px;padding-top:60px}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="logo">Artmonia Admin</div>
  <nav id="adminNav">
    <a href="/admin/dashboard.html" data-roles="super_admin">&#128202; Dashboard</a>
    <a href="/admin/telebeler.html" data-roles="super_admin,manager">&#128101; Telebeler</a>
    <a href="/admin/qruplar.html" data-roles="super_admin,manager">&#128203; Qruplar</a>
    <a href="/admin/odenisler.html" data-roles="super_admin,manager">&#128176; Odenisler</a>
    <a href="/admin/gamification.html" data-roles="super_admin,manager">&#127942; Gamification</a>
    <a href="/admin/hesabat.html" data-roles="super_admin,manager">&#128200; Hesabat</a>
    <a href="/admin/istifadeciler.html" data-roles="super_admin">&#128100; Istifadeciler</a>
    <div class="divider"></div>
    <div class="divider-label">Muellim</div>
    <a href="/admin/muellim-qrup.html" data-roles="teacher,super_admin">&#127891; Qrupum</a>
    <a href="/admin/muellim-tapshiriq.html" data-roles="teacher,super_admin">&#128221; Tapshiriqlar</a>
    <a href="/admin/muellim-material.html" class="active" data-roles="teacher,super_admin">&#128196; Materiallar</a>
  </nav>
  <button class="logout-btn" onclick="logout()">&#128682; Chixish</button>
</aside>

<main class="main">
  <h1 class="page-title">Materiallar</h1>
  <div id="pageMsg" class="msg-box"></div>

  <!-- Add Material -->
  <div class="section">
    <h2>Material Elave Et</h2>
    <form onsubmit="addMaterial(event)">
      <div class="form-row">
        <div class="form-group"><label>Basliq</label><input type="text" id="matTitle" required></div>
        <div class="form-group"><label>Fayl Novu</label>
          <select id="matType">
            <option value="pdf">PDF</option>
            <option value="video">Video</option>
            <option value="image">Sekil</option>
            <option value="link">Link</option>
            <option value="doc">Dokument</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Aciqlama</label><textarea id="matDesc" rows="2" placeholder="Material haqqinda qisa melumat..."></textarea></div>

      <div class="form-group file-upload">
        <label>Fayl Yukle</label>
        <input type="file" id="matFile" accept=".pdf,.doc,.docx,.ppt,.pptx,.jpg,.jpeg,.png,.mp4,.webm">
      </div>
      <div class="or-divider">- ve ya -</div>
      <div class="form-group"><label>URL</label><input type="url" id="matUrl" placeholder="https://..."></div>

      <button type="submit" class="btn btn-accent" id="addBtn">Elave Et</button>
    </form>
  </div>

  <!-- Materials List -->
  <h2 style="font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:16px;color:var(--accent)">Movcud Materiallar</h2>
  <div class="materials-list" id="materialsList">
    <div style="color:var(--text3)">Yuklenilir...</div>
  </div>
</main>

<script src="/js/supabase-kabinet.js"></script>
<script src="/js/auth-kabinet.js"></script>
<script>
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('open')}

let currentRole=null, currentUser=null, myGroupIds=[];

const typeIcons={
  pdf:{icon:'&#128196;',cls:'icon-pdf'},
  video:{icon:'&#127909;',cls:'icon-video'},
  image:{icon:'&#128247;',cls:'icon-image'},
  link:{icon:'&#128279;',cls:'icon-link'},
  doc:{icon:'&#128221;',cls:'icon-doc'}
};

function showMsg(text,type){
  const el=document.getElementById('pageMsg');
  el.textContent=text;el.className='msg-box '+type;
  setTimeout(()=>{el.className='msg-box'},3000);
}

async function init(){
  const ok=await requireRole('teacher','super_admin');
  if(!ok) return;
  currentRole=await getRole();
  currentUser=await getUser();
  filterNav(currentRole);
  await loadMyGroups();
  await loadMaterials();
}

function filterNav(role){
  document.querySelectorAll('#adminNav a').forEach(a=>{
    const roles=a.dataset.roles?a.dataset.roles.split(','):[];
    if(roles.length&&!roles.includes(role)) a.style.display='none';
  });
}

async function loadMyGroups(){
  let query=sb.from('groups').select('id').eq('is_active',true);
  if(currentRole==='teacher') query=query.eq('teacher_id',currentUser.id);
  const{data}=await query;
  myGroupIds=(data||[]).map(g=>g.id);
}

async function loadMaterials(){
  let query=sb.from('materials').select('*').order('created_at',{ascending:false});
  if(currentRole==='teacher'){
    query=query.eq('teacher_id',currentUser.id);
  }
  const{data}=await query;
  renderMaterials(data||[]);
}

function renderMaterials(list){
  const el=document.getElementById('materialsList');
  if(!list.length){el.innerHTML='<div style="color:var(--text3)">Material tapilmadi</div>';return}
  el.innerHTML=list.map(m=>{
    const t=typeIcons[m.file_type]||typeIcons.doc;
    const date=new Date(m.created_at).toLocaleDateString('az');
    const url=m.file_url||m.url||'#';
    return `<div class="material-item">
      <div class="material-icon ${t.cls}">${t.icon}</div>
      <div class="material-info">
        <div class="title">${m.title||'-'}</div>
        <div class="desc">${m.description||''}</div>
        <div class="date">${date}</div>
      </div>
      <div class="material-actions">
        <a href="${url}" target="_blank">Bax</a>
        <button class="btn btn-sm btn-red" onclick="deleteMaterial('${m.id}')">Sil</button>
      </div>
    </div>`;
  }).join('');
}

async function addMaterial(e){
  e.preventDefault();
  const title=document.getElementById('matTitle').value.trim();
  const file_type=document.getElementById('matType').value;
  const description=document.getElementById('matDesc').value.trim();
  const fileInput=document.getElementById('matFile');
  const urlInput=document.getElementById('matUrl').value.trim();

  if(!title) return showMsg('Basliq daxil edin','error');

  const btn=document.getElementById('addBtn');
  btn.disabled=true;
  btn.textContent='Yuklenilir...';

  try{
    let file_url=urlInput;

    // If file is selected, upload to Supabase storage
    if(fileInput.files.length>0){
      const file=fileInput.files[0];
      const ext=file.name.split('.').pop();
      const path=`materials/${Date.now()}_${Math.random().toString(36).substring(7)}.${ext}`;
      const{data:uploadData,error:uploadErr}=await sb.storage.from('materials').upload(path,file);
      if(uploadErr) throw uploadErr;
      const{data:urlData}=sb.storage.from('materials').getPublicUrl(path);
      file_url=urlData.publicUrl;
    }

    if(!file_url) return showMsg('Fayl yukleyin ve ya URL daxil edin','error');

    const{error}=await sb.from('materials').insert({
      title, description, file_type, file_url, url:file_url,
      teacher_id:currentUser.id,
      group_ids:myGroupIds
    });
    if(error) throw error;

    showMsg('Material elave edildi!','success');
    // Reset form
    document.getElementById('matTitle').value='';
    document.getElementById('matDesc').value='';
    document.getElementById('matUrl').value='';
    fileInput.value='';
    await loadMaterials();
  }catch(err){
    showMsg(err.message||'Xeta bash verdi','error');
  }finally{
    btn.disabled=false;
    btn.textContent='Elave Et';
  }
}

async function deleteMaterial(id){
  if(!confirm('Bu materiali silmek isteyirsiniz?')) return;
  try{
    const{error}=await sb.from('materials').delete().eq('id',id);
    if(error) throw error;
    showMsg('Material silindi','success');
    await loadMaterials();
  }catch(err){
    showMsg(err.message||'Xeta bash verdi','error');
  }
}

init();
</script>
</body>
</html>
