<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odenisler - Artmonia Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0b1a;--bg2:#0f0e24;--card:#14122a;--card2:#1a1835;--border:#252240;--accent:#f97316;--accent2:#ea580c;--text:#fff;--text2:#b0acd0;--text3:#6b6790;--green:#4ade80;--blue:#60a5fa;--red:#f87171;--sidebar-w:250px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--card);border-right:1px solid var(--border);padding:24px 16px;display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sidebar .logo{font-family:'Playfair Display',serif;color:var(--accent);font-size:1.5rem;font-weight:700;margin-bottom:32px;padding:0 8px}
.sidebar nav{flex:1;display:flex;flex-direction:column;gap:2px}
.sidebar nav a{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;color:var(--text2);text-decoration:none;font-size:.9rem;font-weight:500;transition:all .15s}
.sidebar nav a:hover,.sidebar nav a.active{background:var(--bg2);color:var(--text)}
.sidebar nav a.active{border-left:3px solid var(--accent);color:var(--accent)}
.sidebar .divider{height:1px;background:var(--border);margin:8px 0}
.sidebar .divider-label{color:var(--text3);font-size:.75rem;padding:4px 12px;text-transform:uppercase;letter-spacing:1px}
.sidebar .logout-btn{margin-top:auto;display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;color:var(--red);background:none;border:none;font-size:.9rem;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;width:100%;transition:background .15s}
.sidebar .logout-btn:hover{background:rgba(248,113,113,.1)}
.main{margin-left:var(--sidebar-w);padding:32px}
.page-title{font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:24px}
.toolbar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.toolbar select,.toolbar input{padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;font-family:'Inter',sans-serif;outline:none}
.toolbar select:focus,.toolbar input:focus{border-color:var(--accent)}
.btn{padding:10px 20px;border-radius:50px;font-size:.9rem;font-weight:600;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:var(--accent2)}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 16px;color:var(--text3);font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:12px 16px;font-size:.9rem;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:3px 10px;border-radius:50px;font-size:.78rem;font-weight:600}
.badge-green{background:rgba(74,222,128,.15);color:var(--green)}
.badge-blue{background:rgba(96,165,250,.15);color:var(--blue)}
.badge-orange{background:rgba(249,115,22,.15);color:var(--accent)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal h2{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:20px}
.modal .form-group{margin-bottom:14px}
.modal .form-group label{display:block;color:var(--text2);font-size:.85rem;font-weight:500;margin-bottom:6px}
.modal .form-group input,.modal .form-group select,.modal .form-group textarea{width:100%;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;font-family:'Inter',sans-serif;outline:none;resize:vertical}
.modal .form-group input:focus,.modal .form-group select:focus,.modal .form-group textarea:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-outline:hover{border-color:var(--accent);color:var(--text)}
.msg-box{padding:12px 16px;border-radius:10px;font-size:.9rem;margin-bottom:16px;display:none;line-height:1.4}
.msg-box.error{display:block;background:rgba(248,113,113,.12);border:1px solid var(--red);color:var(--red)}
.msg-box.success{display:block;background:rgba(74,222,128,.12);border:1px solid var(--green);color:var(--green)}
/* Student search dropdown */
.search-select{position:relative}
.search-select input{width:100%;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;font-family:'Inter',sans-serif;outline:none}
.search-select input:focus{border-color:var(--accent)}
.search-select .dropdown{position:absolute;top:100%;left:0;right:0;background:var(--card2);border:1px solid var(--border);border-radius:10px;max-height:200px;overflow-y:auto;z-index:10;display:none}
.search-select .dropdown.open{display:block}
.search-select .dropdown div{padding:10px 14px;cursor:pointer;font-size:.9rem;transition:background .1s}
.search-select .dropdown div:hover{background:var(--bg2)}
.hamburger{display:none;position:fixed;top:16px;left:16px;z-index:200;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;color:var(--text);font-size:1.2rem}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.overlay.open{display:block}.hamburger{display:block}
  .main{margin-left:0;padding:24px 16px;padding-top:60px}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="logo">Artmonia Admin</div>
  <nav id="adminNav">
    <a href="/admin/dashboard.html" data-roles="super_admin">&#128202; Dashboard</a>
    <a href="/admin/telebeler.html" data-roles="super_admin,manager">&#128101; Telebeler</a>
    <a href="/admin/qruplar.html" data-roles="super_admin,manager">&#128203; Qruplar</a>
    <a href="/admin/odenisler.html" class="active" data-roles="super_admin,manager">&#128176; Odenisler</a>
    <a href="/admin/gamification.html" data-roles="super_admin,manager">&#127942; Gamification</a>
    <a href="/admin/hesabat.html" data-roles="super_admin,manager">&#128200; Hesabat</a>
    <a href="/admin/istifadeciler.html" data-roles="super_admin">&#128100; Istifadeciler</a>
    <div class="divider"></div>
    <div class="divider-label">Muellim</div>
    <a href="/admin/muellim-qrup.html" data-roles="teacher,super_admin">&#127891; Qrupum</a>
    <a href="/admin/muellim-tapshiriq.html" data-roles="teacher,super_admin">&#128221; Tapshiriqlar</a>
    <a href="/admin/muellim-material.html" data-roles="teacher,super_admin">&#128196; Materiallar</a>
  </nav>
  <button class="logout-btn" onclick="logout()">&#128682; Chixish</button>
</aside>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Yeni Odenis</h2>
    <div id="modalMsg" class="msg-box"></div>
    <form id="payForm" onsubmit="savePayment(event)">
      <div class="form-group">
        <label>Telebe</label>
        <div class="search-select">
          <input type="text" id="fStudentSearch" placeholder="Ad ile axtar..." autocomplete="off" oninput="searchStudents(this.value)" onfocus="searchStudents(this.value)">
          <input type="hidden" id="fStudentId">
          <div class="dropdown" id="studentDropdown"></div>
        </div>
      </div>
      <div class="form-group"><label>Mebleg (AZN)</label><input type="number" id="fAmount" min="0" step="0.01" required></div>
      <div class="form-group"><label>Usul</label>
        <select id="fMethod" required>
          <option value="naghd">Naghd</option>
          <option value="kart">Kart</option>
          <option value="kochurme">Kochurme</option>
        </select>
      </div>
      <div class="form-group"><label>Ay</label><input type="month" id="fMonth" required></div>
      <div class="form-group"><label>Qeyd</label><textarea id="fNote" rows="2" placeholder="Elave melumat..."></textarea></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal()">Legv et</button>
        <button type="submit" class="btn btn-accent">Yadda saxla</button>
      </div>
    </form>
  </div>
</div>

<main class="main">
  <h1 class="page-title">Odenisler</h1>
  <div class="toolbar">
    <button class="btn btn-accent" onclick="openModal()">+ Yeni Odenis</button>
    <select id="filterStudent" onchange="filterPayments()"><option value="">Butun telebeler</option></select>
    <input type="month" id="filterMonth" onchange="filterPayments()">
    <select id="filterMethod" onchange="filterPayments()">
      <option value="">Butun usullar</option>
      <option value="naghd">Naghd</option>
      <option value="kart">Kart</option>
      <option value="kochurme">Kochurme</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>Telebe</th><th>Mebleg</th><th>Usul</th><th>Ay</th><th>Tarix</th><th>Yazan</th></tr></thead>
      <tbody id="tbody"><tr><td colspan="6" style="color:var(--text3);text-align:center">Yuklenilir...</td></tr></tbody>
    </table>
  </div>
</main>

<script src="/js/supabase-kabinet.js"></script>
<script src="/js/auth-kabinet.js"></script>
<script>
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('open')}

let allPayments=[], allStudents=[], currentRole=null, currentUser=null;

async function init(){
  const ok=await requireAuth(['super_admin','manager'], '/admin/index.html');
  if(!ok) return;
  currentRole=await getRole();
  currentUser=await getUser();
  filterNav(currentRole);
  await loadStudents();
  await loadPayments();
}

function filterNav(role){
  document.querySelectorAll('#adminNav a').forEach(a=>{
    const roles=a.dataset.roles?a.dataset.roles.split(','):[];
    if(roles.length&&!roles.includes(role)) a.style.display='none';
  });
}

async function loadStudents(){
  const{data}=await sb.from('students').select('id,full_name').eq('status','active').order('full_name');
  allStudents=data||[];
  const sel=document.getElementById('filterStudent');
  allStudents.forEach(s=>{sel.innerHTML+=`<option value="${s.id}">${s.full_name}</option>`});
}

async function loadPayments(){
  const{data}=await sb.from('payments').select('*, students(full_name)').order('created_at',{ascending:false});
  allPayments=data||[];
  renderPayments(allPayments);
}

function filterPayments(){
  const sid=document.getElementById('filterStudent').value;
  const month=document.getElementById('filterMonth').value;
  const method=document.getElementById('filterMethod').value;
  let list=allPayments;
  if(sid) list=list.filter(p=>p.student_id===sid);
  if(month) list=list.filter(p=>(p.month||'').startsWith(month));
  if(method) list=list.filter(p=>p.method===method);
  renderPayments(list);
}

function renderPayments(list){
  const tbody=document.getElementById('tbody');
  if(!list.length){tbody.innerHTML='<tr><td colspan="6" style="color:var(--text3);text-align:center">Odenis tapilmadi</td></tr>';return}
  tbody.innerHTML=list.map(p=>{
    const name=p.students?.full_name||'-';
    const method=p.method||'-';
    const badge=method==='naghd'?'badge-green':method==='kart'?'badge-blue':'badge-orange';
    const date=new Date(p.created_at).toLocaleDateString('az');
    return `<tr><td>${name}</td><td>${p.amount} AZN</td><td><span class="badge ${badge}">${method}</span></td><td>${p.month||'-'}</td><td>${date}</td><td>${p.created_by_name||'-'}</td></tr>`;
  }).join('');
}

function openModal(){
  document.getElementById('payForm').reset();
  document.getElementById('fStudentId').value='';
  document.getElementById('fStudentSearch').value='';
  document.getElementById('modalMsg').className='msg-box';
  // Default to current month
  const now=new Date();
  document.getElementById('fMonth').value=now.getFullYear()+'-'+(''+(now.getMonth()+1)).padStart(2,'0');
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open')}

function searchStudents(q){
  const dd=document.getElementById('studentDropdown');
  const filtered=allStudents.filter(s=>(s.full_name||'').toLowerCase().includes(q.toLowerCase()));
  if(!filtered.length||!q){dd.classList.remove('open');return}
  dd.innerHTML=filtered.slice(0,10).map(s=>`<div onclick="selectStudent('${s.id}','${s.full_name}')">${s.full_name}</div>`).join('');
  dd.classList.add('open');
}

function selectStudent(id,name){
  document.getElementById('fStudentId').value=id;
  document.getElementById('fStudentSearch').value=name;
  document.getElementById('studentDropdown').classList.remove('open');
}

// Close dropdown on outside click
document.addEventListener('click',e=>{
  if(!e.target.closest('.search-select')) document.getElementById('studentDropdown').classList.remove('open');
});

async function savePayment(e){
  e.preventDefault();
  const msgEl=document.getElementById('modalMsg');
  msgEl.className='msg-box';
  const student_id=document.getElementById('fStudentId').value;
  if(!student_id){msgEl.textContent='Telebe secin';msgEl.className='msg-box error';return}
  const amount=parseFloat(document.getElementById('fAmount').value);
  const method=document.getElementById('fMethod').value;
  const month=document.getElementById('fMonth').value;
  const note=document.getElementById('fNote').value.trim();

  try{
    const{error}=await sb.from('payments').insert({
      student_id, amount, method, month, note,
      created_by:currentUser?.id||null,
      created_by_name:currentUser?.user_metadata?.full_name||'Admin'
    });
    if(error) throw error;
    closeModal();
    await loadPayments();
  }catch(err){
    msgEl.textContent=err.message||'Xeta bash verdi';
    msgEl.className='msg-box error';
  }
}

init();
</script>
</body>
</html>
