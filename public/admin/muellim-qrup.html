<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qrupum - Artmonia Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0b1a;--bg2:#0f0e24;--card:#14122a;--card2:#1a1835;--border:#252240;--accent:#f97316;--accent2:#ea580c;--text:#fff;--text2:#b0acd0;--text3:#6b6790;--green:#4ade80;--blue:#60a5fa;--red:#f87171;--sidebar-w:250px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--card);border-right:1px solid var(--border);padding:24px 16px;display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sidebar .logo{font-family:'Playfair Display',serif;color:var(--accent);font-size:1.5rem;font-weight:700;margin-bottom:32px;padding:0 8px}
.sidebar nav{flex:1;display:flex;flex-direction:column;gap:2px}
.sidebar nav a{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;color:var(--text2);text-decoration:none;font-size:.9rem;font-weight:500;transition:all .15s}
.sidebar nav a:hover,.sidebar nav a.active{background:var(--bg2);color:var(--text)}
.sidebar nav a.active{border-left:3px solid var(--accent);color:var(--accent)}
.sidebar .divider{height:1px;background:var(--border);margin:8px 0}
.sidebar .divider-label{color:var(--text3);font-size:.75rem;padding:4px 12px;text-transform:uppercase;letter-spacing:1px}
.sidebar .logout-btn{margin-top:auto;display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;color:var(--red);background:none;border:none;font-size:.9rem;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;width:100%;transition:background .15s}
.sidebar .logout-btn:hover{background:rgba(248,113,113,.1)}
.main{margin-left:var(--sidebar-w);padding:32px}
.page-title{font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:8px}
.page-sub{color:var(--text2);font-size:.95rem;margin-bottom:24px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.student-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:border-color .2s}
.student-card:hover{border-color:var(--accent)}
.student-card .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.student-card .name{font-size:1.05rem;font-weight:600}
.student-card .xp-badge{background:rgba(249,115,22,.15);color:var(--accent);padding:4px 12px;border-radius:50px;font-size:.8rem;font-weight:600}
.student-card .info{color:var(--text2);font-size:.85rem;margin-bottom:4px}
.student-card .info span{color:var(--text)}
.level-emoji{font-size:1.1rem}
/* Expandable detail */
.student-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.student-detail.open{display:block}
.detail-section{margin-bottom:12px}
.detail-section h4{color:var(--text2);font-size:.85rem;margin-bottom:6px;font-weight:600}
.detail-item{background:var(--bg2);border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:.85rem}
.detail-item .date{color:var(--text3);font-size:.78rem}
.no-data{color:var(--text3);font-size:.85rem;font-style:italic}
.hamburger{display:none;position:fixed;top:16px;left:16px;z-index:200;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;color:var(--text);font-size:1.2rem}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.overlay.open{display:block}.hamburger{display:block}
  .main{margin-left:0;padding:24px 16px;padding-top:60px}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="logo">Artmonia Admin</div>
  <nav id="adminNav">
    <a href="/admin/dashboard.html" data-roles="super_admin">&#128202; Dashboard</a>
    <a href="/admin/telebeler.html" data-roles="super_admin,manager">&#128101; Telebeler</a>
    <a href="/admin/qruplar.html" data-roles="super_admin,manager">&#128203; Qruplar</a>
    <a href="/admin/odenisler.html" data-roles="super_admin,manager">&#128176; Odenisler</a>
    <a href="/admin/gamification.html" data-roles="super_admin,manager">&#127942; Gamification</a>
    <a href="/admin/hesabat.html" data-roles="super_admin,manager">&#128200; Hesabat</a>
    <a href="/admin/istifadeciler.html" data-roles="super_admin">&#128100; Istifadeciler</a>
    <div class="divider"></div>
    <div class="divider-label">Muellim</div>
    <a href="/admin/muellim-qrup.html" class="active" data-roles="teacher,super_admin">&#127891; Qrupum</a>
    <a href="/admin/muellim-tapshiriq.html" data-roles="teacher,super_admin">&#128221; Tapshiriqlar</a>
    <a href="/admin/muellim-material.html" data-roles="teacher,super_admin">&#128196; Materiallar</a>
  </nav>
  <button class="logout-btn" onclick="logout()">&#128682; Chixish</button>
</aside>

<main class="main">
  <h1 class="page-title">Qrupum</h1>
  <p class="page-sub" id="groupInfo">Yuklenilir...</p>

  <div class="cards-grid" id="cardsGrid">
    <div style="color:var(--text3)">Yuklenilir...</div>
  </div>
</main>

<script src="/js/supabase-kabinet.js"></script>
<script src="/js/auth-kabinet.js"></script>
<script>
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('open')}

let currentRole=null, currentUser=null, myStudents=[], myGroups=[];

function levelEmoji(xp){
  if(xp>=200) return '&#128142;';
  if(xp>=100) return '&#129351;';
  if(xp>=50)  return '&#129352;';
  return '&#129353;';
}
function levelName(xp){
  if(xp>=200) return 'Almaz';
  if(xp>=100) return 'Qizil';
  if(xp>=50)  return 'Gumush';
  return 'Brinc';
}

async function init(){
  const ok=await requireAuth(['teacher','super_admin'], '/admin/index.html');
  if(!ok) return;
  currentRole=await getRole();
  currentUser=await getUser();
  filterNav(currentRole);
  await loadMyGroups();
}

function filterNav(role){
  document.querySelectorAll('#adminNav a').forEach(a=>{
    const roles=a.dataset.roles?a.dataset.roles.split(','):[];
    if(roles.length&&!roles.includes(role)) a.style.display='none';
  });
}

async function loadMyGroups(){
  // If super_admin, show all groups; if teacher, show only their groups
  let query=sb.from('groups').select('*').eq('is_active',true);
  if(currentRole==='teacher'){
    query=query.eq('teacher_id',currentUser.id);
  }
  const{data:groups}=await query;
  myGroups=groups||[];

  if(!myGroups.length){
    document.getElementById('groupInfo').textContent='Size teyin edilmish qrup tapilmadi.';
    document.getElementById('cardsGrid').innerHTML='<div style="color:var(--text3)">Qrup tapilmadi</div>';
    return;
  }

  document.getElementById('groupInfo').textContent=myGroups.map(g=>g.name).join(', ');

  // Load students in those groups
  const groupIds=myGroups.map(g=>g.id);
  const{data:students}=await sb.from('students').select('*').in('group_id',groupIds).eq('status','active').order('full_name');
  myStudents=students||[];

  renderStudents();
}

function renderStudents(){
  const grid=document.getElementById('cardsGrid');
  if(!myStudents.length){grid.innerHTML='<div style="color:var(--text3)">Bu qrupda telebe tapilmadi</div>';return}
  grid.innerHTML=myStudents.map(s=>{
    const xp=s.xp||0;
    return `<div class="student-card" onclick="toggleDetail('${s.id}')">
      <div class="top">
        <span class="name">${s.full_name||'-'}</span>
        <span class="xp-badge">${xp} XP</span>
      </div>
      <div class="info">Seviye: <span>${levelEmoji(xp)} ${levelName(xp)}</span></div>
      <div class="info">Son feedback: <span id="lastFb-${s.id}">--</span></div>
      <div class="student-detail" id="detail-${s.id}">
        <div class="detail-section">
          <h4>Son Reyler</h4>
          <div id="feedbacks-${s.id}"><span class="no-data">Yuklenilir...</span></div>
        </div>
        <div class="detail-section">
          <h4>Tapshiriq Statusu</h4>
          <div id="homework-${s.id}"><span class="no-data">Yuklenilir...</span></div>
        </div>
        <div class="detail-section">
          <h4>Eserler</h4>
          <div id="artworks-${s.id}"><span class="no-data">Yuklenilir...</span></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function toggleDetail(studentId){
  const el=document.getElementById('detail-'+studentId);
  if(el.classList.contains('open')){
    el.classList.remove('open');
    return;
  }
  el.classList.add('open');

  // Load feedbacks
  const{data:feedbacks}=await sb.from('feedbacks').select('*').eq('student_id',studentId).order('created_at',{ascending:false}).limit(5);
  const fbEl=document.getElementById('feedbacks-'+studentId);
  if(feedbacks&&feedbacks.length){
    fbEl.innerHTML=feedbacks.map(f=>`<div class="detail-item">${f.comment||f.note||'-'} <span class="date">${new Date(f.created_at).toLocaleDateString('az')}</span></div>`).join('');
    document.getElementById('lastFb-'+studentId).textContent=new Date(feedbacks[0].created_at).toLocaleDateString('az');
  }else{
    fbEl.innerHTML='<span class="no-data">Rey tapilmadi</span>';
  }

  // Load homework
  const{data:hw}=await sb.from('homework').select('*').eq('student_id',studentId).order('created_at',{ascending:false}).limit(5);
  const hwEl=document.getElementById('homework-'+studentId);
  if(hw&&hw.length){
    hwEl.innerHTML=hw.map(h=>{
      const status=h.status==='reviewed'?'&#9989; Baxilib':h.status==='submitted'?'&#128228; Gonderilib':'&#9203; Gozleyir';
      return `<div class="detail-item">${h.title||'-'} - ${status} <span class="date">${new Date(h.created_at).toLocaleDateString('az')}</span></div>`;
    }).join('');
  }else{
    hwEl.innerHTML='<span class="no-data">Tapshiriq tapilmadi</span>';
  }

  // Load artworks
  const{data:art}=await sb.from('artworks').select('*').eq('student_id',studentId).order('created_at',{ascending:false}).limit(5);
  const artEl=document.getElementById('artworks-'+studentId);
  if(art&&art.length){
    artEl.innerHTML=art.map(a=>`<div class="detail-item">${a.title||'-'} <span class="date">${new Date(a.created_at).toLocaleDateString('az')}</span></div>`).join('');
  }else{
    artEl.innerHTML='<span class="no-data">Eser tapilmadi</span>';
  }
}

init();
</script>
</body>
</html>
