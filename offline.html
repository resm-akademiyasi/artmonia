<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artmonia — Offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070614;color:#fff;font-family:'Nunito Sans',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
.icon{font-size:64px;margin-bottom:24px}
h1{font-size:24px;color:#F28E14;margin-bottom:12px}
p{color:#b0acd0;font-size:15px;line-height:1.6;max-width:300px;margin:0 auto}
.btn{display:inline-block;margin-top:24px;padding:12px 28px;background:#F28E14;color:#070614;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer;border:none;font-family:inherit}
</style>
</head>
<body>
<div>
  <div class="icon">🎨</div>
  <h1>İnternet bağlantısı yoxdur</h1>
  <p>Bağlantı bərpa olduqda avtomatik yenilənəcək. Lütfən, interneti yoxlayın.</p>
  <button class="btn" onclick="window.location.reload()">Yenidən cəhd et</button>
</div>
</body>
</html>
